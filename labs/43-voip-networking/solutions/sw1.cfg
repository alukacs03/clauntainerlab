hostname sw1
!
vlan 10
   name DATA
!
vlan 110
   name VOICE
!
ip routing
!
! ─── QoS marking for voice ───
! Match RTP-typical range (UDP 16384-32767 in many PBX defaults)
ip access-list VOICE-RTP
   10 permit udp 10.110.0.0/24 any range 16384 32767
   20 permit udp any 10.110.0.0/24 range 16384 32767
!
ip access-list VOICE-SIG
   10 permit tcp any any eq 5060
   20 permit udp any any eq 5060
!
class-map type qos match-any RTP
   match ip access-group VOICE-RTP
!
class-map type qos match-any SIG
   match ip access-group VOICE-SIG
!
policy-map type qos VOICE-MARK
   class RTP
      set dscp ef
   class SIG
      set dscp cs5
!
interface Ethernet1
   description phone+pc
   ! "Voice access" pattern: untagged data VLAN for the PC plugged
   ! into the phone, tagged voice VLAN for the phone itself.
   switchport mode trunk
   switchport trunk native vlan 10
   switchport trunk allowed vlan 10,110
   ! Storm-control to limit a misbehaving handset from melting the segment.
   ! cEOS limitation: these two lines are REJECTED on cEOS with
   ! 'storm-control not supported on this hardware platform' (see lab 06).
   ! Kept here for production-hardware reference (DCS-7280/7500 etc.).
   storm-control broadcast level 1
   storm-control multicast level 5
   ! Loop & spoofing protections
   spanning-tree portfast
   spanning-tree bpduguard enable
   service-policy type qos input VOICE-MARK
!
interface Ethernet2
   description desktop
   switchport mode access
   switchport access vlan 10
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet3
   description pbx
   switchport mode access
   switchport access vlan 110
   service-policy type qos input VOICE-MARK
!
interface Vlan10
   ip address 10.10.0.1/24
!
interface Vlan110
   ip address 10.110.0.1/24
!
! Note: on a real deployment the phone would learn its voice VLAN
! via LLDP-MED ("network-policy" TLV). cEOS LLDP-MED support is
! limited; on production EOS use `lldp tlv-select med-network-policy`
! and configure the policy under the interface.
!
end
