name: voip-networking

topology:
  kinds:
    arista_ceos:
      image: ceos:4.35.4M
    linux:
      image: ghcr.io/srl-labs/network-multitool

  nodes:
    sw1:
      kind: arista_ceos
      startup-config: configs/sw1.cfg

    # IP phone (data VLAN = 10, voice VLAN = 110)
    phone:
      kind: linux
      exec:
        # Phone uses a tagged subinterface on the voice VLAN
        - ip link add link eth1 name eth1.110 type vlan id 110
        - ip addr add 10.110.0.10/24 dev eth1.110
        - ip link set eth1.110 up
        # Default route via the voice gateway
        - ip route add default via 10.110.0.1
        # Untagged data still works (for a PC daisy-chained)
        - ip addr add 10.10.0.10/24 dev eth1

    # PBX / SIP server
    pbx:
      kind: linux
      exec:
        - ip addr add 10.110.0.50/24 dev eth1
        - ip route add default via 10.110.0.1

    # Bulk data sender on data VLAN — simulates noisy desktop
    desktop:
      kind: linux
      exec:
        - ip addr add 10.10.0.20/24 dev eth1
        - ip route add default via 10.10.0.1

  links:
    - endpoints: ["phone:eth1", "sw1:eth1"]
    - endpoints: ["desktop:eth1", "sw1:eth2"]
    - endpoints: ["pbx:eth1", "sw1:eth3"]
