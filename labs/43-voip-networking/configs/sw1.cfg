hostname sw1
!
vlan 10
   name DATA
!
vlan 110
   name VOICE
!
ip routing
!
interface Ethernet1
   description phone-with-pc-passthrough
   switchport mode access
   switchport access vlan 10
!
interface Ethernet2
   description desktop
   switchport mode access
   switchport access vlan 10
!
interface Ethernet3
   description pbx
   switchport mode access
   switchport access vlan 110
!
interface Vlan10
   ip address 10.10.0.1/24
!
interface Vlan110
   ip address 10.110.0.1/24
!
! ─────────────────────────────────────────────────────────────
! Starter: phone is plugged into Eth1 (data VLAN), PBX into
! Eth3 (voice VLAN), desktop into Eth2 (data VLAN). Right now
! the phone can't reach the PBX (it lives in voice VLAN 110).
! Your tasks:
!   1. Configure Eth1 as a "voice access" port: untagged data
!      VLAN 10 for a daisy-chained PC, tagged voice VLAN 110
!      for the phone itself.
!   2. Mark voice traffic (10.110.0.0/24) DSCP EF, signaling
!      (SIP-typical) DSCP CS5 at ingress.
!   3. Harden the phone port: PortFast, BPDU Guard, and
!      storm-control thresholds (loop/flood-prevention).
!      Note: storm-control is config-only on cEOS (rejected as
!      'not supported on this hardware platform') — shown for
!      production-hardware reference. PortFast/BPDU Guard work.
! ─────────────────────────────────────────────────────────────
!
end
