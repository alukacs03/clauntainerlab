hostname site-a
!
ip routing
!
interface Loopback0
   ip address 1.1.1.1/32
!
! ─── The anycast service IP ───
! Both site-a and site-b announce this same /32. Customers ping it,
! BGP routes them to the nearest one.
interface Loopback100
   description ANYCAST-SERVICE-IP
   ip address 198.51.100.100/32
!
interface Ethernet1
   description to-transit
   no switchport
   ip address 10.1.1.1/30
!
ip route 0.0.0.0/0 10.1.1.2
!
! ─────────────────────────────────────────────────────────────
! Starter: Loopback100 is the anycast service IP. Your task:
! announce it via BGP to the transit, with a higher local-pref or
! some metric that makes site-a "closer" or "preferred" from the
! transit's view. Or use AS-path prepending on site-b to make
! site-a relatively preferred. See README.
! ─────────────────────────────────────────────────────────────
!
end
