hostname transit
!
ip routing
!
interface Loopback0
   ip address 100.100.100.1/32
!
interface Ethernet1
   description to-site-a
   no switchport
   ip address 10.1.1.2/30
!
interface Ethernet2
   description to-site-b
   no switchport
   ip address 10.2.2.2/30
!
interface Ethernet3
   description customer
   no switchport
   ip address 10.50.50.1/24
!
! Pre-configured BGP — sites peer as eBGP customers
router bgp 65000
   router-id 100.100.100.1
   no bgp default ipv4-unicast
   !
   neighbor 10.1.1.1 remote-as 65001
   neighbor 10.1.1.1 description site-a
   neighbor 10.2.2.1 remote-as 65002
   neighbor 10.2.2.1 description site-b
   !
   address-family ipv4
      neighbor 10.1.1.1 activate
      neighbor 10.2.2.1 activate
!
end
