hostname site-b
!
ip routing
!
interface Loopback0
   ip address 2.2.2.2/32
!
interface Loopback100
   ip address 198.51.100.100/32
!
interface Ethernet1
   no switchport
   ip address 10.2.2.1/30
!
ip route 0.0.0.0/0 10.2.2.2
!
! AS-path prepend on outbound to make site-b a longer AS-path
route-map LONGER permit 10
   set as-path prepend 65002 65002
!
router bgp 65002
   router-id 2.2.2.2
   no bgp default ipv4-unicast
   neighbor 10.2.2.2 remote-as 65000
   !
   address-family ipv4
      neighbor 10.2.2.2 activate
      neighbor 10.2.2.2 route-map LONGER out
      network 198.51.100.100/32
!
end
