hostname site-a
!
ip routing
!
interface Loopback0
   ip address 1.1.1.1/32
!
interface Loopback100
   ip address 198.51.100.100/32
!
interface Ethernet1
   no switchport
   ip address 10.1.1.1/30
!
ip route 0.0.0.0/0 10.1.1.2
!
router bgp 65001
   router-id 1.1.1.1
   no bgp default ipv4-unicast
   neighbor 10.1.1.2 remote-as 65000
   !
   address-family ipv4
      neighbor 10.1.1.2 activate
      network 198.51.100.100/32
!
end
