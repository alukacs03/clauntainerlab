hostname sw1
!
! cEOS defaults to MSTP. Switch to Rapid-PVST so per-VLAN priority
! commands actually take effect (in MSTP, `spanning-tree vlan-id ...`
! is silently a no-op).
spanning-tree mode rapid-pvst
!
! Deterministic root: lowest priority wins.
! 4096 = "primary root"; 8192 = "secondary root" (sw2) — never use 0.
! Note: "show spanning-tree" reports the EFFECTIVE priority = configured
! value + VLAN number (sys-id-ext). So this shows as 4106 (4096 + VLAN 10).
spanning-tree vlan-id 10 priority 4096
!
vlan 10
   name USERS
!
interface Ethernet1
   description h1
   switchport mode access
   switchport access vlan 10
!
interface Ethernet2
   description trunk-to-sw2
   switchport mode trunk
   switchport trunk allowed vlan 10
!
interface Ethernet3
   description trunk-to-sw3
   switchport mode trunk
   switchport trunk allowed vlan 10
!
end
