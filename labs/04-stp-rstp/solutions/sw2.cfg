hostname sw2
!
! Match sw1's mode — every switch in the same L2 domain must run the
! same spanning-tree protocol or weird things happen.
spanning-tree mode rapid-pvst
!
! Designated backup root: lowest priority *after* sw1.
spanning-tree vlan-id 10 priority 8192
!
vlan 10
   name USERS
!
interface Ethernet1
   description h2
   switchport mode access
   switchport access vlan 10
!
interface Ethernet2
   description trunk-to-sw1
   switchport mode trunk
   switchport trunk allowed vlan 10
!
interface Ethernet3
   description trunk-to-sw3
   switchport mode trunk
   switchport trunk allowed vlan 10
!
end
