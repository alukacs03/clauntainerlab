hostname sw1
!
vlan 10
   name USERS
!
interface Ethernet1
   description h1
   switchport mode access
   switchport access vlan 10
!
interface Ethernet2
   description trunk-to-sw2
   switchport mode trunk
   switchport trunk allowed vlan 10
!
interface Ethernet3
   description trunk-to-sw3
   switchport mode trunk
   switchport trunk allowed vlan 10
!
! ─────────────────────────────────────────────────────────────
! Starter has working L2 with RSTP enabled by default — there IS
! a loop in this triangle, but STP has already blocked one port
! for you. The lab is about UNDERSTANDING which port and why, then
! taking deliberate control of the design.
!
! Your task: pick sw1 as the deterministic root bridge by lowering
! its priority. See README for the full procedure.
! ─────────────────────────────────────────────────────────────
!
end
