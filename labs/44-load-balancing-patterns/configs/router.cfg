hostname router
!
ip routing
!
interface Ethernet1
   description backend1
   no switchport
   ip address 10.0.1.1/24
!
interface Ethernet2
   description backend2
   no switchport
   ip address 10.0.2.1/24
!
interface Ethernet3
   description backend3
   no switchport
   ip address 10.0.3.1/24
!
interface Ethernet4
   description client
   no switchport
   ip address 10.0.99.1/24
!
! ─────────────────────────────────────────────────────────────
! Starter: 3 backend servers each announce the same VIP
! 10.99.99.1/32 via BGP. Your tasks:
!   1. Configure eBGP to all 3 backends (they run AS 65010,
!      65020, 65030; router is AS 65000).
!   2. Enable ECMP with `maximum-paths 4` so all 3 routes are
!      installed simultaneously.
!   3. Verify load is distributed across all backends.
! Failover speed depends on how the session goes down:
!   - Clean teardown (process exit / graceful shutdown) closes
!     the TCP socket, so the router drops the session and
!     re-hashes within ~1s.
!   - A hard host/link failure with no TCP teardown waits out
!     the BGP hold timer (default ~180s) before the path is
!     removed. For fast detection of hard failures, tune timers
!     and add BFD, e.g.:
!        neighbor 10.0.1.10 timers 3 9
!        ! plus a BFD profile bound to the neighbor
! ─────────────────────────────────────────────────────────────
!
end
