hostname router
!
ip routing
!
interface Ethernet1
   description backend1
   no switchport
   ip address 10.0.1.1/24
!
interface Ethernet2
   description backend2
   no switchport
   ip address 10.0.2.1/24
!
interface Ethernet3
   description backend3
   no switchport
   ip address 10.0.3.1/24
!
interface Ethernet4
   description client
   no switchport
   ip address 10.0.99.1/24
!
! ─────────────────────────────────────────────────────────────
! Starter: 3 backend servers each announce the same VIP
! 10.99.99.1/32 via BGP. Your tasks:
!   1. Configure eBGP to all 3 backends (they run AS 65010,
!      65020, 65030; router is AS 65000).
!   2. Enable ECMP with `maximum-paths 4` so all 3 routes are
!      installed simultaneously.
!   3. Verify load is distributed across all backends.
! Once a backend goes offline, its BGP session drops within
! seconds and traffic re-hashes across the remaining two.
! ─────────────────────────────────────────────────────────────
!
end
