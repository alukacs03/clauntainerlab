hostname router
!
ip routing
!
interface Ethernet1
   description backend1
   no switchport
   ip address 10.0.1.1/24
!
interface Ethernet2
   description backend2
   no switchport
   ip address 10.0.2.1/24
!
interface Ethernet3
   description backend3
   no switchport
   ip address 10.0.3.1/24
!
interface Ethernet4
   description client
   no switchport
   ip address 10.0.99.1/24
!
! ─── eBGP to all 3 backends with ECMP ───
router bgp 65000
   router-id 10.0.99.1
   !
   ! Allow installing multiple equal-cost paths to the same destination
   maximum-paths 4 ecmp 4
   !
   ! Without this, eBGP only installs one path per prefix.
   bgp bestpath as-path multipath-relax
   !
   neighbor 10.0.1.10 remote-as 65010
   neighbor 10.0.2.10 remote-as 65020
   neighbor 10.0.3.10 remote-as 65030
   !
   address-family ipv4
      neighbor 10.0.1.10 activate
      neighbor 10.0.2.10 activate
      neighbor 10.0.3.10 activate
!
end
