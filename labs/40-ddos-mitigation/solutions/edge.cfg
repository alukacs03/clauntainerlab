hostname edge
!
ip routing
!
interface Loopback0
   ip address 10.0.0.1/32
!
interface Ethernet1
   no switchport
   ip address 10.10.10.1/30
!
interface Ethernet2
   no switchport
   ip address 198.51.100.1/24
!
ip route 0.0.0.0/0 10.10.10.2
!
! Match ONLY host routes (/32) inside our range — never the /24 aggregate.
! `ge 32` over a /24 matches lengths 32..32, i.e. only the victim /32s.
ip prefix-list RTBH-CANDIDATES seq 10 permit 198.51.100.0/24 ge 32
!
! ─── RTBH outbound: tag /32 victim routes with the agreed RTBH community,
!     advertise everything else (notably the base /24) untagged ───
route-map TO-UPSTREAM permit 10
   match ip address prefix-list RTBH-CANDIDATES
   set community 65000:666
!
route-map TO-UPSTREAM permit 20
   ! No match/set: the normal /24 (and any non-RTBH prefix) is advertised
   ! WITHOUT the blackhole community, so it stays fully reachable.
!
router bgp 65001
   router-id 10.0.0.1
   no bgp default ipv4-unicast
   !
   neighbor 10.10.10.2 remote-as 65000
   neighbor 10.10.10.2 send-community
   !
   address-family ipv4
      neighbor 10.10.10.2 activate
      neighbor 10.10.10.2 route-map TO-UPSTREAM out
      network 198.51.100.0/24
!
end
