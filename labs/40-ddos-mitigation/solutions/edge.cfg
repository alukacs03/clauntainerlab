hostname edge
!
ip routing
!
interface Loopback0
   ip address 10.0.0.1/32
!
interface Ethernet1
   no switchport
   ip address 10.10.10.1/30
!
interface Ethernet2
   no switchport
   ip address 198.51.100.1/24
!
ip route 0.0.0.0/0 10.10.10.2
!
ip prefix-list RTBH-CANDIDATES seq 10 permit 198.51.100.0/24 le 32
!
! ─── RTBH outbound: tag prefixes with the agreed RTBH community ───
route-map TO-UPSTREAM permit 10
   match ip address prefix-list RTBH-CANDIDATES
   set community 65000:666
!
router bgp 65001
   router-id 10.0.0.1
   no bgp default ipv4-unicast
   !
   neighbor 10.10.10.2 remote-as 65000
   neighbor 10.10.10.2 send-community
   !
   address-family ipv4
      neighbor 10.10.10.2 activate
      neighbor 10.10.10.2 route-map TO-UPSTREAM out
      network 198.51.100.0/24
!
end
