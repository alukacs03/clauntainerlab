hostname upstream
!
ip routing
!
interface Loopback0
   ip address 10.0.0.100/32
!
interface Ethernet1
   description to-edge
   no switchport
   ip address 10.10.10.2/30
!
interface Ethernet2
   description attacker
   no switchport
   ip address 203.0.113.1/24
!
! Pre-configured: receives BGP from edge, processes RTBH community
ip community-list RTBH-FROM-CUSTOMERS permit 65000:666
!
route-map FROM-CUSTOMER-EDGE permit 10
   match community RTBH-FROM-CUSTOMERS
   set ip next-hop 192.0.2.1
   ! 192.0.2.1 is a "blackhole" next-hop — points nowhere, traffic dropped
route-map FROM-CUSTOMER-EDGE permit 100
   ! Accept all other prefixes normally
!
ip route 192.0.2.1/32 Null0
!
router bgp 65000
   router-id 10.0.0.100
   no bgp default ipv4-unicast
   !
   neighbor 10.10.10.1 remote-as 65001
   neighbor 10.10.10.1 send-community
   !
   address-family ipv4
      neighbor 10.10.10.1 activate
      neighbor 10.10.10.1 route-map FROM-CUSTOMER-EDGE in
!
end
