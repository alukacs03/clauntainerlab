hostname edge
!
ip routing
!
interface Loopback0
   ip address 10.0.0.1/32
!
interface Ethernet1
   description to-upstream
   no switchport
   ip address 10.10.10.1/30
!
interface Ethernet2
   description victim
   no switchport
   ip address 198.51.100.1/24
!
ip route 0.0.0.0/0 10.10.10.2
!
router bgp 65001
   router-id 10.0.0.1
   no bgp default ipv4-unicast
   !
   neighbor 10.10.10.2 remote-as 65000
   neighbor 10.10.10.2 description upstream
   neighbor 10.10.10.2 send-community
   !
   address-family ipv4
      neighbor 10.10.10.2 activate
      network 198.51.100.0/24
!
! ─────────────────────────────────────────────────────────────
! Starter: edge router peering with upstream. You can announce
! a "blackhole" route to the upstream — they'll then drop all
! traffic destined to that prefix at their edge, freeing your
! pipe.
!
! Your tasks (see README):
!   1. Define the RTBH community used between you and the upstream
!      (common: <upstream-AS>:666)
!   2. Configure a route-map that recognizes RTBH-tagged routes
!      and marks them as blackholed
!   3. Demonstrate: announce a /32 RTBH for the victim IP under
!      attack — upstream drops traffic to it; attack stops at
!      the upstream's edge, not yours
! ─────────────────────────────────────────────────────────────
!
end
