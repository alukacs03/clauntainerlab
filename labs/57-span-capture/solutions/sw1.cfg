hostname sw1
ip routing
vlan 10
   name PROD
interface Vlan10
   ip address 10.0.0.1/24
interface Ethernet1
   description client
   switchport mode access
   switchport access vlan 10
interface Ethernet2
   description server
   switchport mode access
   switchport access vlan 10
interface Ethernet3
   description capture-box
!
! ─── SPAN / Monitor session ───
monitor session DEBUG source Ethernet1 both
monitor session DEBUG source Ethernet2 both
monitor session DEBUG destination Ethernet3
!
! Production: filter to limit data volume / privacy
! monitor session DEBUG source Ethernet1 both ip access-group ONLY-INTERESTING
!
end
