hostname sw1
ip routing
vlan 10
   name PROD
interface Vlan10
   ip address 10.0.0.1/24
interface Ethernet1
   description client
   switchport mode access
   switchport access vlan 10
interface Ethernet2
   description server
   switchport mode access
   switchport access vlan 10
interface Ethernet3
   description capture-box
!
! ─── Tasks ───
! 1. Configure a SPAN session: source = Ethernet1 and Ethernet2,
!    destination = Ethernet3. Direction = both.
! 2. Verify capture box sees mirrored traffic
! 3. (Optional) Add an ACL-based filter so only specific traffic
!    is mirrored (production: avoid mirroring everything)
!
end
