hostname spine-a
!
ip routing
!
interface Loopback0
   ip address 100.100.100.1/32
!
interface Ethernet1
   no switchport
   ip address 10.0.1.0/31
!
interface Ethernet5
   description DCI to spine-b
   no switchport
   ip address 172.16.0.1/30
!
router bgp 65100
   router-id 100.100.100.1
   no bgp default ipv4-unicast
   maximum-paths 64 ecmp 64
   ! Site A intra-fabric neighbor
   neighbor 10.0.1.1 remote-as 65001
   neighbor 10.0.1.1 send-community extended
   ! ─── DCI neighbor (Site B's border) ───
   neighbor 172.16.0.2 remote-as 65200
   neighbor 172.16.0.2 send-community extended
   neighbor 172.16.0.2 description DCI to spine-b
   !
   address-family ipv4
      neighbor 10.0.1.1 activate
      neighbor 172.16.0.2 activate
      network 100.100.100.1/32
   !
   address-family evpn
      neighbor 10.0.1.1 activate
      neighbor 10.0.1.1 next-hop-unchanged
      neighbor 172.16.0.2 activate
      neighbor 172.16.0.2 next-hop-unchanged
!
end
