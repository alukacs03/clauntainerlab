hostname spine-a
!
ip routing
!
interface Loopback0
   ip address 100.100.100.1/32
!
interface Ethernet1
   description to-leaf-a
   no switchport
   ip address 10.0.1.0/31
!
interface Ethernet5
   description DCI to spine-b
   no switchport
   ip address 172.16.0.1/30
!
router bgp 65100
   router-id 100.100.100.1
   no bgp default ipv4-unicast
   maximum-paths 64 ecmp 64
   neighbor 10.0.1.1 remote-as 65001
   neighbor 10.0.1.1 send-community extended
   !
   address-family ipv4
      neighbor 10.0.1.1 activate
      network 100.100.100.1/32
   !
   address-family evpn
      neighbor 10.0.1.1 activate
      neighbor 10.0.1.1 next-hop-unchanged
!
! ─────────────────────────────────────────────────────────────
! Starter: spine-a knows only Site A. The DCI link to spine-b is
! up at L1 but no BGP session over it. Your task: connect the two
! sites' EVPN domains.
!
! Simplified pattern (back-to-back DCI):
!   - eBGP peering spine-a ↔ spine-b on 172.16.0.0/30
!   - Both IPv4 + EVPN address-families
!   - 'next-hop-unchanged' on EVPN so VTEP IPs propagate intact
!   - Underlay reachability between sites' VTEP loopbacks (advertise them)
!
! Production: real designs use EVPN Multi-Site Border Gateway pattern
! with per-site Type 5 re-origination and ESI handling. We'll discuss
! that in the README but stick with back-to-back here for clarity.
! ─────────────────────────────────────────────────────────────
!
end
