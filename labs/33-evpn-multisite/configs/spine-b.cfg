hostname spine-b
!
ip routing
!
interface Loopback0
   ip address 200.100.100.1/32
!
interface Ethernet1
   description to-leaf-b
   no switchport
   ip address 10.0.2.0/31
!
interface Ethernet5
   description DCI to spine-a
   no switchport
   ip address 172.16.0.2/30
!
router bgp 65200
   router-id 200.100.100.1
   no bgp default ipv4-unicast
   maximum-paths 64 ecmp 64
   neighbor 10.0.2.1 remote-as 65002
   neighbor 10.0.2.1 send-community extended
   !
   address-family ipv4
      neighbor 10.0.2.1 activate
      network 200.100.100.1/32
   !
   address-family evpn
      neighbor 10.0.2.1 activate
      neighbor 10.0.2.1 next-hop-unchanged
!
end
