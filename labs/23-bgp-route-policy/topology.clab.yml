name: bgp-route-policy

topology:
  kinds:
    arista_ceos:
      image: ceos:4.35.4M
    linux:
      image: ghcr.io/srl-labs/network-multitool

  nodes:
    customer:
      kind: arista_ceos
      startup-config: configs/customer.cfg
    isp1:
      kind: arista_ceos
      startup-config: configs/isp1.cfg
    isp2:
      kind: arista_ceos
      startup-config: configs/isp2.cfg

    h1:
      kind: linux
      exec:
        - ip addr add 203.0.113.10/24 dev eth1
        - ip route add default via 203.0.113.1

  links:
    - endpoints: ["h1:eth1", "customer:eth1"]
    - endpoints: ["customer:eth2", "isp1:eth1"]
    - endpoints: ["customer:eth3", "isp2:eth1"]
