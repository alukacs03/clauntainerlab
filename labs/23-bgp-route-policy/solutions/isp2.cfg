hostname isp2
!
ip routing
!
interface Loopback0
   ip address 100.64.0.2/32
!
interface Ethernet1
   no switchport
   ip address 198.51.100.6/30
!
ip route 1.1.1.0/24 Null0
ip route 9.9.9.0/24 Null0
ip route 169.254.0.0/16 Null0
ip route 203.0.113.0/24 Null0
!
router bgp 64513
   router-id 100.64.0.2
   no bgp default ipv4-unicast
   neighbor 198.51.100.5 remote-as 65001
   !
   address-family ipv4
      neighbor 198.51.100.5 activate
      network 1.1.1.0/24
      network 9.9.9.0/24
      network 169.254.0.0/16
      network 203.0.113.0/24
!
end
