hostname isp1
!
ip routing
!
interface Loopback0
   ip address 100.64.0.1/32
!
interface Ethernet1
   no switchport
   ip address 198.51.100.2/30
!
ip route 1.0.0.0/24 Null0
ip route 8.8.8.0/24 Null0
ip route 0.0.0.0/8 Null0
ip route 192.168.0.0/16 Null0
ip route 203.0.113.0/24 Null0
!
router bgp 64512
   router-id 100.64.0.1
   no bgp default ipv4-unicast
   neighbor 198.51.100.1 remote-as 65001
   !
   address-family ipv4
      neighbor 198.51.100.1 activate
      network 1.0.0.0/24
      network 8.8.8.0/24
      network 0.0.0.0/8
      network 192.168.0.0/16
      network 203.0.113.0/24
!
end
