hostname customer
!
ip routing
!
interface Loopback0
   ip address 185.0.0.1/32
!
interface Ethernet1
   description h1
   no switchport
   ip address 203.0.113.1/24
!
interface Ethernet2
   description eBGP-to-isp1
   no switchport
   ip address 198.51.100.1/30
!
interface Ethernet3
   description eBGP-to-isp2
   no switchport
   ip address 198.51.100.5/30
!
! ─── BOGON + own-prefix inbound filter ───
ip prefix-list BOGONS seq 10 permit 0.0.0.0/8 le 32
ip prefix-list BOGONS seq 20 permit 10.0.0.0/8 le 32
ip prefix-list BOGONS seq 30 permit 100.64.0.0/10 le 32
ip prefix-list BOGONS seq 40 permit 127.0.0.0/8 le 32
ip prefix-list BOGONS seq 50 permit 169.254.0.0/16 le 32
ip prefix-list BOGONS seq 60 permit 172.16.0.0/12 le 32
ip prefix-list BOGONS seq 70 permit 192.0.2.0/24 le 32
ip prefix-list BOGONS seq 80 permit 192.168.0.0/16 le 32
ip prefix-list BOGONS seq 90 permit 198.18.0.0/15 le 32
ip prefix-list BOGONS seq 100 permit 224.0.0.0/4 le 32
ip prefix-list BOGONS seq 110 permit 240.0.0.0/4 le 32
!
ip prefix-list OUR-PREFIXES seq 10 permit 203.0.113.0/24
!
! ─── Communities (we'll tag routes per source ISP) ───
ip community-list FROM-ISP1 permit 65001:101
ip community-list FROM-ISP2 permit 65001:102
!
! ─── Inbound route-map for ISP1 ───
route-map FROM-ISP1 deny 10
   match ip address prefix-list BOGONS
route-map FROM-ISP1 deny 20
   match ip address prefix-list OUR-PREFIXES
route-map FROM-ISP1 permit 100
   set community 65001:101
   set local-preference 200
!
! ─── Inbound route-map for ISP2 ───
route-map FROM-ISP2 deny 10
   match ip address prefix-list BOGONS
route-map FROM-ISP2 deny 20
   match ip address prefix-list OUR-PREFIXES
route-map FROM-ISP2 permit 100
   set community 65001:102
   set local-preference 100
!
! ─── Outbound route-map: only advertise OUR prefix to ISPs (no transit) ───
route-map TO-ISP permit 10
   match ip address prefix-list OUR-PREFIXES
! Implicit deny — nothing else is announced
!
router bgp 65001
   router-id 185.0.0.1
   no bgp default ipv4-unicast
   neighbor 198.51.100.2 remote-as 64512
   neighbor 198.51.100.2 description ISP1
   neighbor 198.51.100.6 remote-as 64513
   neighbor 198.51.100.6 description ISP2
   !
   address-family ipv4
      neighbor 198.51.100.2 activate
      neighbor 198.51.100.2 route-map FROM-ISP1 in
      neighbor 198.51.100.2 route-map TO-ISP out
      neighbor 198.51.100.2 send-community
      ! Retain the pre-inbound-policy Adj-RIB-In so `show ... received-routes`
      ! works. Without this, EOS discards filtered routes and received-routes
      ! returns nothing meaningful. (lab/demo aid; costs memory in production.)
      neighbor 198.51.100.2 soft-reconfiguration inbound all
      neighbor 198.51.100.6 activate
      neighbor 198.51.100.6 route-map FROM-ISP2 in
      neighbor 198.51.100.6 route-map TO-ISP out
      neighbor 198.51.100.6 send-community
      neighbor 198.51.100.6 soft-reconfiguration inbound all
      network 203.0.113.0/24
!
end
