hostname customer
!
ip routing
!
interface Loopback0
   ip address 10.0.0.1/32
!
interface Ethernet1
   description h1 (our customer subnet)
   no switchport
   ip address 203.0.113.1/24
!
interface Ethernet2
   description eBGP-to-isp1
   no switchport
   ip address 198.51.100.1/30
!
interface Ethernet3
   description eBGP-to-isp2
   no switchport
   ip address 198.51.100.5/30
!
router bgp 65001
   router-id 10.0.0.1
   no bgp default ipv4-unicast
   neighbor 198.51.100.2 remote-as 64512
   neighbor 198.51.100.2 description ISP1
   neighbor 198.51.100.6 remote-as 64513
   neighbor 198.51.100.6 description ISP2
   !
   address-family ipv4
      neighbor 198.51.100.2 activate
      neighbor 198.51.100.6 activate
      network 203.0.113.0/24
!
! ─────────────────────────────────────────────────────────────
! Starter: customer is multi-homed to ISP1 and ISP2 with no policy.
! Both ISPs send EVERYTHING they have (including bogons, internal
! prefixes, and our own /24 mirrored back). No filtering yet.
!
! Your tasks (see README):
!   1. prefix-list: reject bogon prefixes and our own /24 from being
!      accepted back from ISPs
!   2. community tagging: tag routes from ISP1 with 65001:101,
!      from ISP2 with 65001:102
!   3. community-based local-pref: prefer ISP1 (lp 200) over ISP2 (lp 100)
!   4. as-path filter: only advertise OUR /24 outbound, never transit
!      between ISPs (we're not a transit provider)
! ─────────────────────────────────────────────────────────────
!
end
