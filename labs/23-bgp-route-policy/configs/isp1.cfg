hostname isp1
!
ip routing
!
interface Loopback0
   ip address 185.1.1.1/32
!
interface Ethernet1
   description eBGP-to-customer
   no switchport
   ip address 198.51.100.2/30
!
! ISP1 simulates upstream — advertises a chunk of "internet" plus
! some bogon prefixes the customer should filter.
ip route 1.0.0.0/24 Null0
ip route 8.8.8.0/24 Null0
ip route 0.0.0.0/8 Null0        ! BOGON — should be filtered by customer
ip route 192.168.0.0/16 Null0   ! BOGON — should be filtered
ip route 203.0.113.0/24 Null0   ! Customer's own prefix — should be filtered when sent back
!
router bgp 64512
   router-id 185.1.1.1
   no bgp default ipv4-unicast
   neighbor 198.51.100.1 remote-as 65001
   !
   address-family ipv4
      neighbor 198.51.100.1 activate
      network 1.0.0.0/24
      network 8.8.8.0/24
      network 0.0.0.0/8
      network 192.168.0.0/16
      network 203.0.113.0/24
!
end
