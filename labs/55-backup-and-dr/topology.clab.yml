name: backup-and-dr

topology:
  kinds:
    arista_ceos:
      image: ceos:4.35.4M
    linux:
      image: ghcr.io/srl-labs/network-multitool

  nodes:
    sw1:
      kind: arista_ceos
      startup-config: configs/sw1.cfg

    backup-server:
      kind: linux
      exec:
        - ip addr add 10.0.0.100/24 dev eth1
        - mkdir -p /backups
        # Pre-stage the device inventory the backup script reads.
        # One device (eAPI address) per line; here just sw1 on 10.0.0.1.
        - mkdir -p /etc/network-backups
        - sh -c 'echo 10.0.0.1 > /etc/network-backups/devices.txt'

  links:
    - endpoints: ["backup-server:eth1", "sw1:eth1"]
