hostname spine1
!
ip routing
!
interface Loopback0
   ip address 100.100.100.1/32
!
interface Ethernet1
   no switchport
   ip address 10.0.1.0/31
!
interface Ethernet2
   no switchport
   ip address 10.0.2.0/31
!
router bgp 65100
   router-id 100.100.100.1
   no bgp default ipv4-unicast
   maximum-paths 64 ecmp 64
   neighbor 10.0.1.1 remote-as 65001
   neighbor 10.0.2.1 remote-as 65002
   !
   address-family ipv4
      neighbor 10.0.1.1 activate
      neighbor 10.0.2.1 activate
      network 100.100.100.1/32
!
! ─────────────────────────────────────────────────────────────
! Starter: spine carries underlay IPv4 only. Your task here is
! easy — enable EVPN address-family on the spine's existing
! sessions to act as a transparent forwarder for EVPN routes,
! and add 'next-hop-unchanged' so VXLAN endpoints encap directly
! leaf→leaf, not via the spine.
! ─────────────────────────────────────────────────────────────
!
end
