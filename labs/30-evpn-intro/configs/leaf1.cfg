hostname leaf1
!
ip routing
!
interface Loopback0
   ip address 1.1.1.1/32
!
interface Loopback1
   ip address 11.11.11.11/32
!
vlan 100
   name TENANT-A
!
interface Ethernet1
   no switchport
   ip address 10.0.1.1/31
!
interface Ethernet3
   switchport mode access
   switchport access vlan 100
!
router bgp 65001
   router-id 1.1.1.1
   no bgp default ipv4-unicast
   maximum-paths 64 ecmp 64
   neighbor 10.0.1.0 remote-as 65100
   !
   address-family ipv4
      neighbor 10.0.1.0 activate
      network 1.1.1.1/32
      network 11.11.11.11/32
!
! ─────────────────────────────────────────────────────────────
! Starter has the lab 29 topology minus the VXLAN configuration.
! Your tasks (see README):
!   1. Activate EVPN address-family on the spine neighbor
!   2. Configure Vxlan1 with source = Loopback1 and VLAN-VNI map
!      (NO flood-vtep list — EVPN will discover peers)
!   3. Under router bgp, add the VLAN 100 service instance with
!      RD + RT + redistribute learned
!   4. Verify EVPN Type 3 (multicast) and Type 2 (MAC/IP) routes
! ─────────────────────────────────────────────────────────────
!
end
