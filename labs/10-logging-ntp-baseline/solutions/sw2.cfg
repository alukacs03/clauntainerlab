hostname sw2
!
clock timezone UTC
ntp server 10.99.0.10 prefer
!
logging host 10.99.0.10
logging level all informational
logging buffered 16384 informational
logging trap informational
logging source-interface Ethernet1
!
banner login
^ AUTHORIZED ACCESS ONLY. This system is the property of the operator.
^ All activity is monitored and recorded. Disconnect immediately if you
^ are not an authorized user.
EOF
!
management console
   idle-timeout 10
!
management ssh
   no shutdown
   idle-timeout 10
   authentication retries 3
!
interface Ethernet1
   description to-services
   no switchport
   ip address 10.99.0.2/24
!
username admin privilege 15 secret 0 admin
!
end
