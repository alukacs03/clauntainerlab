hostname sw2
!
! ─── Time sync ───
clock timezone UTC
ntp server 10.99.0.10 prefer
!
! ─── Remote logging ───
logging host 10.99.0.10
logging buffered 16384 informational
logging trap informational
logging source-interface Ethernet1
!
! ─── Login banner (legal warning) ───
banner login
AUTHORIZED ACCESS ONLY. This system is the property of the operator.
All activity is monitored and recorded. Disconnect immediately if you
are not an authorized user.
EOF
!
banner motd
sw2 — production access switch
Changes via change management only. AAA logs are forwarded to SIEM.
EOF
!
! ─── Session hygiene ───
management console
   idle-timeout 10
!
management ssh
   no shutdown
   idle-timeout 10
!
! ─── Brute-force protection ───
! EOS has no per-session SSH retry counter; it enforces lockout via AAA.
! Lock an account after 3 failed logins inside a 60s window, for 300s.
aaa authentication policy lockout failure 3 window 60 duration 300
!
! ─── Turn off insecure services ───
no management api http-commands
management api http-commands
   no shutdown
   protocol https
   no protocol http
!
! ─── Auth logging ───
aaa authentication policy on-failure log
aaa authentication policy on-success log
!
interface Ethernet1
   description to-services
   no switchport
   ip address 10.99.0.2/24
!
username admin privilege 15 secret 0 admin
!
end
