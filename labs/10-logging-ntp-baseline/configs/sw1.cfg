hostname sw1
!
interface Ethernet1
   description to-services
   no switchport
   ip address 10.99.0.1/24
!
username admin privilege 15 secret 0 admin
!
management ssh
   no shutdown
!
! ─────────────────────────────────────────────────────────────
! Starter has the bare minimum to boot. No NTP, no remote logging,
! no banner, default timeouts, HTTP server enabled by default.
!
! Your tasks (see README):
!   1. Configure NTP client pointing at 10.99.0.10
!   2. Configure remote syslog to 10.99.0.10
!   3. Apply baseline hardening: banner, exec timeout, disable HTTP,
!      password complexity, console timeout
!   4. Verify time syncs and log lines arrive at the syslog server
! ─────────────────────────────────────────────────────────────
!
end
