name: logging-ntp-baseline

topology:
  kinds:
    arista_ceos:
      image: ceos:4.35.4M
    linux:
      image: ghcr.io/srl-labs/network-multitool

  nodes:
    sw1:
      kind: arista_ceos
      startup-config: configs/sw1.cfg

    sw2:
      kind: arista_ceos
      startup-config: configs/sw2.cfg

    # Combined NTP + syslog server
    services:
      kind: linux
      binds:
        - syslog/rsyslog.conf:/etc/rsyslog.d/99-network.conf
      exec:
        - ip addr add 10.99.0.10/24 dev eth1
        - sh -c "apt-get update -qq && apt-get install -y -qq chrony rsyslog || true"
        - sh -c "echo 'allow 10.99.0.0/24' >> /etc/chrony/chrony.conf && echo 'local stratum 10' >> /etc/chrony/chrony.conf"
        - sh -c "service rsyslog restart && service chrony restart"

  links:
    - endpoints: ["sw1:eth1", "services:eth1"]
    - endpoints: ["sw2:eth1", "services:eth2"]
