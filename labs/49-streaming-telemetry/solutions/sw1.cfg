hostname sw1
!
username admin privilege 15 secret 0 admin
!
ip routing
!
interface Ethernet1
   description collector
   no switchport
   ip address 10.0.0.1/24
!
! ─── gNMI server enabled ───
! For lab simplicity: no TLS. We do NOT configure an `ssl profile`, so EOS
! runs the gRPC listener insecurely (operationally reports "SSL Profile: none").
! Production: always TLS + client-cert auth via `management security ssl profile`.
!
! OpenConfig models are exposed by DEFAULT over gNMI — no extra config needed.
! `provider eos-native` ADDITIONALLY exposes the Arista native (eos://) origin,
! so the collector can query both OpenConfig and vendor-native paths.
management api gnmi
   transport grpc default
      port 6030
   provider eos-native
!
end
