hostname sw1
!
username admin privilege 15 secret 0 admin
!
ip routing
!
interface Ethernet1
   description collector
   no switchport
   ip address 10.0.0.1/24
!
! ─── gNMI server enabled ───
management api gnmi
   transport grpc default
      port 6030
      ! For lab simplicity: no TLS. Production: always TLS + client cert auth.
      ssl profile NONE
   provider eos-native
!
! Allow OpenConfig YANG models (in addition to EOS-native)
management api models
   provider eos-native
      path /openconfig
!
end
