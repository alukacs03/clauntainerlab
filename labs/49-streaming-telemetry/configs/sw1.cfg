hostname sw1
!
username admin privilege 15 secret 0 admin
!
ip routing
!
interface Ethernet1
   description collector
   no switchport
   ip address 10.0.0.1/24
!
! ─────────────────────────────────────────────────────────────
! Starter: device with reachability to the telemetry collector
! over Ethernet1 (a routed data port, not the OOB Management
! interface). Your tasks:
!   1. Enable the gNMI server (the "management api gnmi" stanza)
!   2. OpenConfig is exposed by default; add `provider eos-native`
!      to ALSO expose the Arista native paths
!   3. From collector, use `gnmic` to subscribe to interface
!      counters and verify push-based streaming works.
! ─────────────────────────────────────────────────────────────
!
end
