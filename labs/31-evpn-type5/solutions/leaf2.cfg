hostname leaf2
!
ip routing
ip routing vrf TENANT-A
!
vrf instance TENANT-A
!
interface Loopback0
   ip address 2.2.2.2/32
!
interface Loopback1
   ip address 22.22.22.22/32
!
vlan 200
   name SERVERS
!
vlan 4094
   name L3-VNI-TENANT-A
   trunk group L3-VRF-TENANT-A
!
interface Ethernet1
   no switchport
   ip address 10.0.2.1/31
!
interface Ethernet3
   switchport mode access
   switchport access vlan 200
!
interface Vlan200
   vrf TENANT-A
   ip address 10.20.20.1/24
!
interface Vlan4094
   vrf TENANT-A
   ip address virtual 169.254.0.1/24
!
interface Vxlan1
   vxlan source-interface Loopback1
   vxlan udp-port 4789
   vxlan vlan 200 vni 10200
   vxlan vrf TENANT-A vni 50001
!
router bgp 65002
   router-id 2.2.2.2
   no bgp default ipv4-unicast
   maximum-paths 64 ecmp 64
   neighbor 10.0.2.0 remote-as 65100
   neighbor 10.0.2.0 send-community extended
   !
   vlan 200
      rd 2.2.2.2:10200
      route-target both 10200:10200
      redistribute learned
   !
   vrf TENANT-A
      rd 2.2.2.2:50001
      route-target import evpn 50001:50001
      route-target export evpn 50001:50001
      redistribute connected
   !
   address-family ipv4
      neighbor 10.0.2.0 activate
      network 2.2.2.2/32
      network 22.22.22.22/32
   !
   address-family evpn
      neighbor 10.0.2.0 activate
!
end
