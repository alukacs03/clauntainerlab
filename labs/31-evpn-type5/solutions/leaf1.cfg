hostname leaf1
!
ip routing
ip routing vrf TENANT-A
!
vrf instance TENANT-A
!
interface Loopback0
   ip address 1.1.1.1/32
!
interface Loopback1
   ip address 11.11.11.11/32
!
vlan 100
   name USERS
!
! L3 VNI uses a dedicated VLAN (4094 here) — convention
vlan 4094
   name L3-VNI-TENANT-A
   trunk group L3-VRF-TENANT-A
!
interface Ethernet1
   no switchport
   ip address 10.0.1.1/31
!
interface Ethernet3
   switchport mode access
   switchport access vlan 100
!
interface Vlan100
   vrf TENANT-A
   ip address 10.10.10.1/24
!
interface Vlan4094
   vrf TENANT-A
   ip address virtual 169.254.0.1/24      ! anycast — won't matter for L3 VNI routing
!
interface Vxlan1
   vxlan source-interface Loopback1
   vxlan udp-port 4789
   vxlan vlan 100 vni 10100
   vxlan vrf TENANT-A vni 50001
!
router bgp 65001
   router-id 1.1.1.1
   no bgp default ipv4-unicast
   maximum-paths 64 ecmp 64
   neighbor 10.0.1.0 remote-as 65100
   neighbor 10.0.1.0 send-community extended
   !
   vlan 100
      rd 1.1.1.1:10100
      route-target both 10100:10100
      redistribute learned
   !
   vrf TENANT-A
      rd 1.1.1.1:50001
      route-target import evpn 50001:50001
      route-target export evpn 50001:50001
      redistribute connected
   !
   address-family ipv4
      neighbor 10.0.1.0 activate
      network 1.1.1.1/32
      network 11.11.11.11/32
   !
   address-family evpn
      neighbor 10.0.1.0 activate
!
end
