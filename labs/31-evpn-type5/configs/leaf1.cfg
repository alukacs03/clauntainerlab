hostname leaf1
!
ip routing
ip routing vrf TENANT-A
!
vrf instance TENANT-A
!
interface Loopback0
   ip address 1.1.1.1/32
!
interface Loopback1
   ip address 11.11.11.11/32
!
vlan 100
   name USERS
!
interface Ethernet1
   no switchport
   ip address 10.0.1.1/31
!
interface Ethernet3
   description h1
   switchport mode access
   switchport access vlan 100
!
interface Vlan100
   description VLAN 100 SVI (tenant gateway)
   vrf TENANT-A
   ip address 10.10.10.1/24
!
router bgp 65001
   router-id 1.1.1.1
   no bgp default ipv4-unicast
   maximum-paths 64 ecmp 64
   neighbor 10.0.1.0 remote-as 65100
   neighbor 10.0.1.0 send-community extended
   !
   address-family ipv4
      neighbor 10.0.1.0 activate
      network 1.1.1.1/32
      network 11.11.11.11/32
   !
   address-family evpn
      neighbor 10.0.1.0 activate
!
! ─────────────────────────────────────────────────────────────
! Starter: tenant VRF + SVI exists, no overlay yet. h1's traffic
! to h2 (different subnet, different leaf) has no path.
!
! Your tasks (see README):
!   1. Create L2 VNI mapping: VLAN 100 ↔ VNI 10100
!   2. Create L3 VNI for the VRF: VNI 50001
!   3. Configure EVPN VRF instance with RD/RT
!   4. Verify Type 5 routes appear and h1 ↔ h2 works inter-VNI
! ─────────────────────────────────────────────────────────────
!
end
