hostname sw1
!
ip routing
ipv6 unicast-routing
!
interface Loopback0
   ip address 1.1.1.1/32
   ipv6 address 2001:db8::1/128
   ipv6 ospf 1 area 0
!
interface Ethernet1
   description to-sw2
   no switchport
   ip address 10.1.12.1/30
   ipv6 address 2001:db8:1:12::1/64
   ipv6 ospf 1 area 0
   ip ospf network point-to-point
   ospfv3 network point-to-point
!
interface Ethernet2
   description h1
   no switchport
   ip address 10.10.10.1/24
   ipv6 address 2001:db8:10:10::1/64
   ipv6 nd ra interval 4
   ipv6 ospf 1 area 0
!
router ospf 1
   router-id 1.1.1.1
   network 1.1.1.1/32 area 0
   network 10.1.12.0/30 area 0
   network 10.10.10.0/24 area 0
!
ipv6 router ospf 1
   router-id 1.1.1.1
!
end
