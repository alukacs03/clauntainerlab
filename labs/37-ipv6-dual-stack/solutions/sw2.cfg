hostname sw2
!
ip routing
ipv6 unicast-routing
!
interface Loopback0
   ip address 2.2.2.2/32
   ipv6 address 2001:db8::2/128
!
interface Ethernet1
   no switchport
   ip address 10.1.12.2/30
   ipv6 address 2001:db8:1:12::2/64
   ipv6 ospf 1 area 0
   ip ospf network point-to-point
!
interface Ethernet2
   no switchport
   ip address 10.20.20.1/24
   ipv6 address 2001:db8:20:20::1/64
   ipv6 nd ra interval 4
   ipv6 ospf 1 area 0
!
router ospf 1
   router-id 2.2.2.2
   network 2.2.2.2/32 area 0
   network 10.1.12.0/30 area 0
   network 10.20.20.0/24 area 0
!
ipv6 router ospf 1
   router-id 2.2.2.2
!
end
