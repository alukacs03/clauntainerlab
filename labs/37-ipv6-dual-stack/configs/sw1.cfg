hostname sw1
!
ip routing
ipv6 unicast-routing
!
interface Loopback0
   ip address 1.1.1.1/32
   ipv6 address 2001:db8::1/128
!
interface Ethernet1
   description to-sw2
   no switchport
   ip address 10.1.12.1/30
   ipv6 address 2001:db8:1:12::1/64
!
interface Ethernet2
   description h1
   no switchport
   ip address 10.10.10.1/24
   ipv6 address 2001:db8:10:10::1/64
   ipv6 nd ra interval 4
!
router ospf 1
   router-id 1.1.1.1
   network 1.1.1.1/32 area 0
   network 10.1.12.0/30 area 0
   network 10.10.10.0/24 area 0
!
ipv6 router ospf 1
   router-id 1.1.1.1
!
! ─────────────────────────────────────────────────────────────
! Starter: IPv4 OSPF is already configured, and Router Advertisements
! (ipv6 nd ra interval 4) are already seeded on BOTH switches' host-facing
! interfaces — you do NOT add RAs, you just verify they work. Your job is
! to bring up the OSPFv3 (IPv6) routing layer.
!
! Your tasks (see README):
!   1. Enable OSPFv3 on the interfaces (ipv6 ospf 1 area 0) so IPv6 prefixes
!      are advertised; set the transit link p2p for BOTH families
!      (ip ospf network point-to-point AND ospfv3 network point-to-point)
!   2. Verify RAs are being sent on the host-facing interface
!   3. Verify h1 receives a SLAAC address; h2 receives a SLAAC address
!   4. Verify end-to-end IPv6 connectivity from h1 to h2
! ─────────────────────────────────────────────────────────────
!
end
