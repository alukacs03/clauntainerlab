hostname sw1
!
ip routing
ipv6 unicast-routing
!
interface Loopback0
   ip address 1.1.1.1/32
   ipv6 address 2001:db8::1/128
!
interface Ethernet1
   description to-sw2
   no switchport
   ip address 10.1.12.1/30
   ipv6 address 2001:db8:1:12::1/64
!
interface Ethernet2
   description h1
   no switchport
   ip address 10.10.10.1/24
   ipv6 address 2001:db8:10:10::1/64
   ipv6 nd ra interval 4
!
router ospf 1
   router-id 1.1.1.1
   network 1.1.1.1/32 area 0
   network 10.1.12.0/30 area 0
   network 10.10.10.0/24 area 0
!
ipv6 router ospf 1
   router-id 1.1.1.1
!
! ─────────────────────────────────────────────────────────────
! Starter: IPv4 OSPF is already configured. Your task: bring up
! IPv6 fully — OSPFv3 for IPv6 routing, RAs (Router Advertisements)
! on host-facing interfaces for SLAAC.
!
! Your tasks (see README):
!   1. Configure OSPFv3 (ipv6 router ospf) to advertise IPv6 prefixes
!   2. Verify RAs are being sent on h1-facing interface
!   3. Verify h1 receives SLAAC address; h2 receives SLAAC address
!   4. Verify end-to-end IPv6 connectivity from h1 to h2
! ─────────────────────────────────────────────────────────────
!
end
