hostname sw1
!
ip routing
!
interface Loopback0
   ip address 1.1.1.1/32
!
interface Ethernet1
   description h1
   no switchport
   ip address 10.1.0.1/24
!
interface Ethernet2
   description eBGP-to-sw3
   no switchport
   ip address 10.13.0.1/30
!
interface Ethernet3
   description iBGP-to-sw2
   no switchport
   ip address 10.12.0.1/30
!
router bgp 65001
   router-id 1.1.1.1
   no bgp default ipv4-unicast
   neighbor 10.13.0.2 remote-as 65002
   neighbor 10.13.0.2 description sw3-eBGP
   neighbor 10.12.0.2 remote-as 65001
   neighbor 10.12.0.2 description sw2-iBGP
   !
   address-family ipv4
      neighbor 10.13.0.2 activate
      neighbor 10.12.0.2 activate
      neighbor 10.12.0.2 next-hop-self
      network 10.1.0.0/24
!
! ─────────────────────────────────────────────────────────────
! Starter has BGP up between all 4 routers. From sw1's view there
! are TWO eBGP paths to reach AS 65002's prefix 10.4.0.0/24:
!   Path A: sw1 → sw3 → sw4         (direct)
!   Path B: sw1 → sw2 → sw4         (via iBGP, then sw2's eBGP)
!
! Currently sw1 picks one based on tiebreakers (router-id, etc.).
! Your job: deliberately influence the choice via attributes.
! See README for the three tasks (local-pref, AS-path prepend, MED).
! ─────────────────────────────────────────────────────────────
!
end
