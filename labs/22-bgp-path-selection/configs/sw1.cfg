hostname sw1
!
ip routing
!
interface Loopback0
   ip address 1.1.1.1/32
!
interface Ethernet1
   description h1
   no switchport
   ip address 10.1.0.1/24
!
interface Ethernet2
   description eBGP-to-sw3
   no switchport
   ip address 10.13.0.1/30
!
interface Ethernet3
   description iBGP-to-sw2
   no switchport
   ip address 10.12.0.1/30
!
router bgp 65001
   router-id 1.1.1.1
   no bgp default ipv4-unicast
   neighbor 10.13.0.2 remote-as 65002
   neighbor 10.13.0.2 description sw3-eBGP
   neighbor 10.12.0.2 remote-as 65001
   neighbor 10.12.0.2 description sw2-iBGP
   !
   address-family ipv4
      neighbor 10.13.0.2 activate
      neighbor 10.12.0.2 activate
      neighbor 10.12.0.2 next-hop-self
      network 10.1.0.0/24
!
! ─────────────────────────────────────────────────────────────
! Starter has BGP up between all 4 routers. From sw1's view there
! are TWO paths to reach AS 65002's prefix 10.4.0.0/24:
!   Path A: sw1 → sw3 → sw4   (sw3 is an eBGP neighbor — direct)
!   Path B: sw1 → sw2 → sw4   (learned over iBGP from sw2)
!
! These are NOT symmetric: Path A is eBGP-learned, Path B is iBGP-
! learned. With equal AS-path and MED at baseline, sw1 picks Path A
! at the "eBGP over iBGP" decision step — deterministically, before
! any router-id tiebreaker. Confirm with:
!   show ip bgp 10.4.0.0/24 detail   (read the "Not best:" reason)
!
! Your job: deliberately influence the choice via attributes, and
! observe WHICH attributes can override the eBGP-over-iBGP step
! (AS-path, local-pref) versus which only annotate the route (MED).
! See README for the four phases (local-pref, AS-path prepend, MED,
! and local-pref-vs-prepend).
! ─────────────────────────────────────────────────────────────
!
end
