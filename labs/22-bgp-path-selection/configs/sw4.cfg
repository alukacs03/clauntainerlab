hostname sw4
!
ip routing
!
interface Loopback0
   ip address 4.4.4.4/32
!
interface Ethernet1
   description h4
   no switchport
   ip address 10.4.0.1/24
!
interface Ethernet2
   description eBGP-to-sw2
   no switchport
   ip address 10.24.0.4/30
!
interface Ethernet3
   description iBGP-to-sw3
   no switchport
   ip address 10.34.0.4/30
!
router bgp 65002
   router-id 4.4.4.4
   no bgp default ipv4-unicast
   neighbor 10.24.0.2 remote-as 65001
   neighbor 10.24.0.2 description sw2-eBGP
   neighbor 10.34.0.3 remote-as 65002
   neighbor 10.34.0.3 description sw3-iBGP
   !
   address-family ipv4
      neighbor 10.24.0.2 activate
      neighbor 10.34.0.3 activate
      neighbor 10.34.0.3 next-hop-self
      network 10.4.0.0/24
!
end
