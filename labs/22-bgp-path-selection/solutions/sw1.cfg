hostname sw1
!
! ═══════════════════════════════════════════════════════════════════
! SOLUTION — coherent END STATE = Phase 4 (local-pref + AS-path prepend
! both active, to prove local-pref outranks AS-path).
!
! The README's phases are SEQUENTIAL and mostly MUTUALLY EXCLUSIVE — do
! NOT read these four solution files as "all active at once equals the
! lab." Each route-map below is tagged with the phase it belongs to:
!   sw1: PREFER-SW3 (Phase 1 / Phase 4)  — local-pref, ACTIVE here
!   sw3: LONGER-PATH-TO-SW1 (Phase 2 / Phase 4) — prepend, ACTIVE here
!   sw3: LOW-MED  (Phase 3 only) — shown as reference, NOT applied here
!   sw4: HIGH-MED (Phase 3 only) — shown as reference, NOT applied here
!
! In this Phase-4 end state sw1 sees the sw3 path with AS-path
! [65002 65002 65002] (prepended) AND local-preference 200. Local-pref
! (decision step 2) beats AS-path length (step 4), so sw3 still wins.
! ═══════════════════════════════════════════════════════════════════
!
ip routing
!
interface Loopback0
   ip address 1.1.1.1/32
!
interface Ethernet1
   description h1
   no switchport
   ip address 10.1.0.1/24
!
interface Ethernet2
   description eBGP-to-sw3
   no switchport
   ip address 10.13.0.1/30
!
interface Ethernet3
   description iBGP-to-sw2
   no switchport
   ip address 10.12.0.1/30
!
! ─── Phase 1 / Phase 4: local-preference on routes received from sw3 ───
route-map PREFER-SW3 permit 10
   set local-preference 200
!
router bgp 65001
   router-id 1.1.1.1
   no bgp default ipv4-unicast
   neighbor 10.13.0.2 remote-as 65002
   neighbor 10.13.0.2 description sw3-eBGP
   neighbor 10.12.0.2 remote-as 65001
   neighbor 10.12.0.2 description sw2-iBGP
   !
   address-family ipv4
      neighbor 10.13.0.2 activate
      neighbor 10.13.0.2 route-map PREFER-SW3 in
      neighbor 10.12.0.2 activate
      neighbor 10.12.0.2 next-hop-self
      network 10.1.0.0/24
!
end
