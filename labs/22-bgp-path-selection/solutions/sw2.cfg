hostname sw2
!
ip routing
!
interface Loopback0
   ip address 2.2.2.2/32
!
interface Ethernet2
   no switchport
   ip address 10.24.0.2/30
!
interface Ethernet3
   no switchport
   ip address 10.12.0.2/30
!
router bgp 65001
   router-id 2.2.2.2
   no bgp default ipv4-unicast
   neighbor 10.24.0.4 remote-as 65002
   neighbor 10.12.0.1 remote-as 65001
   !
   address-family ipv4
      neighbor 10.24.0.4 activate
      neighbor 10.12.0.1 activate
      neighbor 10.12.0.1 next-hop-self
!
end
