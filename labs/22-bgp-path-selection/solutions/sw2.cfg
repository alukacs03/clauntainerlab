hostname sw2
!
! SOLUTION — sw2 has no policy of its own in any phase. It only relays
! the sw4 path over eBGP and the sw1 path over iBGP. In the Phase-4 end
! state, sw2 inherits local-preference 200 for the sw3 exit via iBGP
! from sw1 (local-pref is carried inside the AS), so all of AS 65001
! agrees on the sw1→sw3 exit.
!
ip routing
!
interface Loopback0
   ip address 2.2.2.2/32
!
interface Ethernet2
   description eBGP-to-sw4
   no switchport
   ip address 10.24.0.2/30
!
interface Ethernet3
   description iBGP-to-sw1
   no switchport
   ip address 10.12.0.2/30
!
router bgp 65001
   router-id 2.2.2.2
   no bgp default ipv4-unicast
   neighbor 10.24.0.4 remote-as 65002
   neighbor 10.24.0.4 description sw4-eBGP
   neighbor 10.12.0.1 remote-as 65001
   neighbor 10.12.0.1 description sw1-iBGP
   !
   address-family ipv4
      neighbor 10.24.0.4 activate
      neighbor 10.12.0.1 activate
      neighbor 10.12.0.1 next-hop-self
!
end
