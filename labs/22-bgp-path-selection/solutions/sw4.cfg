hostname sw4
!
ip routing
!
interface Loopback0
   ip address 4.4.4.4/32
!
interface Ethernet1
   description h4
   no switchport
   ip address 10.4.0.1/24
!
interface Ethernet2
   no switchport
   ip address 10.24.0.4/30
!
interface Ethernet3
   no switchport
   ip address 10.34.0.4/30
!
! Set MED differently per peer so AS 65001 prefers sw1-sw3 inbound
! to 10.4.0.0/24 (assuming local-pref is equal on AS 65001's side).
! Lower MED = more preferred.
route-map LOW-MED permit 10
   set metric 50
!
router bgp 65002
   router-id 4.4.4.4
   no bgp default ipv4-unicast
   neighbor 10.24.0.2 remote-as 65001
   neighbor 10.24.0.2 route-map LOW-MED out
   neighbor 10.34.0.3 remote-as 65002
   !
   address-family ipv4
      neighbor 10.24.0.2 activate
      neighbor 10.34.0.3 activate
      neighbor 10.34.0.3 next-hop-self
      network 10.4.0.0/24
!
end
