hostname sw4
!
! SOLUTION — see header in solutions/sw1.cfg for the phase map.
! sw4 has no ACTIVE policy in the Phase-4 end state.
! REFERENCE only: HIGH-MED (Phase 3) — sets a HIGHER metric toward sw2
! so that AS 65001 would (all else equal) prefer the sw1-sw3 exit over
! the sw2-sw4 exit. Application is commented out because Phase 3 is
! mutually exclusive with this Phase-4 end state.
!
ip routing
!
interface Loopback0
   ip address 4.4.4.4/32
!
interface Ethernet1
   description h4
   no switchport
   ip address 10.4.0.1/24
!
interface Ethernet2
   description eBGP-to-sw2
   no switchport
   ip address 10.24.0.4/30
!
interface Ethernet3
   description iBGP-to-sw3
   no switchport
   ip address 10.34.0.4/30
!
! ─── Phase 3 ONLY (reference, NOT applied in this end state) ───
! Higher MED on the sw2 exit = less preferred. Paired with sw3's LOW-MED
! (metric 50), this makes MED agree that the sw1-sw3 path is better.
! Note: in this topology MED does not flip the installed path — the
! eBGP-vs-iBGP asymmetry at sw1 has already decided it. See README.
route-map HIGH-MED permit 10
   set metric 100
!
router bgp 65002
   router-id 4.4.4.4
   no bgp default ipv4-unicast
   neighbor 10.24.0.2 remote-as 65001
   neighbor 10.24.0.2 description sw2-eBGP
   neighbor 10.34.0.3 remote-as 65002
   neighbor 10.34.0.3 description sw3-iBGP
   !
   address-family ipv4
      neighbor 10.24.0.2 activate
      ! Phase 3 only: neighbor 10.24.0.2 route-map HIGH-MED out
      neighbor 10.34.0.3 activate
      neighbor 10.34.0.3 next-hop-self
      network 10.4.0.0/24
!
end
