hostname sw3
!
! SOLUTION — see header in solutions/sw1.cfg for the phase map.
! ACTIVE here: LONGER-PATH-TO-SW1 (Phase 2 / Phase 4 AS-path prepend).
! REFERENCE only: LOW-MED (Phase 3) — kept so you can study the MED
! syntax, but its neighbor application is commented out because Phase 3
! is mutually exclusive with the Phase-4 end state this file represents.
!
ip routing
!
interface Loopback0
   ip address 3.3.3.3/32
!
interface Ethernet2
   description eBGP-to-sw1
   no switchport
   ip address 10.13.0.2/30
!
interface Ethernet3
   description iBGP-to-sw4
   no switchport
   ip address 10.34.0.3/30
!
! ─── Phase 2 / Phase 4: prepend our own AS twice toward sw1 ───
! Makes our path look longer (AS-path [65002 65002 65002]) so that — if
! local-pref were equal — sw1 would prefer the sw2-sw4 path. In the
! Phase-4 end state sw1's local-pref 200 (step 2) overrides this prepend
! (step 4), so sw3 still wins; the prepend is what proves the ordering.
route-map LONGER-PATH-TO-SW1 permit 10
   set as-path prepend 65002 65002
!
! ─── Phase 3 ONLY (reference, NOT applied in this end state) ───
! Lower MED = more preferred. In Phase 3 you'd apply this outbound to
! sw1 while sw4 applies HIGH-MED toward sw2. See README: in this
! topology MED does not flip the path, it only annotates it.
route-map LOW-MED permit 10
   set metric 50
!
router bgp 65002
   router-id 3.3.3.3
   no bgp default ipv4-unicast
   neighbor 10.13.0.1 remote-as 65001
   neighbor 10.13.0.1 description sw1-eBGP
   neighbor 10.34.0.4 remote-as 65002
   neighbor 10.34.0.4 description sw4-iBGP
   !
   address-family ipv4
      neighbor 10.13.0.1 activate
      neighbor 10.13.0.1 route-map LONGER-PATH-TO-SW1 out
      ! Phase 3 only: neighbor 10.13.0.1 route-map LOW-MED out
      neighbor 10.34.0.4 activate
      neighbor 10.34.0.4 next-hop-self
!
end
