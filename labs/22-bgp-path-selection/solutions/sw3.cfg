hostname sw3
!
ip routing
!
interface Loopback0
   ip address 3.3.3.3/32
!
interface Ethernet2
   no switchport
   ip address 10.13.0.2/30
!
interface Ethernet3
   no switchport
   ip address 10.34.0.3/30
!
! Prepend our own AS twice when advertising to sw1 → makes our path
! look longer → sw1 will prefer the sw2-sw4 path instead (if local-pref
! is removed). Demonstrates AS-path prepend as a TE knob.
route-map LONGER-PATH-TO-SW1 permit 10
   set as-path prepend 65002 65002
!
router bgp 65002
   router-id 3.3.3.3
   no bgp default ipv4-unicast
   neighbor 10.13.0.1 remote-as 65001
   neighbor 10.34.0.4 remote-as 65002
   !
   address-family ipv4
      neighbor 10.13.0.1 activate
      neighbor 10.13.0.1 route-map LONGER-PATH-TO-SW1 out
      neighbor 10.34.0.4 activate
      neighbor 10.34.0.4 next-hop-self
!
end
