! Reference answer for leaf2 — redundant gateway via VARP + L2-stretched VLAN 10.
hostname leaf2
username admin privilege 15 secret 0 admin
!
ip routing
!
vlan 10
   name USERS
!
ip virtual-router mac-address 00:1c:73:00:00:01
!
interface Vlan10
   ip address 10.10.10.3/24
   ip virtual-router address 10.10.10.1
!
interface Ethernet1
   description peer-link
   switchport mode trunk
   switchport trunk allowed vlan 10
!
interface Ethernet2
   description to-spine
   no switchport
   ip address 10.99.2.1/30
!
interface Ethernet3
   description host
   switchport mode access
   switchport access vlan 10
!
router bgp 65002
   router-id 2.2.2.2
   neighbor 10.99.2.2 remote-as 65000
   network 10.10.10.0/24
!
end
