name: hitless-upgrade

topology:
  kinds:
    arista_ceos:
      image: ceos:4.35.4M
    linux:
      image: ghcr.io/srl-labs/network-multitool

  nodes:
    # Redundant leaf pair — upgrade one at a time without losing traffic.
    # Shared gateway 10.10.10.1 is provided by VARP on BOTH leaves; VLAN 10
    # is stretched across the peer-link so the two host-facing ports are one
    # L2 domain. (Not a full MLAG — that's lab 14. This is the minimal
    # redundancy needed to make the drain/undrain demo actually hitless.)
    leaf1:
      kind: arista_ceos
      startup-config: configs/leaf1.cfg

    leaf2:
      kind: arista_ceos
      startup-config: configs/leaf2.cfg

    spine:
      kind: arista_ceos
      startup-config: configs/spine.cfg

    host:
      kind: linux
      # The host bonds its two NICs (active-backup) so it presents ONE
      # logical interface / MAC / IP and survives losing either uplink.
      # active-backup needs no switch-side LACP — it just uses whichever
      # member link is up, which is what lets the ping survive a leaf drain.
      binds:
        - bond-setup.sh:/tmp/bond-setup.sh:ro
      exec:
        - bash /tmp/bond-setup.sh

  links:
    # Peer-link between the two leaves — 802.1Q trunk carrying VLAN 10 so
    # both host segments are in ONE broadcast domain.
    - endpoints: ["leaf1:eth1", "leaf2:eth1"]
    # Spine uplinks (eBGP underlay)
    - endpoints: ["leaf1:eth2", "spine:eth1"]
    - endpoints: ["leaf2:eth2", "spine:eth2"]
    # Host dual-homed to the leaf pair (bond0 = eth1 + eth2)
    - endpoints: ["host:eth1", "leaf1:eth3"]
    - endpoints: ["host:eth2", "leaf2:eth3"]
