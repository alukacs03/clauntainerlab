name: hitless-upgrade

topology:
  kinds:
    arista_ceos:
      image: ceos:4.35.4M
    linux:
      image: ghcr.io/srl-labs/network-multitool

  nodes:
    # MLAG pair — upgrade one at a time without losing traffic
    leaf1:
      kind: arista_ceos
      startup-config: configs/leaf1.cfg

    leaf2:
      kind: arista_ceos
      startup-config: configs/leaf2.cfg

    spine:
      kind: arista_ceos
      startup-config: configs/spine.cfg

    host:
      kind: linux
      exec:
        - ip addr add 10.10.10.10/24 dev eth1
        - ip addr add 10.10.10.11/24 dev eth2
        - ip route add default via 10.10.10.1

  links:
    # MLAG peer-link between the two leaves
    - endpoints: ["leaf1:eth1", "leaf2:eth1"]
    # Spine uplinks
    - endpoints: ["leaf1:eth2", "spine:eth1"]
    - endpoints: ["leaf2:eth2", "spine:eth2"]
    # Host dual-homed to the MLAG pair
    - endpoints: ["host:eth1", "leaf1:eth3"]
    - endpoints: ["host:eth2", "leaf2:eth3"]
