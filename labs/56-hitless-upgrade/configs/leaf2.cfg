hostname leaf2
username admin privilege 15 secret 0 admin
!
ip routing
!
vlan 10
   name USERS
!
! Shared virtual gateway (VARP). The REAL SVI address is 10.10.10.3;
! 10.10.10.1 + the virtual MAC are owned by BOTH leaves so the host's
! default gateway survives one leaf being drained.
ip virtual-router mac-address 00:1c:73:00:00:01
!
interface Vlan10
   ip address 10.10.10.3/24
   ip virtual-router address 10.10.10.1
!
! Peer-link: 802.1Q trunk carrying VLAN 10 so leaf1:Eth3 and leaf2:Eth3
! are in ONE broadcast domain.
interface Ethernet1
   description peer-link
   switchport mode trunk
   switchport trunk allowed vlan 10
!
! Uplink to spine (eBGP underlay)
interface Ethernet2
   description to-spine
   no switchport
   ip address 10.99.2.1/30
!
interface Ethernet3
   description host
   switchport mode access
   switchport access vlan 10
!
router bgp 65002
   router-id 2.2.2.2
   neighbor 10.99.2.2 remote-as 65000
   network 10.10.10.0/24
!
end
