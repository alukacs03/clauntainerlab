hostname leaf1
username admin privilege 15 secret 0 admin
ip routing
vlan 10
   name USERS
interface Vlan10
   ip address 10.10.10.1/24
interface Ethernet1
   description peer-link
   no switchport
   ip address 169.254.1.1/30
interface Ethernet2
   description to-spine
   no switchport
   ip address 10.99.1.1/30
interface Ethernet3
   description host
   switchport mode access
   switchport access vlan 10
end
