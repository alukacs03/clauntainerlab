hostname spine
username admin privilege 15 secret 0 admin
!
ip routing
!
interface Ethernet1
   description to-leaf1
   no switchport
   ip address 10.99.1.2/30
!
interface Ethernet2
   description to-leaf2
   no switchport
   ip address 10.99.2.2/30
!
! eBGP underlay: peer with both leaves. Both advertise 10.10.10.0/24, so
! the spine learns the VLAN-10 prefix via BOTH leaves (ECMP) — when one
! leaf is drained/reloaded, the spine still has the path via the other.
router bgp 65000
   router-id 9.9.9.9
   neighbor 10.99.1.1 remote-as 65001
   neighbor 10.99.2.1 remote-as 65002
   maximum-paths 2
!
end
