name: spine-leaf

topology:
  kinds:
    arista_ceos:
      image: ceos:4.35.4M
    linux:
      image: ghcr.io/srl-labs/network-multitool

  nodes:
    spine1:
      kind: arista_ceos
      startup-config: configs/spine1.cfg
    spine2:
      kind: arista_ceos
      startup-config: configs/spine2.cfg
    leaf1:
      kind: arista_ceos
      startup-config: configs/leaf1.cfg
    leaf2:
      kind: arista_ceos
      startup-config: configs/leaf2.cfg

    h1:
      kind: linux
      exec:
        - ip addr add 10.1.0.10/24 dev eth1
        - ip route add default via 10.1.0.1
    h2:
      kind: linux
      exec:
        - ip addr add 10.2.0.10/24 dev eth1
        - ip route add default via 10.2.0.1

  links:
    # leaf1 to both spines
    - endpoints: ["leaf1:eth1", "spine1:eth1"]
    - endpoints: ["leaf1:eth2", "spine2:eth1"]
    # leaf2 to both spines
    - endpoints: ["leaf2:eth1", "spine1:eth2"]
    - endpoints: ["leaf2:eth2", "spine2:eth2"]
    # Hosts
    - endpoints: ["h1:eth1", "leaf1:eth3"]
    - endpoints: ["h2:eth1", "leaf2:eth3"]
