hostname leaf2
!
ip routing
!
interface Loopback0
   ip address 2.2.2.2/32
!
interface Ethernet1
   description to-spine1
   no switchport
   ip address 10.0.2.1/31
!
interface Ethernet2
   description to-spine2
   no switchport
   ip address 10.0.4.1/31
!
interface Ethernet3
   description h2
   no switchport
   ip address 10.2.0.1/24
!
router bgp 65002
   router-id 2.2.2.2
   no bgp default ipv4-unicast
   maximum-paths 64 ecmp 64
   neighbor 10.0.2.0 remote-as 65100
   neighbor 10.0.2.0 description spine1
   neighbor 10.0.4.0 remote-as 65200
   neighbor 10.0.4.0 description spine2
   !
   address-family ipv4
      neighbor 10.0.2.0 activate
      neighbor 10.0.4.0 activate
      network 2.2.2.2/32
      network 10.2.0.0/24
!
end
