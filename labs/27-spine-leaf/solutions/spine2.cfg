hostname spine2
!
ip routing
!
interface Loopback0
   ip address 100.100.100.2/32
!
interface Ethernet1
   no switchport
   ip address 10.0.3.0/31
!
interface Ethernet2
   no switchport
   ip address 10.0.4.0/31
!
router bgp 65200
   router-id 100.100.100.2
   no bgp default ipv4-unicast
   maximum-paths 64 ecmp 64
   neighbor 10.0.3.1 remote-as 65001
   neighbor 10.0.3.1 description leaf1
   neighbor 10.0.4.1 remote-as 65002
   neighbor 10.0.4.1 description leaf2
   !
   address-family ipv4
      neighbor 10.0.3.1 activate
      neighbor 10.0.4.1 activate
      network 100.100.100.2/32
!
end
