hostname leaf1
!
ip routing
!
interface Loopback0
   ip address 1.1.1.1/32
!
interface Ethernet1
   no switchport
   ip address 10.0.1.1/31
!
interface Ethernet2
   no switchport
   ip address 10.0.3.1/31
!
interface Ethernet3
   no switchport
   ip address 10.1.0.1/24
!
router bgp 65001
   router-id 1.1.1.1
   no bgp default ipv4-unicast
   maximum-paths 64 ecmp 64
   neighbor 10.0.1.0 remote-as 65100
   neighbor 10.0.1.0 description spine1
   neighbor 10.0.3.0 remote-as 65200
   neighbor 10.0.3.0 description spine2
   !
   address-family ipv4
      neighbor 10.0.1.0 activate
      neighbor 10.0.3.0 activate
      network 1.1.1.1/32
      network 10.1.0.0/24
!
end
