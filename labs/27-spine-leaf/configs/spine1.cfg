hostname spine1
!
ip routing
!
interface Loopback0
   ip address 100.100.100.1/32
!
interface Ethernet1
   description to-leaf1
   no switchport
   ip address 10.0.1.0/31
!
interface Ethernet2
   description to-leaf2
   no switchport
   ip address 10.0.2.0/31
!
! ─────────────────────────────────────────────────────────────
! Starter has interfaces ready. Your task: bring up BGP underlay.
! AS scheme:
!   spine1: 65100, spine2: 65200
!   leaf1:  65001, leaf2:  65002
! Each spine eBGP-peers with every leaf. Loopbacks are advertised.
! ECMP must work — verify with traceroute showing alternating paths.
! ─────────────────────────────────────────────────────────────
!
end
