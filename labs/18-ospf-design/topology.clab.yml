name: ospf-design

topology:
  kinds:
    arista_ceos:
      image: ceos:4.35.4M
    linux:
      image: ghcr.io/srl-labs/network-multitool

  nodes:
    # Backbone (area 0)
    sw1:
      kind: arista_ceos
      startup-config: configs/sw1.cfg

    # ABR — sits between area 0 and area 1
    sw2:
      kind: arista_ceos
      startup-config: configs/sw2.cfg

    # Branch in area 1
    sw3:
      kind: arista_ceos
      startup-config: configs/sw3.cfg

    h1:
      kind: linux
      exec:
        - ip addr add 10.10.10.10/24 dev eth1
        - ip route add default via 10.10.10.1
    h3:
      kind: linux
      exec:
        - ip addr add 10.30.30.10/24 dev eth1
        - ip route add default via 10.30.30.1

  links:
    - endpoints: ["h1:eth1", "sw1:eth1"]
    - endpoints: ["h3:eth1", "sw3:eth1"]
    # sw1↔sw2 in area 0
    - endpoints: ["sw1:eth2", "sw2:eth2"]
    # sw2↔sw3 in area 1
    - endpoints: ["sw2:eth3", "sw3:eth2"]
