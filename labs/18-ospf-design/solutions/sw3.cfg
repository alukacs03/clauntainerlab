hostname sw3
!
ip routing
!
interface Loopback0
   ip address 3.3.3.3/32
   ip ospf area 0.0.0.1
!
interface Ethernet1
   description h3
   no switchport
   ip address 10.30.30.1/24
   ip ospf area 0.0.0.1
!
interface Ethernet2
   description to-sw2 (area 1)
   no switchport
   ip address 192.168.23.3/30
   ip ospf area 0.0.0.1
   ip ospf network point-to-point
!
router ospf 1
   router-id 3.3.3.3
   passive-interface default
   no passive-interface Ethernet2
   max-lsa 12000
!
end
