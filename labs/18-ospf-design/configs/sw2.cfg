hostname sw2
!
ip routing
!
interface Loopback0
   ip address 2.2.2.2/32
!
interface Ethernet2
   description to-sw1 (area 0)
   no switchport
   ip address 192.168.12.2/30
!
interface Ethernet3
   description to-sw3 (area 1)
   no switchport
   ip address 192.168.23.2/30
!
! Your job on sw2 (the ABR):
!   - Et2 in area 0
!   - Et3 in area 1
!   - Loopback0 conventionally in area 0
!
end
