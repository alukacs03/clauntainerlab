hostname sw1
!
ip routing
!
interface Loopback0
   ip address 1.1.1.1/32
!
interface Ethernet1
   description h1
   no switchport
   ip address 10.10.10.1/24
!
interface Ethernet2
   description to-sw2 (area 0)
   no switchport
   ip address 192.168.12.1/30
!
! Simulate an external prefix that sw1 redistributes into OSPF
! to demonstrate Type 5 LSA propagation (and how stub areas filter it)
ip route 198.51.100.0/24 Null0
!
! ─────────────────────────────────────────────────────────────
! Starter has L3 set up. Your tasks (see README):
!   1. Enable OSPF process 1, router-id 1.1.1.1
!   2. Put Loopback0, Et1 (passive), and Et2 in area 0
!   3. Redistribute static into OSPF — creates a Type 5 LSA
!   4. Verify connectivity once sw2 and sw3 are also configured
! ─────────────────────────────────────────────────────────────
!
end
