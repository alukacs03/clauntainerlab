hostname spine1
!
ip routing
!
interface Ethernet1
   description leaf1
   no switchport
   ip address 10.0.0.1/31
!
interface Ethernet2
   description leaf2
   no switchport
   ip address 10.0.0.5/31
!
router ospf 1
   router-id 10.255.0.1
   network 10.0.0.0/24 area 0.0.0.0
   max-lsa 12000
!
end
