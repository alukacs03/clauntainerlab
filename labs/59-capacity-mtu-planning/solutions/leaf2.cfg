hostname leaf2
!
ip routing
!
interface Ethernet1
   description spine1
   no switchport
   ip address 10.0.0.4/31
!
interface Ethernet2
   description spine2
   no switchport
   ip address 10.0.0.6/31
!
interface Ethernet3
   description host2
   no switchport
   ip address 10.10.20.1/24
!
router ospf 1
   router-id 10.255.1.2
   network 10.0.0.0/24 area 0.0.0.0
   network 10.10.20.0/24 area 0.0.0.0
!
end
