hostname leaf1
!
ip routing
!
interface Ethernet1
   description spine1
   no switchport
   ip address 10.0.0.0/31
!
interface Ethernet2
   description spine2
   no switchport
   ip address 10.0.0.2/31
!
interface Ethernet3
   description host1
   no switchport
   ip address 10.10.10.1/24
!
router ospf 1
   router-id 10.255.1.1
   network 10.0.0.0/24 area 0.0.0.0
   network 10.10.10.0/24 area 0.0.0.0
!
end
