hostname leaf1
!
ip routing
ip routing vrf TENANT-A
!
vrf instance TENANT-A
!
interface Loopback0
   ip address 1.1.1.1/32
!
interface Loopback1
   ip address 11.11.11.11/32
!
vlan 100
   name TENANT-A
!
interface Ethernet1
   no switchport
   ip address 10.0.1.1/31
!
interface Ethernet3
   switchport mode access
   switchport access vlan 100
!
interface Vxlan1
   vxlan source-interface Loopback1
   vxlan udp-port 4789
   vxlan vlan 100 vni 10100
!
router bgp 65001
   router-id 1.1.1.1
   no bgp default ipv4-unicast
   maximum-paths 64 ecmp 64
   neighbor 10.0.1.0 remote-as 65100
   neighbor 10.0.1.0 send-community extended
   !
   vlan 100
      rd 1.1.1.1:10100
      route-target both 10100:10100
      redistribute learned
   !
   address-family ipv4
      neighbor 10.0.1.0 activate
      network 1.1.1.1/32
      network 11.11.11.11/32
   !
   address-family evpn
      neighbor 10.0.1.0 activate
!
! ─────────────────────────────────────────────────────────────
! Starter: same VLAN 100 / VNI 10100 stretched across leaves (lab 30
! style). What's missing: an SVI for the host gateway.
!
! Your tasks (see README):
!   1. Set the shared virtual MAC at global level
!   2. Create SVI Vlan100 in VRF TENANT-A with `ip address virtual
!      10.10.10.254/24` — same on every leaf
!   3. Verify both h1 and h2 see the gateway as `.254` with the same
!      virtual MAC, and can ping it from either leaf
!   4. Add L3 VNI to enable inter-VLAN routing for the tenant
! ─────────────────────────────────────────────────────────────
!
end
