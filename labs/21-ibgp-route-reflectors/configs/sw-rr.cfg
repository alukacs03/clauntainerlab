hostname sw-rr
!
ip routing
!
interface Loopback0
   description router-id and iBGP source
   ip address 10.10.10.10/32
   ip ospf area 0.0.0.0
!
interface Ethernet1
   description to-sw1
   no switchport
   ip address 192.168.1.10/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
interface Ethernet2
   description to-sw2
   no switchport
   ip address 192.168.2.10/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
interface Ethernet3
   description to-sw3
   no switchport
   ip address 192.168.3.10/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
router ospf 1
   router-id 10.10.10.10
   passive-interface default
   no passive-interface Ethernet1
   no passive-interface Ethernet2
   no passive-interface Ethernet3
!
! ─────────────────────────────────────────────────────────────
! Starter: OSPF is configured so loopbacks are reachable end-to-end.
! No iBGP yet. h1/h2/h3 are in their own subnets and cannot reach
! each other.
!
! Your tasks (see README):
!   1. On sw-rr: enable iBGP for AS 65001, configure 3 iBGP neighbors
!      (sw1/sw2/sw3 by their loopbacks). Source from Loopback0.
!      Mark each neighbor as route-reflector-client.
!   2. On each client (sw1/sw2/sw3): enable iBGP for AS 65001, one
!      neighbor = sw-rr's loopback (10.10.10.10), source from local
!      loopback. Advertise the local host LAN.
!   3. Verify all three host LANs visible on every router.
! ─────────────────────────────────────────────────────────────
!
end
