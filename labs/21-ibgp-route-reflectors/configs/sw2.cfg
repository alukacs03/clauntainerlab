hostname sw2
!
ip routing
!
interface Loopback0
   ip address 2.2.2.2/32
   ip ospf area 0.0.0.0
!
interface Ethernet1
   description h2
   no switchport
   ip address 10.2.0.1/24
!
interface Ethernet2
   description to-sw-rr
   no switchport
   ip address 192.168.2.1/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
router ospf 1
   router-id 2.2.2.2
   passive-interface default
   no passive-interface Ethernet2
!
end
