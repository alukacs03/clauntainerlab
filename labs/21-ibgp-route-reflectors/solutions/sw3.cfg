hostname sw3
!
ip routing
!
interface Loopback0
   ip address 3.3.3.3/32
   ip ospf area 0.0.0.0
!
interface Ethernet1
   description h3
   no switchport
   ip address 10.3.0.1/24
   ip ospf area 0.0.0.0
   ip ospf passive
!
interface Ethernet2
   description to-sw-rr
   no switchport
   ip address 192.168.3.3/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
router ospf 1
   router-id 3.3.3.3
   passive-interface default
   no passive-interface Ethernet2
!
router bgp 65001
   router-id 3.3.3.3
   no bgp default ipv4-unicast
   neighbor 10.10.10.10 remote-as 65001
   neighbor 10.10.10.10 update-source Loopback0
   neighbor 10.10.10.10 description sw-rr
   !
   address-family ipv4
      neighbor 10.10.10.10 activate
      network 10.3.0.0/24
!
end
