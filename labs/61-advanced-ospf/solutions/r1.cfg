hostname r1
!
ip routing
!
interface Loopback0
   ip address 1.1.1.1/32
   ip ospf area 0.0.0.0
!
interface Ethernet1
   description to r2 (area 0 backbone)
   no switchport
   ip address 10.0.0.1/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
interface Ethernet2
   description to r3 (area 1)
   no switchport
   ip address 10.1.0.1/30
   ip ospf area 0.0.0.1
   ip ospf network point-to-point
!
router ospf 1
   router-id 1.1.1.1
   ! Area 1 is an NSSA (carries external routes as Type-7; this ABR translates
   ! them to Type-5 into the backbone — but blocks "real" Type-5s from entering).
   area 0.0.0.1 nssa
   ! Summarize r3's internal 11.1.x loopbacks into a single Type-3 toward area 0.
   area 0.0.0.1 range 11.1.0.0/16
   ! Filter 11.9.99.0/24 entirely — it is NOT covered by the /16 range above.
   area 0.0.0.1 range 11.9.99.0/24 not-advertise
!
end
