hostname r2
!
ip routing
!
interface Loopback0
   ip address 2.2.2.2/32
   ip ospf area 0.0.0.0
!
interface Ethernet1
   description to r1 (area 0 backbone)
   no switchport
   ip address 10.0.0.2/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
interface Ethernet2
   description to r4 (area 2)
   no switchport
   ip address 10.2.0.1/30
   ip ospf area 0.0.0.2
   ip ospf network point-to-point
!
router ospf 1
   router-id 2.2.2.2
   ! Totally-stubby: 'stub' blocks Type-5 externals; 'no-summary' (on the ABR)
   ! also blocks Type-3 inter-area routes — so area 2 sees ONLY a default route.
   area 0.0.0.2 stub no-summary
!
end
