hostname r3
!
ip routing
!
interface Loopback0
   ip address 3.3.3.3/32
   ip ospf area 0.0.0.1
!
interface Loopback10
   ip address 11.1.10.1/24
   ip ospf area 0.0.0.1
!
interface Loopback20
   ip address 11.1.20.1/24
   ip ospf area 0.0.0.1
!
interface Loopback99
   ip address 11.9.99.1/24
   ip ospf area 0.0.0.1
!
interface Ethernet1
   description to r1 (area 1)
   no switchport
   ip address 10.1.0.2/30
   ip ospf area 0.0.0.1
   ip ospf network point-to-point
!
ip route 172.16.50.0/24 Null0
!
router ospf 1
   router-id 3.3.3.3
   ! Area 1 is an NSSA, so this ASBR's redistributed routes become Type-7
   ! (NSSA-external) — allowed in an NSSA where plain Type-5 is not. r1 (the ABR)
   ! translates Type-7 to Type-5 on the way into the backbone.
   area 0.0.0.1 nssa
   redistribute static
!
end
