name: advanced-ospf

topology:
  kinds:
    arista_ceos:
      image: ceos:4.35.4M
  nodes:
    # Area 0 backbone (also ABRs)
    r1:
      kind: arista_ceos
      startup-config: configs/r1.cfg
    r2:
      kind: arista_ceos
      startup-config: configs/r2.cfg
    # r3 = ASBR inside the NSSA (area 1)
    r3:
      kind: arista_ceos
      startup-config: configs/r3.cfg
    # r4 = inside the totally-stubby area (area 2)
    r4:
      kind: arista_ceos
      startup-config: configs/r4.cfg

  links:
    - endpoints: ["r1:eth1", "r2:eth1"]   # area 0 backbone
    - endpoints: ["r1:eth2", "r3:eth1"]   # area 1 (NSSA)
    - endpoints: ["r2:eth2", "r4:eth1"]   # area 2 (totally-stubby)
