hostname r1
!
ip routing
!
interface Loopback0
   ip address 1.1.1.1/32
   ip ospf area 0.0.0.0
!
interface Ethernet1
   description to r2 (area 0 backbone)
   no switchport
   ip address 10.0.0.1/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
interface Ethernet2
   description to r3 (area 1)
   no switchport
   ip address 10.1.0.1/30
   ip ospf area 0.0.0.1
   ip ospf network point-to-point
!
router ospf 1
   router-id 1.1.1.1
!
! TODO (your task): make area 1 an NSSA, summarize r3's 11.1.x loopbacks into
! one 11.1.0.0/16 toward the backbone, and filter 11.9.99.0/24 entirely.
!
end
