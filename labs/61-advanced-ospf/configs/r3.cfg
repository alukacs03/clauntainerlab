hostname r3
!
ip routing
!
interface Loopback0
   ip address 3.3.3.3/32
   ip ospf area 0.0.0.1
!
! Internal area-1 prefixes — r1 will summarize these as 11.1.0.0/16.
interface Loopback10
   ip address 11.1.10.1/24
   ip ospf area 0.0.0.1
!
interface Loopback20
   ip address 11.1.20.1/24
   ip ospf area 0.0.0.1
!
! This one r1 will filter out entirely (not part of the 11.1.0.0/16 range).
interface Loopback99
   ip address 11.9.99.1/24
   ip ospf area 0.0.0.1
!
interface Ethernet1
   description to r1 (area 1)
   no switchport
   ip address 10.1.0.2/30
   ip ospf area 0.0.0.1
   ip ospf network point-to-point
!
! An "external" prefix (e.g. a redistributed customer route) — the solution
! redistributes it so it becomes an NSSA Type-7, translated to Type-5 by r1.
ip route 172.16.50.0/24 Null0
!
router ospf 1
   router-id 3.3.3.3
!
! TODO (your task): make area 1 an NSSA and redistribute the static so it
! appears as an NSSA external (Type-7).
!
end
