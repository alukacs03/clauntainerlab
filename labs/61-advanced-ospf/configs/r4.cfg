hostname r4
!
ip routing
!
interface Loopback0
   ip address 4.4.4.4/32
   ip ospf area 0.0.0.2
!
interface Loopback1
   ip address 10.4.4.1/24
   ip ospf area 0.0.0.2
!
interface Ethernet1
   description to r2 (area 2)
   no switchport
   ip address 10.2.0.2/30
   ip ospf area 0.0.0.2
   ip ospf network point-to-point
!
router ospf 1
   router-id 4.4.4.4
!
! TODO (your task): make area 2 a stub on this router too (all routers in an
! area must agree on the area type) — then confirm r4 sees only a default.
!
end
