name: stp-protections

topology:
  kinds:
    arista_ceos:
      image: ceos:4.35.4M
    linux:
      image: ghcr.io/srl-labs/network-multitool

  nodes:
    sw1:
      kind: arista_ceos
      startup-config: configs/sw1.cfg
    sw2:
      kind: arista_ceos
      startup-config: configs/sw2.cfg
    sw3:
      kind: arista_ceos
      startup-config: configs/sw3.cfg

    # "Someone plugged a switch into a wall jack" — represents an
    # unauthorized device showing up on an access port.
    sw-rogue:
      kind: arista_ceos
      startup-config: configs/sw-rogue.cfg

    h1:
      kind: linux
      exec:
        - ip addr add 10.10.10.1/24 dev eth1
    h2:
      kind: linux
      exec:
        - ip addr add 10.10.10.2/24 dev eth1
    h3:
      kind: linux
      exec:
        - ip addr add 10.10.10.3/24 dev eth1

  links:
    # Hosts
    - endpoints: ["h1:eth1", "sw1:eth1"]
    - endpoints: ["h2:eth1", "sw2:eth1"]
    - endpoints: ["h3:eth1", "sw3:eth1"]
    # Triangle of trunks
    - endpoints: ["sw1:eth2", "sw2:eth2"]
    - endpoints: ["sw2:eth3", "sw3:eth2"]
    - endpoints: ["sw1:eth3", "sw3:eth3"]
    # Rogue switch hanging off sw1's "wall jack" (access port Et4)
    - endpoints: ["sw-rogue:eth1", "sw1:eth4"]
