hostname sw3
!
! Rapid-PVST so the bonus step (`spanning-tree vlan-id 10 priority 0`) takes
! effect and provokes the root-guard event on sw1's Et3.
spanning-tree mode rapid-pvst
!
vlan 10
   name USERS
!
interface Ethernet1
   description h3
   switchport mode access
   switchport access vlan 10
!
interface Ethernet2
   description trunk-to-sw2
   switchport mode trunk
   switchport trunk allowed vlan 10
!
interface Ethernet3
   description trunk-to-sw1
   switchport mode trunk
   switchport trunk allowed vlan 10
!
end
