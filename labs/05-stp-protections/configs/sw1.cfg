hostname sw1
!
spanning-tree vlan-id 10 priority 4096
!
vlan 10
   name USERS
!
interface Ethernet1
   description h1 (access — no STP protection yet)
   switchport mode access
   switchport access vlan 10
!
interface Ethernet2
   description trunk-to-sw2
   switchport mode trunk
   switchport trunk allowed vlan 10
!
interface Ethernet3
   description trunk-to-sw3 (no root-guard yet)
   switchport mode trunk
   switchport trunk allowed vlan 10
!
interface Ethernet4
   description wall-jack (no BPDU-guard yet — try plugging a switch here)
   switchport mode access
   switchport access vlan 10
!
! ─────────────────────────────────────────────────────────────
! Your tasks:
!   1. PortFast + BPDU guard on host-facing access ports (Et1, Et4)
!      → sw-rogue on Et4 will be err-disabled the moment its BPDUs arrive
!   2. Root guard on the trunk toward sw3 (Et3)
!      → if sw3 ever claims a better priority, that port goes root-inconsistent
!         instead of demoting sw1 from root
! See README for theory + how to verify.
! ─────────────────────────────────────────────────────────────
!
end
