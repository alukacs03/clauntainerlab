hostname sw-rogue
!
! Pretends to be a legitimate switch — sends BPDUs from boot.
! Also claims aggressive priority — if it ever ends up on a trunk
! without root-guard, it would steal the root crown.
spanning-tree vlan-id 10 priority 0
!
vlan 10
   name USERS
!
interface Ethernet1
   description uplink-to-sw1
   switchport mode trunk
   switchport trunk allowed vlan 10
!
end
