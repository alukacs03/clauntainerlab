hostname sw1
!
! Switch from cEOS-default MSTP to Rapid-PVST so per-VLAN priority works
! (see lab 04 for the explanation).
spanning-tree mode rapid-pvst
!
spanning-tree vlan-id 10 priority 4096
!
vlan 10
   name USERS
!
interface Ethernet1
   description h1
   switchport mode access
   switchport access vlan 10
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet2
   description trunk-to-sw2
   switchport mode trunk
   switchport trunk allowed vlan 10
!
interface Ethernet3
   description trunk-to-sw3 (root-guard ON — sw3 may never be root via this port)
   switchport mode trunk
   switchport trunk allowed vlan 10
   spanning-tree guard root
!
interface Ethernet4
   description wall-jack (locked down)
   switchport mode access
   switchport access vlan 10
   spanning-tree portfast
   spanning-tree bpduguard enable
!
end
