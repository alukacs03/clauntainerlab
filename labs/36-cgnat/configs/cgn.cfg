hostname cgn
!
ip routing
!
! VLAN 100 will be the shared CGN subscriber segment.
vlan 100
!
interface Ethernet1
   description outside-toward-internet
   no switchport
   ip address 203.0.113.2/30
!
! All three subscribers share ONE subnet (100.64.0.0/22) and ONE
! gateway. Make Et2/Et3/Et4 access ports in VLAN 100 and put the
! gateway IP on the Vlan100 SVI (the "shared transit" CGN model).
interface Ethernet2
   description sub1 (CGN subscriber)
   switchport access vlan 100
!
interface Ethernet3
   description sub2 (CGN subscriber)
   switchport access vlan 100
!
interface Ethernet4
   description sub3 (CGN subscriber)
   switchport access vlan 100
!
interface Vlan100
   description shared CGN subscriber gateway (100.64.0.0/22)
!  ip address 100.64.0.1/22   <- you add this
!
ip route 0.0.0.0/0 203.0.113.1
!
! ─────────────────────────────────────────────────────────────
! Starter: CGN scenario. Subscribers use the RFC 6598 shared
! address space 100.64.0.0/10. The CGN box NATs them to a small
! pool of public IPs (here, 2 addresses).
!
! Your tasks (see README):
!   1. Add the gateway IP 100.64.0.1/22 on Vlan100.
!   2. Add a public secondary on Et1 wide enough for the pool, e.g.
!      'ip address 203.0.113.10/29 secondary'.
!   3. Define a NAT pool of 2 public IPs (203.0.113.10 -
!      203.0.113.11) with 'ip nat pool ... prefix-length 29'.
!   4. Write an ACL matching 100.64.0.0/10.
!   5. Apply dynamic PAT UNDER the outside interface (Et1):
!      'ip nat source dynamic access-list ... pool ... overload'.
!      (EOS has no global 'ip nat source list' / 'ip nat enable'.)
!   6. (Conceptually) understand per-subscriber port allocation
!      for logging/compliance — discussed in README.
!
! Note: production CGN typically runs on dedicated hardware
! (Cisco ASR, Juniper MX, A10 Thunder) with per-subscriber port
! allocation features. cEOS only parses the config; see the README
! limitation callout for what actually happens in the container.
! ─────────────────────────────────────────────────────────────
!
end
