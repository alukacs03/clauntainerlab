hostname cgn
!
ip routing
!
interface Ethernet1
   description outside-toward-internet
   no switchport
   ip address 203.0.113.2/30
!
interface Ethernet2
   description sub1 (CGN subscriber)
   no switchport
   ip address 100.64.0.1/22
!
interface Ethernet3
   description sub2 (CGN subscriber)
   ! Same subnet as Et2 in CGN deployment (shared transit)
!
interface Ethernet4
   description sub3
!
ip route 0.0.0.0/0 203.0.113.1
!
! ─────────────────────────────────────────────────────────────
! Starter: CGN scenario. Subscribers use the RFC 6598 shared
! address space 100.64.0.0/10. The CGN box NATs them to a small
! pool of public IPs (say 4-8 addresses).
!
! Your tasks (see README):
!   1. Configure a NAT pool of 2 public IPs (203.0.113.10 -
!      203.0.113.11) — extending the outside interface secondary
!   2. Source-NAT all 100.64.0.0/10 traffic through the pool with
!      port allocation strategy (overload)
!   3. (Conceptually) understand per-subscriber port allocation
!      for logging/compliance — discussed in README
!   4. Verify all 3 subscribers can reach the internet via NAT;
!      observe which public IP each one gets
!
! Note: production CGN typically runs on dedicated hardware
! (Cisco ASR, Juniper MX, A10 Thunder) with per-subscriber port
! allocation features. cEOS approximates the mechanism.
! ─────────────────────────────────────────────────────────────
!
end
