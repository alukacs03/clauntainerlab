hostname cgn
!
ip routing
!
! VLAN 100 = the shared CGN subscriber segment (100.64.0.0/22).
! All three subscriber-facing ports are access ports in this VLAN,
! so every subscriber shares one gateway (the Vlan100 SVI). This is
! the "shared transit" CGN model.
vlan 100
!
interface Ethernet1
   description outside-toward-internet
   no switchport
   ! Primary point-to-point link to the internet node
   ip address 203.0.113.2/30
   ! Public pool addresses live on a /29 so .10 and .11 are valid
   ! usable hosts (203.0.113.8/29 = usable .9-.14, broadcast .15).
   ip address 203.0.113.10/29 secondary
   ! Dynamic source PAT (overload) is applied UNDER the interface in
   ! EOS — there is no global "ip nat source list" and no
   ! "ip nat enable" knob (that is Cisco IOS syntax).
   ip nat source dynamic access-list CGN-INSIDE pool CGN-POOL overload
!
interface Ethernet2
   description sub1 (CGN subscriber)
   switchport access vlan 100
!
interface Ethernet3
   description sub2 (CGN subscriber)
   switchport access vlan 100
!
interface Ethernet4
   description sub3 (CGN subscriber)
   switchport access vlan 100
!
interface Vlan100
   description shared CGN subscriber gateway (100.64.0.0/22)
   ip address 100.64.0.1/22
!
ip route 0.0.0.0/0 203.0.113.1
!
! Pool of public IPs the subscribers are translated to. /29 mask so
! both pool members are valid usable hosts.
ip nat pool CGN-POOL 203.0.113.10 203.0.113.11 prefix-length 29
!
! Match all RFC 6598 shared-CGN traffic.
ip access-list CGN-INSIDE
   10 permit ip 100.64.0.0/10 any
!
end
