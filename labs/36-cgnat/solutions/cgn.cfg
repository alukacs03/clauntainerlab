hostname cgn
!
ip routing
!
interface Ethernet1
   description outside-toward-internet
   no switchport
   ip address 203.0.113.2/30
   ip address 203.0.113.10/30 secondary
   ip address 203.0.113.11/30 secondary
   ip nat enable
!
interface Ethernet2
   no switchport
   ip address 100.64.0.1/22
   ip nat enable
!
interface Ethernet3
   no switchport
   ip address 100.64.4.1/22
   ip nat enable
!
interface Ethernet4
   no switchport
   ip address 100.64.8.1/22
   ip nat enable
!
ip route 0.0.0.0/0 203.0.113.1
!
ip nat pool CGN-POOL 203.0.113.10 203.0.113.11 prefix-length 30
!
ip access-list CGN-INSIDE
   10 permit ip 100.64.0.0/10 any
!
ip nat source list CGN-INSIDE pool CGN-POOL overload
!
end
