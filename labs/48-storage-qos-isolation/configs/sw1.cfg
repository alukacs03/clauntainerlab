hostname sw1
!
ip routing
!
vlan 51
   name TENANT-A-STORAGE
!
vlan 52
   name TENANT-B-STORAGE
!
vlan 99
   name STORAGE-BACKEND
!
interface Ethernet1
   description tenant-a
   switchport mode access
   switchport access vlan 51
   mtu 9214
!
interface Ethernet2
   description tenant-b
   switchport mode access
   switchport access vlan 52
   mtu 9214
!
interface Ethernet3
   description shared-target
   switchport mode access
   switchport access vlan 99
   mtu 9214
!
interface Vlan51
   ip address 10.50.1.1/24
!
interface Vlan52
   ip address 10.50.2.1/24
!
interface Vlan99
   ip address 10.50.99.1/24
!
! ─────────────────────────────────────────────────────────────
! Starter: 2 tenants in separate VLANs both reaching one shared
! storage backend. Your tasks:
!   1. Rate-limit tenant-b's port to 100 Mbit/s (input policer)
!      to prevent it from saturating the backend link
!   2. Mark tenant-a's traffic DSCP AF31 (premium), tenant-b's
!      traffic DSCP CS1 (scavenger) at ingress
!   3. On the egress port to target (Eth3), give AF31 80% of
!      the bandwidth, CS1 20%
! ─────────────────────────────────────────────────────────────
!
end
