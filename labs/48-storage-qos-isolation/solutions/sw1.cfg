hostname sw1
!
ip routing
!
vlan 51
   name TENANT-A-STORAGE
!
vlan 52
   name TENANT-B-STORAGE
!
vlan 99
   name STORAGE-BACKEND
!
! ─── DSCP marking by tenant ───
! An interface accepts only ONE input service-policy of type qos, so
! marking and policing for tenant-b are combined into a single
! policy-map (MARK-SCAVENGER): it sets DSCP CS1 *and* polices to 100M.
! (A standalone POLICE-100M policy-map would be orphaned — you can't
! attach two qos input policies to Ethernet2.)
policy-map type qos MARK-PREMIUM
   class class-default
      set dscp af31
!
policy-map type qos MARK-SCAVENGER
   class class-default
      set dscp cs1
      police rate 100 mbps burst-size 64 kbytes
!
interface Ethernet1
   description tenant-a-premium
   switchport mode access
   switchport access vlan 51
   mtu 9214
   service-policy type qos input MARK-PREMIUM
!
interface Ethernet2
   description tenant-b-scavenger
   switchport mode access
   switchport access vlan 52
   mtu 9214
   service-policy type qos input MARK-SCAVENGER
!
interface Ethernet3
   description shared-target
   switchport mode access
   switchport access vlan 99
   mtu 9214
   qos trust dscp
   ! Egress queue scheduling (Arad/Jericho weighted round-robin model):
   !   AF31 = DSCP 26 -> traffic-class 3 -> tx-queue 3  (premium, 80%)
   !   CS1  = DSCP  8 -> traffic-class 0 -> tx-queue 0  (scavenger, 20%)
   ! 'bandwidth percent' only realises a weighted share once the queue is
   ! moved off strict-priority with 'no priority' first. On Trident/Trident-II
   ! platforms there is no tx-queue 'bandwidth percent'; you'd use
   ! 'bandwidth guaranteed <rate> kbps' instead.
   tx-queue 3
      no priority
      bandwidth percent 80
   tx-queue 0
      no priority
      bandwidth percent 20
!
interface Vlan51
   ip address 10.50.1.1/24
!
interface Vlan52
   ip address 10.50.2.1/24
!
interface Vlan99
   ip address 10.50.99.1/24
!
end
