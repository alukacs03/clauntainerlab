hostname sw1
!
ip routing
!
vlan 51
   name TENANT-A-STORAGE
!
vlan 52
   name TENANT-B-STORAGE
!
vlan 99
   name STORAGE-BACKEND
!
! ─── Per-tenant ingress policing (tenant-b capped at 100 Mbps) ───
policy-map type qos POLICE-100M
   class class-default
      police rate 100 mbps burst-size 64 kbytes
!
! ─── DSCP marking by tenant ───
policy-map type qos MARK-PREMIUM
   class class-default
      set dscp af31
!
policy-map type qos MARK-SCAVENGER
   class class-default
      set dscp cs1
      police rate 100 mbps burst-size 64 kbytes
!
interface Ethernet1
   description tenant-a-premium
   switchport mode access
   switchport access vlan 51
   mtu 9214
   service-policy type qos input MARK-PREMIUM
!
interface Ethernet2
   description tenant-b-scavenger
   switchport mode access
   switchport access vlan 52
   mtu 9214
   service-policy type qos input MARK-SCAVENGER
!
interface Ethernet3
   description shared-target
   switchport mode access
   switchport access vlan 99
   mtu 9214
   qos trust dscp
   ! Egress queue scheduling: AF31 (tc 4) gets 80%, CS1 (tc 0) gets 20%.
   tx-queue 4
      bandwidth percent 80
   tx-queue 0
      bandwidth percent 20
!
interface Vlan51
   ip address 10.50.1.1/24
!
interface Vlan52
   ip address 10.50.2.1/24
!
interface Vlan99
   ip address 10.50.99.1/24
!
end
