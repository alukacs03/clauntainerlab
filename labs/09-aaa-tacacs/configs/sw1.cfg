hostname sw1
!
interface Ethernet1
   description to-tacacs-server
   no switchport
   ip address 10.99.0.1/24
!
! Local emergency account — last-resort if TACACS is unreachable.
username localadmin privilege 15 secret 0 localemergency
!
management ssh
   no shutdown
!
! ─────────────────────────────────────────────────────────────
! Starter: only local 'localadmin' user. Anyone with that password
! can do anything, and no one's actions are logged centrally.
!
! Your tasks (see README):
!   1. Configure TACACS+ server (10.99.0.10) with key "labkey123"
!   2. Set up authentication: default = TACACS first, local fallback
!   3. Set up authorization: command-level via TACACS
!   4. Set up accounting: ship command logs to TACACS
!   5. Verify: alice (admin) can configure; bob (readonly) cannot
! ─────────────────────────────────────────────────────────────
!
end
