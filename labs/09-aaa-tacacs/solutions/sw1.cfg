hostname sw1
!
interface Ethernet1
   description to-tacacs-server
   no switchport
   ip address 10.99.0.1/24
!
! Emergency local account — used only if TACACS is unreachable
username localadmin privilege 15 secret 0 localemergency
!
! ─── TACACS+ server ───
tacacs-server host 10.99.0.10 key labkey123
!
! ─── AAA: try TACACS first, fall back to local ───
aaa authentication login default group tacacs+ local
aaa authentication enable default group tacacs+ local
aaa authorization exec default group tacacs+ local
aaa authorization commands all default group tacacs+ local
aaa accounting commands all default start-stop group tacacs+
aaa accounting exec default start-stop group tacacs+
!
management ssh
   no shutdown
!
end
