#!/usr/local/sbin/tac_plus
#
# Marc Huber's tac_plus (event-driven-servers) config.
# The lfkeitel/tacacs_plus image runs this daemon with
#   tac_plus -f /etc/tac_plus/tac_plus.cfg
# so the topology MUST bind this file to that exact path.
#
# Two users for the lab:
#   alice / AlicePass!  -> group netadmins (priv-lvl 15, all commands)
#   bob   / BobPass!     -> group readonly  (priv-lvl 1, only show + enable)
# Shared secret with the switches: labkey123

id = spawnd {
    listen = { port = 49 }
    spawn = {
        instances min = 1
        instances max = 10
    }
    background = no
}

id = tac_plus {
    # Accounting audit trail — every authorized command lands here.
    # Verification step 2 reads this file.
    accounting log = /var/log/tac_plus.acct
    access log = /var/log/tac_plus.access
    authorization log = /var/log/tac_plus.author

    # Any client may connect; the shared key must match the switch's
    # `tacacs-server host ... key labkey123`. The enable secret answers
    # `aaa authentication enable default group tacacs+` when a user types
    # `enable` (alice also lands at priv-15 directly via exec authorization,
    # but this keeps the explicit `enable` step working too).
    host = world {
        address = 0.0.0.0/0
        key = labkey123
        enable 15 = clear enablepass
    }

    # Full admins: privilege 15, every command permitted.
    group = netadmins {
        default service = permit
        service = shell {
            default command = permit
            default attribute = permit
            set priv-lvl = 15
        }
    }

    # Read-only NOC: privilege 1, only `show` and `enable` permitted,
    # everything else (notably `configure`) denied.
    group = readonly {
        default service = permit
        service = shell {
            default command = deny
            default attribute = permit
            set priv-lvl = 1
            cmd = show {
                permit .*
            }
            cmd = enable {
                permit .*
            }
        }
    }

    user = alice {
        password = clear "AlicePass!"
        member = netadmins
    }

    user = bob {
        password = clear "BobPass!"
        member = readonly
    }
}
