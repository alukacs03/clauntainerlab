name: network-cicd

topology:
  kinds:
    arista_ceos:
      image: ceos:4.35.4M
    linux:
      image: ghcr.io/srl-labs/network-multitool

  nodes:
    staging-sw:
      kind: arista_ceos
      startup-config: configs/staging-sw.cfg

    prod-sw:
      kind: arista_ceos
      startup-config: configs/prod-sw.cfg

    ci-runner:
      kind: linux
      binds:
        - solutions:/lab/solutions:ro
      exec:
        # eth1 faces staging-sw (10.0.0.0/30), eth2 faces prod-sw (10.0.1.0/30).
        # Two separate /30s so the runner has a distinct connected route per device.
        - ip addr add 10.0.0.2/30 dev eth1
        - ip addr add 10.0.1.2/30 dev eth2

  links:
    - endpoints: ["ci-runner:eth1", "staging-sw:eth1"]
    - endpoints: ["ci-runner:eth2", "prod-sw:eth1"]
