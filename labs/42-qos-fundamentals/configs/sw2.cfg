hostname sw2
!
vlan 10
   name USERS
!
vlan 20
   name SERVERS
!
interface Ethernet1
   description receiver
   switchport mode access
   switchport access vlan 20
!
interface Ethernet3
   description trunk-to-sw1
   switchport mode trunk
   switchport trunk allowed vlan 10
!
interface Vlan10
   ip address 10.0.0.2/24
!
interface Vlan20
   ip address 10.0.1.1/24
!
ip routing
!
end
