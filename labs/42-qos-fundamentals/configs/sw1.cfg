hostname sw1
!
vlan 10
   name USERS
!
interface Ethernet1
   description voice-client
   switchport mode access
   switchport access vlan 10
!
interface Ethernet2
   description bulk-client
   switchport mode access
   switchport access vlan 10
!
interface Ethernet3
   description trunk-to-sw2
   switchport mode trunk
   switchport trunk allowed vlan 10
!
interface Vlan10
   ip address 10.0.0.1/24
!
ip routing
!
! ─────────────────────────────────────────────────────────────
! Starter: sw1 has two clients in VLAN 10 sharing a single
! uplink trunk to sw2. Without QoS, "bulk" traffic can starve
! "voice" traffic when the uplink saturates. Your tasks:
!   1. Mark voice's traffic with DSCP EF (46) at ingress
!   2. Mark bulk's traffic with DSCP CS1 (8) at ingress
!   3. Configure the egress trunk's tx-queue so EF gets priority
! ─────────────────────────────────────────────────────────────
!
end
