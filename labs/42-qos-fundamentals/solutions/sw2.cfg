hostname sw2
!
vlan 10
   name USERS
!
vlan 20
   name SERVERS
!
! Trust DSCP at ingress — sw1 already marked correctly, we honor it.
! (Default cEOS behavior is to trust DSCP on L3-capable ports; explicit
! here for documentation.)
!
interface Ethernet1
   description receiver
   switchport mode access
   switchport access vlan 20
!
interface Ethernet3
   description trunk-to-sw1
   switchport mode trunk
   switchport trunk allowed vlan 10
   qos trust dscp
!
interface Vlan10
   ip address 10.0.0.2/24
!
interface Vlan20
   ip address 10.0.1.1/24
!
ip routing
!
end
