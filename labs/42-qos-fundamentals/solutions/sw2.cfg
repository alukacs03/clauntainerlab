hostname sw2
!
vlan 10
   name USERS
!
! Trust DSCP at ingress on the trunk — sw1 already marked correctly,
! so we honor the marking instead of re-classifying.
! NOTE on the default: on a switched/trunk port the default trust mode
! is CoS, so we MUST explicitly set `qos trust dscp` to honor the DSCP
! carried over the trunk. (Routed ports default to DSCP trust.)
!
interface Ethernet1
   description receiver
   switchport mode access
   switchport access vlan 10
!
interface Ethernet3
   description trunk-to-sw1
   switchport mode trunk
   switchport trunk allowed vlan 10
   qos trust dscp
!
interface Vlan10
   ip address 10.0.0.2/24
!
ip routing
!
end
