hostname sw1
!
vlan 10
   name USERS
!
! ─── QoS classification: which traffic is which ───
class-map type qos match-any VOICE
   match ip dscp ef
!
class-map type qos match-any BULK
   match ip dscp cs1
!
! ─── DSCP marking by source port ───
! Voice port: rewrite all ingress to DSCP EF (46)
policy-map type qos MARK-VOICE
   class class-default
      set dscp ef
!
! Bulk port: rewrite all ingress to DSCP CS1 (8)
policy-map type qos MARK-BULK
   class class-default
      set dscp cs1
!
interface Ethernet1
   description voice-client
   switchport mode access
   switchport access vlan 10
   ! Apply marking inbound from the voice client
   service-policy type qos input MARK-VOICE
!
interface Ethernet2
   description bulk-client
   switchport mode access
   switchport access vlan 10
   service-policy type qos input MARK-BULK
!
interface Ethernet3
   description trunk-to-sw2
   switchport mode trunk
   switchport trunk allowed vlan 10
   ! Egress queueing: priority for EF (DSCP 46 → tx-queue 7),
   ! everything else shares the remaining queues by WRR/bandwidth.
   ! cEOS exposes per-tx-queue shaping/priority via tx-queue config.
   tx-queue 7
      priority strict
   tx-queue 0
      bandwidth percent 20
!
interface Vlan10
   ip address 10.0.0.1/24
!
ip routing
!
! Map DSCP → tx-queue (Arista default mapping puts EF in tq7;
! adjust per platform — verify with `show qos maps` and
! `show platform fap mapping qos`).
!
end
