hostname sw1
!
vlan 10
   name USERS
!
! ─── DSCP marking by source port ───
! Voice port: rewrite all ingress to DSCP EF (46 == "ef")
policy-map type qos MARK-VOICE
   class class-default
      set dscp ef
!
! Bulk port: rewrite all ingress to DSCP CS1 (8 == "cs1")
policy-map type qos MARK-BULK
   class class-default
      set dscp cs1
!
! NOTE: `set dscp ef` / `set dscp cs1` use the named DSCP keywords.
! Modern EOS accepts these; if a given image only takes numeric values,
! use `set dscp 46` (EF) and `set dscp 8` (CS1) instead.
!
interface Ethernet1
   description voice-client
   switchport mode access
   switchport access vlan 10
   ! Apply marking inbound from the voice client
   service-policy type qos input MARK-VOICE
!
interface Ethernet2
   description bulk-client
   switchport mode access
   switchport access vlan 10
   service-policy type qos input MARK-BULK
!
interface Ethernet3
   description trunk-to-sw2
   switchport mode trunk
   switchport trunk allowed vlan 10
   ! Egress scheduling.
   ! All tx-queues default to strict priority (SP). Tx-queue 7 (the
   ! highest) is the strict-priority queue used for EF and is NOT
   ! configurable — it stays SP by default, exactly what voice wants.
   ! To give the default queue a guaranteed bandwidth share instead of
   ! leaving it strict-priority, we first convert it (and all lower
   ! queues) to round-robin with `no priority`, THEN assign a percent.
   tx-queue 0
      no priority
      bandwidth percent 20
!
interface Vlan10
   ip address 10.0.0.1/24
!
ip routing
!
! Map DSCP → tx-queue: Arista's default qos map puts EF in tx-queue 7
! (strict priority). Verify the mapping with `show qos maps` and the
! per-interface state with `show qos interface Ethernet3`.
!
end
