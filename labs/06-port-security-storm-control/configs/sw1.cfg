hostname sw1
!
vlan 10
   name USERS
!
interface Ethernet1
   description h1 (no port-security yet)
   switchport mode access
   switchport access vlan 10
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet2
   description h2 (no port-security yet — will be the spoofer)
   switchport mode access
   switchport access vlan 10
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet3
   description h-storm (no storm-control yet)
   switchport mode access
   switchport access vlan 10
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet4
   description h-victim
   switchport mode access
   switchport access vlan 10
   spanning-tree portfast
   spanning-tree bpduguard enable
!
! ─────────────────────────────────────────────────────────────
! Starter has clean L2 with the lab 05 protections (PortFast +
! BPDU Guard). Now you'll add the next layer:
!   1. Port security on Et1 AND Et2: max 1 MAC, violation shutdown
!      (persistent port-security is global-default on Arista — no
!       per-port sticky keyword exists; dynamic MACs persist anyway)
!   2. Storm control on Et3: broadcast + multicast threshold ~1%
!      (config-only on cEOS — not enforced on the virtual platform)
!   3. Errdisable recovery (portsec + bpduguard): manual vs auto
!      (storm-control does NOT err-disable by default on Arista)
! ─────────────────────────────────────────────────────────────
!
end
