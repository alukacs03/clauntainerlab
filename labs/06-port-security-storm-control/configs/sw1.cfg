hostname sw1
!
vlan 10
   name USERS
!
interface Ethernet1
   description h1 (no port-security yet)
   switchport mode access
   switchport access vlan 10
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet2
   description h2 (no port-security yet — will be the spoofer)
   switchport mode access
   switchport access vlan 10
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet3
   description h-storm (no storm-control yet)
   switchport mode access
   switchport access vlan 10
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet4
   description h-victim
   switchport mode access
   switchport access vlan 10
   spanning-tree portfast
   spanning-tree bpduguard enable
!
! ─────────────────────────────────────────────────────────────
! Starter has clean L2 with the lab 05 protections (PortFast +
! BPDU Guard). Now you'll add the next layer:
!   1. Port security on Et1: max 1 MAC, sticky learning, violation shutdown
!   2. Storm control on Et3: broadcast threshold ~1%
!   3. Errdisable recovery so ports come back automatically after the storm
! ─────────────────────────────────────────────────────────────
!
end
