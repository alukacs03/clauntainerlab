hostname sw1
!
errdisable recovery cause portsecurity
errdisable recovery cause bpduguard
errdisable recovery interval 300
!
vlan 10
   name USERS
!
interface Ethernet1
   description h1 (port-security: max 1 MAC, sticky)
   switchport mode access
   switchport access vlan 10
   switchport port-security
   switchport port-security maximum 1
   switchport port-security mac-address sticky
   switchport port-security violation shutdown
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet2
   description h2 (port-security: max 1 MAC, sticky)
   switchport mode access
   switchport access vlan 10
   switchport port-security
   switchport port-security maximum 1
   switchport port-security mac-address sticky
   switchport port-security violation shutdown
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet3
   description h-storm (storm-control 1% broadcast, 1% multicast)
   switchport mode access
   switchport access vlan 10
   storm-control broadcast level 1
   storm-control multicast level 1
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet4
   description h-victim
   switchport mode access
   switchport access vlan 10
   spanning-tree portfast
   spanning-tree bpduguard enable
!
end
