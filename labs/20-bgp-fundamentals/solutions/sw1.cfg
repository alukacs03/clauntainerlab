hostname sw1
!
ip routing
!
interface Loopback0
   ip address 1.1.1.1/32
!
interface Ethernet1
   description h1
   no switchport
   ip address 10.10.0.1/24
!
interface Ethernet2
   description eBGP-peering-to-sw2
   no switchport
   ip address 192.168.12.1/30
!
router bgp 65001
   router-id 1.1.1.1
   no bgp default ipv4-unicast
   neighbor 192.168.12.2 remote-as 65002
   neighbor 192.168.12.2 description sw2 AS65002
   !
   address-family ipv4
      neighbor 192.168.12.2 activate
      network 10.10.0.0/24
!
end
