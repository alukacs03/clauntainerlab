name: bgp-fundamentals

topology:
  kinds:
    arista_ceos:
      image: ceos:4.35.4M
    linux:
      image: ghcr.io/srl-labs/network-multitool

  nodes:
    sw1:
      kind: arista_ceos
      startup-config: configs/sw1.cfg
    sw2:
      kind: arista_ceos
      startup-config: configs/sw2.cfg

    h1:
      kind: linux
      exec:
        - ip addr add 10.10.0.10/24 dev eth1
        - ip route add default via 10.10.0.1
    h2:
      kind: linux
      exec:
        - ip addr add 10.20.0.10/24 dev eth1
        - ip route add default via 10.20.0.1

  links:
    - endpoints: ["h1:eth1", "sw1:eth1"]
    - endpoints: ["h2:eth1", "sw2:eth1"]
    - endpoints: ["sw1:eth2", "sw2:eth2"]
