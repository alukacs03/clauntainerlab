hostname sw1
!
ip routing
!
interface Loopback0
   ip address 1.1.1.1/32
!
interface Ethernet1
   description h1
   no switchport
   ip address 10.10.0.1/24
!
interface Ethernet2
   description eBGP-peering-to-sw2
   no switchport
   ip address 192.168.12.1/30
!
! ─────────────────────────────────────────────────────────────
! Starter: sw1 represents AS 65001 with prefix 10.10.0.0/24.
! No BGP yet — sw1 can't see anything beyond its directly
! connected subnets.
!
! Your tasks (see README):
!   1. Enable BGP process for AS 65001
!   2. Set router-id to 1.1.1.1
!   3. Configure eBGP neighbor 192.168.12.2 in AS 65002
!   4. Advertise the local LAN (10.10.0.0/24) via 'network'
!   5. Verify session reaches Established and routes flow
! ─────────────────────────────────────────────────────────────
!
end
