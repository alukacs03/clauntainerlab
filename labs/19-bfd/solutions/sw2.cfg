hostname sw2
!
ip routing
!
! 300/300/3 are the EOS defaults; the real change is `bfd default` under OSPF.
bfd interval 300 min-rx 300 multiplier 3
!
interface Loopback0
   ip address 2.2.2.2/32
   ip ospf area 0.0.0.0
!
interface Ethernet2
   description to-sw1
   no switchport
   ip address 192.168.12.2/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
interface Ethernet3
   description to-sw3
   no switchport
   ip address 192.168.23.2/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
router ospf 1
   router-id 2.2.2.2
   passive-interface default
   no passive-interface Ethernet2
   no passive-interface Ethernet3
   bfd default
!
end
