hostname sw1
!
ip routing
!
! ─── BFD timers (300ms × 3 = ~900ms detection) ───
! Note: 300/300/3 are the EOS defaults, so this line documents
! intent rather than changing behavior — the real change is
! `bfd default` under OSPF below, which subscribes OSPF to BFD.
bfd interval 300 min-rx 300 multiplier 3
!
interface Loopback0
   ip address 1.1.1.1/32
   ip ospf area 0.0.0.0
!
interface Ethernet1
   description h1
   no switchport
   ip address 10.10.10.1/24
   ip ospf area 0.0.0.0
   ip ospf passive
!
interface Ethernet2
   description to-sw2
   no switchport
   ip address 192.168.12.1/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
interface Ethernet3
   description to-sw3
   no switchport
   ip address 192.168.13.1/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
router ospf 1
   router-id 1.1.1.1
   passive-interface default
   no passive-interface Ethernet2
   no passive-interface Ethernet3
   bfd default
!
end
