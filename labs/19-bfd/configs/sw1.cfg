hostname sw1
!
ip routing
!
interface Loopback0
   ip address 1.1.1.1/32
   ip ospf area 0.0.0.0
!
interface Ethernet1
   description h1
   no switchport
   ip address 10.10.10.1/24
   ip ospf area 0.0.0.0
!
interface Ethernet2
   description to-sw2
   no switchport
   ip address 192.168.12.1/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
interface Ethernet3
   description to-sw3
   no switchport
   ip address 192.168.13.1/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
router ospf 1
   router-id 1.1.1.1
   passive-interface default
   no passive-interface Ethernet2
   no passive-interface Ethernet3
!
! ─────────────────────────────────────────────────────────────
! Starter: OSPF is running from lab 17. Default OSPF dead timer
! is 40s — a silently-broken link takes 40s to be noticed.
!
! Your tasks (see README):
!   1. Set BFD timers globally: bfd interval 300 min-rx 300 multiplier 3
!      (these are the EOS defaults, so this just documents intent)
!   2. Subscribe OSPF to BFD on all its interfaces: under
!      `router ospf 1`, add `bfd default`
!   3. Verify BFD sessions come up (show bfd peers)
!   4. Demonstrate the difference: drop OSPF packets via ACL
!      with and without BFD, observe how long until reconvergence
!
! Apply the same BFD config on sw2 and sw3 (see solutions/).
! ─────────────────────────────────────────────────────────────
!
end
