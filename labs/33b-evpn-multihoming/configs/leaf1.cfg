hostname leaf1
!
ip routing
!
interface Loopback0
   ip address 1.1.1.1/32
!
interface Loopback1
   ip address 11.11.11.11/32
!
vlan 100
   name TENANT-A
!
! STP must be disabled for multi-homed VLANs (EOS Manual 19.14.3 — STP is
! not supported between PE-CE on EVPN all-active multi-homed segments)
no spanning-tree vlan-id 100
!
interface Ethernet1
   description to-spine1
   no switchport
   ip address 10.0.1.1/31
!
interface Ethernet2
   description to-ce1 (Po10 member — Ethernet Segment toward CE)
   ! Channel-group + ES configuration goes here in the solution
!
interface Ethernet3
   description h2 (single-homed)
   switchport mode access
   switchport access vlan 100
!
router bgp 65001
   router-id 1.1.1.1
   no bgp default ipv4-unicast
   maximum-paths 64 ecmp 64
   neighbor 10.0.1.0 remote-as 65100
   neighbor 10.0.1.0 send-community extended
   !
   address-family ipv4
      neighbor 10.0.1.0 activate
      network 1.1.1.1/32
      network 11.11.11.11/32
   !
   address-family evpn
      neighbor 10.0.1.0 activate
!
! ─────────────────────────────────────────────────────────────
! Starter: underlay BGP-EVPN is up, but the downstream link to ce1
! (Et2) is bare. Your tasks (see README):
!   1. Create Port-Channel10 on Et2 with mode on (NOT LACP active —
!      we're static at this layer; LACP runs from leaves-to-CE
!      with a *shared* system-id)
!   2. Configure the Ethernet Segment:
!      - identifier 0011:1111:1111:1111:1111 (must match on leaf2)
!      - route-target import 00:11:11:11:11:11
!      - lacp system-id aabb.ccdd.0001 (must match on leaf2)
!   3. Make Port-Channel10 a switchport access VLAN 100
!   4. Add VXLAN VNI mapping (VLAN 100 → VNI 10100)
!   5. Add EVPN VLAN 100 service instance with RD/RT
!   6. Mirror identical config on leaf2 (only RD differs — RD is locally unique)
!   7. Configure ce1 with a regular LACP bond Po10 across Et1 + Et2
!      (CE doesn't know it's multi-homed; from its view, just LACP)
!   8. Verify Ethernet Segment formed, Type 1 (A-D) routes propagating,
!      h1 ↔ h2 traffic flows
! ─────────────────────────────────────────────────────────────
!
end
