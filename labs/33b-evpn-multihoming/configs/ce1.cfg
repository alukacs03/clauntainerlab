hostname ce1
!
vlan 100
   name TENANT-A
!
! ce1 doesn't know it's multi-homed to two different EVPN-MH peers —
! from its view, this is just an ordinary LACP bundle to one "switch".
! Your job here: configure a regular LACP Port-Channel across Et1 + Et2.
!
interface Ethernet1
   description uplink-A
!
interface Ethernet2
   description uplink-B
!
interface Ethernet3
   description h1 (multi-homed customer host)
   switchport mode access
   switchport access vlan 100
   spanning-tree portfast
   spanning-tree bpduguard enable
!
end
