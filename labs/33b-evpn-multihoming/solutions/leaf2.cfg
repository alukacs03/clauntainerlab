hostname leaf2
!
ip routing
!
interface Loopback0
   ip address 2.2.2.2/32
!
interface Loopback1
   ip address 22.22.22.22/32
!
vlan 100
   name TENANT-A
!
no spanning-tree vlan-id 100
!
! ESI + LACP system-id IDENTICAL to leaf1's. That's the entire trick.
interface Port-Channel10
   description to-ce1 (EVPN-MH Ethernet Segment)
   switchport mode access
   switchport access vlan 100
   evpn ethernet-segment
      identifier 0011:1111:1111:1111:1111
      route-target import 00:11:11:11:11:11
      lacp system-id aabb.ccdd.0001
!
interface Ethernet1
   description to-spine1
   no switchport
   ip address 10.0.2.1/31
!
interface Ethernet2
   description to-ce1 (Po10 member)
   channel-group 10 mode on
!
interface Vxlan1
   vxlan source-interface Loopback1
   vxlan udp-port 4789
   vxlan vlan 100 vni 10100
!
router bgp 65002
   router-id 2.2.2.2
   no bgp default ipv4-unicast
   maximum-paths 64 ecmp 64
   neighbor 10.0.2.0 remote-as 65100
   neighbor 10.0.2.0 send-community extended
   !
   vlan 100
      rd 2.2.2.2:10100
      route-target both 10100:10100
      redistribute learned
   !
   address-family ipv4
      neighbor 10.0.2.0 activate
      network 2.2.2.2/32
      network 22.22.22.22/32
   !
   address-family evpn
      neighbor 10.0.2.0 activate
!
end
