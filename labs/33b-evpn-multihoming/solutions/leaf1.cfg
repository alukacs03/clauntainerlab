hostname leaf1
!
ip routing
!
interface Loopback0
   ip address 1.1.1.1/32
!
interface Loopback1
   ip address 11.11.11.11/32
!
vlan 100
   name TENANT-A
!
no spanning-tree vlan-id 100
!
! ─── Ethernet Segment toward ce1 ───
! ESI + LACP system-id must MATCH on leaf2 — that's what makes them
! one logical LACP partner from ce1's view.
interface Port-Channel10
   description to-ce1 (EVPN-MH Ethernet Segment)
   switchport mode access
   switchport access vlan 100
   evpn ethernet-segment
      identifier 0011:1111:1111:1111:1111
      route-target import 00:11:11:11:11:11
      lacp system-id aabb.ccdd.0001
!
interface Ethernet1
   description to-spine1
   no switchport
   ip address 10.0.1.1/31
!
interface Ethernet2
   description to-ce1 (Po10 member)
   channel-group 10 mode on
!
interface Ethernet3
   description h2 (single-homed)
   switchport mode access
   switchport access vlan 100
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Vxlan1
   vxlan source-interface Loopback1
   vxlan udp-port 4789
   vxlan vlan 100 vni 10100
!
router bgp 65001
   router-id 1.1.1.1
   no bgp default ipv4-unicast
   maximum-paths 64 ecmp 64
   neighbor 10.0.1.0 remote-as 65100
   neighbor 10.0.1.0 send-community extended
   !
   vlan 100
      rd 1.1.1.1:10100
      route-target both 10100:10100
      redistribute learned
   !
   address-family ipv4
      neighbor 10.0.1.0 activate
      network 1.1.1.1/32
      network 11.11.11.11/32
   !
   address-family evpn
      neighbor 10.0.1.0 activate
!
end
