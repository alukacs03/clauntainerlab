hostname ce1
!
vlan 100
   name TENANT-A
!
! Normal LACP bundle. CE has no idea it's multi-homed across two
! different physical switches — it sees one LACP partner because
! leaf1 and leaf2 share the same lacp system-id.
interface Port-Channel10
   description bonded-uplink-to-fabric
   switchport mode access
   switchport access vlan 100
!
interface Ethernet1
   description uplink-A (to leaf1)
   channel-group 10 mode active
!
interface Ethernet2
   description uplink-B (to leaf2)
   channel-group 10 mode active
!
interface Ethernet3
   description h1 (multi-homed customer host)
   switchport mode access
   switchport access vlan 100
   spanning-tree portfast
   spanning-tree bpduguard enable
!
end
