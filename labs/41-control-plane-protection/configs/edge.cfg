hostname edge
!
ip routing
!
interface Ethernet1
   description trusted-mgmt-network
   no switchport
   ip address 10.99.0.1/24
!
interface Ethernet2
   description untrusted-external
   no switchport
   ip address 203.0.113.1/24
!
username admin privilege 15 secret 0 admin
!
management ssh
   no shutdown
!
management api http-commands
   protocol https
   no shutdown
!
! ─────────────────────────────────────────────────────────────
! Starter: edge has both mgmt and external interfaces, with SSH
! and HTTPS-mgmt-API enabled. Anyone (including the attacker)
! can hit these services. Your tasks:
!   1. Apply a mgmt-plane ACL that restricts SSH and HTTPS-API
!      to only the trusted mgmt network (10.99.0.0/24)
!   2. Configure Control-Plane Policing (CoPP) to rate-limit
!      packets-to-CPU (mgmt, BGP, OSPF, ICMP) — protects against
!      CPU-flood attacks
!   3. Verify: mgmt host can still reach SSH; attacker cannot
! ─────────────────────────────────────────────────────────────
!
end
