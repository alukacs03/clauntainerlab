hostname edge
!
ip routing
!
interface Ethernet1
   description trusted-mgmt-network
   no switchport
   ip address 10.99.0.1/24
!
interface Ethernet2
   description untrusted-external
   no switchport
   ip address 203.0.113.1/24
!
username admin privilege 15 secret 0 admin
!
management ssh
   no shutdown
!
management api http-commands
   protocol https
   no shutdown
!
! ─────────────────────────────────────────────────────────────
! Starter: edge has both mgmt and external interfaces, with SSH
! and HTTPS-mgmt-API enabled. Anyone (including the attacker)
! can hit these services. Your tasks:
!   1. Create MGMT-PLANE-ACL (permit 10.99.0.0/24, deny rest) with
!      'counters per-entry', and apply it as a Service ACL under
!      'management ssh' (in) and 'management api http-commands'
!      (inside 'vrf default', no 'in')
!   2. Build a targeted edge filter EDGE-IN applied inbound on
!      Ethernet2: deny untrusted hosts reaching the router's own
!      SSH/HTTPS, permit everything else (transit still forwards)
!   3. Configure Control-Plane Policing (CoPP) via a to-CPU ACL
!      under 'control-plane' (accepted but not enforced in cEOS)
!   4. Verify: mgmt host can still reach SSH; attacker cannot
! ─────────────────────────────────────────────────────────────
!
end
