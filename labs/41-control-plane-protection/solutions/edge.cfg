hostname edge
!
ip routing
!
! ─── Management plane ACL (control-plane allowlist) ───
! Used by the SSH and eAPI Service ACLs below. This filters
! connections TO the router's own management services — it is a
! control-plane allowlist, NOT a transit/data-plane filter.
! `counters per-entry` is required to see per-rule hit counts;
! new EOS ACLs default to non-counting.
ip access-list MGMT-PLANE-ACL
   counters per-entry
   10 permit ip 10.99.0.0/24 any
   20 deny ip any any
!
! ─── Edge interface filter (data-plane, to-the-box only) ───
! Applied inbound on the untrusted interface. This is a *targeted*
! edge filter: it denies untrusted hosts reaching the router's OWN
! management ports (SSH/HTTPS on either router address) but PERMITS
! everything else so transit traffic still forwards. This is the key
! distinction from a control-plane filter: an interface ACL sees ALL
! traffic (transit + to-CPU); a control-plane/Service ACL sees only
! to-CPU traffic. A deny-all interface ACL would black-hole transit.
ip access-list EDGE-IN
   counters per-entry
   10 deny tcp any host 203.0.113.1 eq 22
   20 deny tcp any host 203.0.113.1 eq 443
   30 deny tcp any host 10.99.0.1 eq 22
   40 deny tcp any host 10.99.0.1 eq 443
   50 permit ip any any
!
interface Ethernet1
   description trusted-mgmt-network
   no switchport
   ip address 10.99.0.1/24
!
interface Ethernet2
   description untrusted-external
   no switchport
   ip address 203.0.113.1/24
   ! Targeted edge filter: blocks attacker's mgmt access, permits transit
   ip access-group EDGE-IN in
!
username admin privilege 15 secret 0 admin
!
management ssh
   no shutdown
   ! SSH Service ACL — applied at the config-mgmt-ssh level with 'in'
   ip access-group MGMT-PLANE-ACL in
!
management api http-commands
   protocol https
   no shutdown
   ! eAPI Service ACL — applied inside the vrf sub-context, no 'in' keyword
   vrf default
      ip access-group MGMT-PLANE-ACL
!
! ─── CoPP: Control-Plane Policing (to-CPU ACL) ───
! The `control-plane / ip access-group` form is valid EOS and replaces
! the built-in read-only default-control-plane-acl. It filters traffic
! punted to the CPU.
! cEOS NOTE: the control-plane ACL is config-accepted but its to-CPU
! enforcement/counters are NOT reliable in the container (no ASIC
! datapath). The observable attacker-block in this lab comes from the
! EDGE-IN interface ACL above, which IS enforced in cEOS.
control-plane
   ip access-group COPP-INBOUND in
!
ip access-list COPP-INBOUND
   counters per-entry
   ! Permit BGP from peers — BOTH port directions. The router may be the
   ! TCP client (return traffic arrives with source port 179), mirroring
   ! the built-in default-control-plane-acl.
   10 permit tcp any any eq bgp
   15 permit tcp any eq bgp any
   20 permit ospf any any
   30 permit pim any any
   40 permit udp any any eq ntp
   50 permit udp any any eq snmp
   60 permit tcp 10.99.0.0/24 any eq 22
   70 permit tcp 10.99.0.0/24 any eq 443
   80 permit icmp any any
   ! Drop everything else
   100 deny ip any any
!
end
