hostname edge
!
ip routing
!
! ─── Management plane ACL ───
! Restricts who can reach management services (SSH, HTTPS API)
ip access-list MGMT-PLANE-ACL
   10 permit ip 10.99.0.0/24 any
   20 deny ip any any
!
interface Ethernet1
   description trusted-mgmt-network
   no switchport
   ip address 10.99.0.1/24
!
interface Ethernet2
   description untrusted-external
   no switchport
   ip address 203.0.113.1/24
   ! Apply MGMT-PLANE-ACL inbound — blocks attacker's mgmt access
   ip access-group MGMT-PLANE-ACL in
!
username admin privilege 15 secret 0 admin
!
management ssh
   no shutdown
   ip access-group MGMT-PLANE-ACL in
!
management api http-commands
   protocol https
   no shutdown
   ip access-group MGMT-PLANE-ACL in
!
! ─── CoPP: Control-Plane Policing ───
! Note: cEOS may have limited CoPP capabilities; real hardware
! has rich per-class policing. The general pattern shown here.
control-plane
   ip access-group COPP-INBOUND in
!
ip access-list COPP-INBOUND
   ! Permit BGP from peers (allow with rate-limit on real HW)
   10 permit tcp any any eq bgp
   20 permit ospf any any
   30 permit pim any any
   40 permit udp any any eq ntp
   50 permit udp any any eq snmp
   60 permit tcp 10.99.0.0/24 any eq 22
   70 permit tcp 10.99.0.0/24 any eq 443
   80 permit icmp any any
   ! Drop everything else
   100 deny ip any any
!
end
