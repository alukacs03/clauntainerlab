hostname sw1
!
! VRF must be defined before "ip routing vrf MGMT" can reference it
! (EOS canonical ordering: vrf instance, then ip routing vrf).
vrf instance MGMT
!
ip routing
ip routing vrf MGMT
!
interface Ethernet1
   description data-plane (h-data)
   no switchport
   ip address 10.0.0.1/24
!
interface Ethernet2
   description mgmt-port (h-admin) — isolated in VRF MGMT
   no switchport
   vrf MGMT
   ip address 192.168.99.1/24
!
management ssh
   no shutdown
   vrf MGMT
      no shutdown
!
username admin privilege 15 secret 0 admin
!
! The isolation demo (README Verification §4) is performed live — it
! inspects/compares the per-VRF RIBs and is intentionally not persisted.
!
end
