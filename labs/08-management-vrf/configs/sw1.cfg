hostname sw1
!
! Both interfaces share the default VRF — typical "flat" config.
! SSH listens everywhere by default.
!
ip routing
!
interface Ethernet1
   description data-plane (h-data)
   no switchport
   ip address 10.0.0.1/24
!
interface Ethernet2
   description mgmt-port (h-admin) — currently in default VRF (LAB STARTER)
   no switchport
   ip address 192.168.99.1/24
!
management ssh
   no shutdown
!
username admin privilege 15 secret 0 admin
!
! ─────────────────────────────────────────────────────────────
! Starter has the classic mistake: mgmt and data share the default
! VRF. Your tasks:
!   1. Create VRF "MGMT"
!   2. Move Ethernet2 (mgmt port) into VRF MGMT
!   3. Re-add 192.168.99.1/24 to Et2 (the address dropped when you
!      changed the VRF — that's normal)
!   4. Enable SSH in VRF MGMT
!   5. Demonstrate isolation: plant a bad default route in the
!      default VRF and confirm it does NOT show up in the MGMT
!      VRF's routing table. See README Verification §4.
! ─────────────────────────────────────────────────────────────
!
end
