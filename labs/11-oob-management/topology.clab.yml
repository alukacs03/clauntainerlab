name: oob-management

topology:
  kinds:
    arista_ceos:
      image: ceos:4.35.4M
    linux:
      image: ghcr.io/srl-labs/network-multitool

  nodes:
    # Data-plane switches
    sw1:
      kind: arista_ceos
      startup-config: configs/sw1.cfg
    sw2:
      kind: arista_ceos
      startup-config: configs/sw2.cfg

    # Dedicated OOB management switch — physically and logically
    # isolated from the data plane.
    sw-oob:
      kind: arista_ceos
      startup-config: configs/sw-oob.cfg

    # Admin workstation — only reaches devices via OOB
    h-admin:
      kind: linux
      exec:
        - ip addr add 192.168.99.10/24 dev eth1
        - ip route add default via 192.168.99.1

    # Data-plane host — production traffic
    h-data:
      kind: linux
      exec:
        - ip addr add 10.0.0.10/24 dev eth1
        - ip route add default via 10.0.0.1

  links:
    # ─── DATA PLANE ───
    - endpoints: ["h-data:eth1", "sw1:eth1"]      # host to sw1
    - endpoints: ["sw1:eth2", "sw2:eth2"]         # sw1-sw2 data trunk

    # ─── OOB MANAGEMENT PLANE ───
    - endpoints: ["sw1:eth3", "sw-oob:eth1"]      # sw1 OOB port → OOB switch
    - endpoints: ["sw2:eth3", "sw-oob:eth2"]      # sw2 OOB port → OOB switch
    - endpoints: ["h-admin:eth1", "sw-oob:eth3"]  # admin → OOB switch
