hostname sw-oob
!
vlan 99
   name OOB-MGMT
!
interface Ethernet1
   description to-sw1-oob-port
   switchport mode access
   switchport access vlan 99
!
interface Ethernet2
   description to-sw2-oob-port
   switchport mode access
   switchport access vlan 99
!
interface Ethernet3
   description to-admin-workstation
   switchport mode access
   switchport access vlan 99
!
! sw-oob is a pure L2 switch for the OOB segment — no L3, no SVI.
! All mgmt traffic crosses through here as a single broadcast domain.
!
end
