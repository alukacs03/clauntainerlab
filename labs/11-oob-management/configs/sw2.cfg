hostname sw2
!
ip routing
!
interface Ethernet2
   description data-plane: trunk to sw1
   no switchport
   ip address 10.1.1.2/30
!
interface Ethernet3
   description OOB management port → sw-oob
   no switchport
   ip address 192.168.99.2/24
!
username admin privilege 15 secret 0 admin
!
management ssh
   no shutdown
!
end
