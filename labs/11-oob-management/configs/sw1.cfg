hostname sw1
!
ip routing
!
interface Ethernet1
   description data-plane: h-data
   no switchport
   ip address 10.0.0.1/24
!
interface Ethernet2
   description data-plane: trunk to sw2
   no switchport
   ip address 10.1.1.1/30
!
interface Ethernet3
   description OOB management port → sw-oob (CURRENTLY IN DEFAULT VRF — wrong)
   no switchport
   ip address 192.168.99.1/24
!
username admin privilege 15 secret 0 admin
!
management ssh
   no shutdown
!
! ─────────────────────────────────────────────────────────────
! Starter has OOB port in default VRF — looks fine, but data-plane
! mistakes can still kill management.
!
! Your tasks (see README):
!   1. Create VRF MGMT
!   2. Move Et3 into VRF MGMT (the OOB port)
!   3. Bind SSH to listen in VRF MGMT
!   4. Verify: break the data plane (Et1/Et2) and confirm OOB
!      access still works via sw-oob → h-admin
! ─────────────────────────────────────────────────────────────
!
end
