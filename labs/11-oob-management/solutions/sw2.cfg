hostname sw2
!
ip routing
!
vrf instance MGMT
!
ip routing vrf MGMT
!
interface Ethernet2
   description data-plane: trunk to sw1
   no switchport
   ip address 10.1.1.2/30
!
interface Ethernet3
   description OOB management port (VRF MGMT)
   no switchport
   vrf MGMT
   ip address 192.168.99.2/24
!
username admin privilege 15 secret 0 admin
!
management ssh
   no shutdown
   vrf MGMT
      no shutdown
!
end
