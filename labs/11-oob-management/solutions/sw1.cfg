hostname sw1
!
ip routing
ip routing vrf MGMT
!
vrf instance MGMT
!
interface Ethernet1
   description data-plane: h-data
   no switchport
   ip address 10.0.0.1/24
!
interface Ethernet2
   description data-plane: trunk to sw2
   no switchport
   ip address 10.1.1.1/30
!
interface Ethernet3
   description OOB management port (VRF MGMT)
   no switchport
   vrf MGMT
   ip address 192.168.99.1/24
!
username admin privilege 15 secret 0 admin
!
management ssh
   no shutdown
   vrf MGMT
      no shutdown
!
end
