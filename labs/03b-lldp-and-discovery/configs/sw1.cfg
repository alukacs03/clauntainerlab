hostname sw1.dc-a.example
!
interface Ethernet1
   description trunk-to-sw2
   no switchport
   ip address 10.0.12.1/30
!
interface Ethernet2
   description trunk-to-sw3
   no switchport
   ip address 10.0.13.1/30
!
interface Ethernet3
   description h1 (server in DC-A rack-3)
   no switchport
   ip address 10.10.10.1/24
!
! ─────────────────────────────────────────────────────────────
! Starter: cEOS has LLDP enabled by default — try `show lldp`
! immediately. Your tasks (see README):
!   1. Verify LLDP is up; explore the default `show lldp neighbors`
!   2. View detailed neighbor info (what TLVs they sent)
!   3. View YOUR local info (what you advertise outward)
!   4. Tune LLDP timer + hold-time
!   5. Disable LLDP transmit on a port (one direction); observe
!      how the OTHER side sees you disappear after hold-time
!   6. Find the simulated mis-cabling: one of sw1's interface
!      descriptions claims it goes to one neighbor, but the actual
!      LLDP neighbor on that port is different
! ─────────────────────────────────────────────────────────────
!
end
