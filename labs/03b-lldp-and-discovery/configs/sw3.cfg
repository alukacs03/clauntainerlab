hostname sw3.dc-b.example
!
! Note: sw3's description on Et1 says "to sw1" — but the cable
! is actually plugged into sw2:Et2. This is the simulated
! mis-cabling for task 6. LLDP will reveal the truth.
interface Ethernet1
   description trunk-to-sw1 (per documentation)
   no switchport
   ip address 10.0.23.2/30
!
interface Ethernet2
   description trunk-to-sw1
   no switchport
   ip address 10.0.13.2/30
!
end
