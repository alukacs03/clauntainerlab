hostname sw1.dc-a.example
!
! Tuned LLDP timers — for environments where you want faster
! neighbor change detection. Defaults are 30s / 120s; this gives
! 5s updates and 30s hold-time.
lldp timer 5
lldp hold-time 30
!
! Optional: include management address TLV referencing a specific interface
lldp management-address Ethernet1
!
interface Ethernet1
   description trunk-to-sw2
   no switchport
   ip address 10.0.12.1/30
!
interface Ethernet2
   description trunk-to-sw3
   no switchport
   ip address 10.0.13.1/30
!
interface Ethernet3
   description h1 (server in DC-A rack-3)
   no switchport
   ip address 10.10.10.1/24
!
end
