hostname pe2
!
vlan 500
   name S-VLAN-CompanyX
!
interface Ethernet1
   description provider-backbone-to-pe1
   switchport mode trunk
   switchport trunk allowed vlan 500
!
interface Ethernet2
   description customer-edge-port to ce2 (CompanyX site B)
   switchport mode dot1q-tunnel
   switchport access vlan 500
!
end
