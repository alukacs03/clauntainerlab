hostname pe1
!
vlan 500
   name S-VLAN-CompanyX
!
interface Ethernet1
   description provider-backbone-to-pe2
   switchport mode trunk
   switchport trunk allowed vlan 500
   ! Optional: set TPID to 0x88a8 (IEEE 802.1ad-compliant service-VLAN tag).
   ! Platform-gated: 'switchport dot1q ethertype' is 7280E/7500E-only and is
   ! likely rejected on cEOS — left commented; the lab uses the default 0x8100.
   ! switchport dot1q ethertype 0x88a8
!
interface Ethernet2
   description customer-edge-port to ce1 (CompanyX site A)
   switchport mode dot1q-tunnel
   switchport access vlan 500
!
end
