hostname ce1.companyx.example
!
vlan 10
   name companyx-users
!
vlan 20
   name companyx-servers
!
interface Ethernet1
   description uplink-to-provider
   switchport mode trunk
   switchport trunk allowed vlan 10,20
!
interface Ethernet2
   description h1 — CompanyX user
   switchport mode access
   switchport access vlan 10
!
interface Ethernet3
   description h3 — CompanyX server
   switchport mode access
   switchport access vlan 20
!
end
