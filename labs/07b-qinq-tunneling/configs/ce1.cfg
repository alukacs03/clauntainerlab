hostname ce1.companyx.example
!
! CompanyX's own internal VLANs (c-VLANs) — they manage these themselves.
! They have NO IDEA that the provider tunnels them in s-VLAN 500.
vlan 10
   name companyx-users
!
vlan 20
   name companyx-servers
!
interface Ethernet1
   description uplink-to-provider
   ! From CompanyX's view: a regular trunk to "the provider's switch"
   switchport mode trunk
   switchport trunk allowed vlan 10,20
!
interface Ethernet2
   description h1 — CompanyX user
   switchport mode access
   switchport access vlan 10
!
interface Ethernet3
   description h3 — CompanyX server
   switchport mode access
   switchport access vlan 20
!
end
