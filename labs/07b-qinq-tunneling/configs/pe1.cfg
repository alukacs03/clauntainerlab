hostname pe1
!
! The provider's service VLAN that will wrap CompanyX's customer VLANs.
! In a real provider network, this s-VLAN ID is allocated by the provider
! per customer (e.g., 500 for CompanyX, 501 for CompanyY, etc.).
vlan 500
   name S-VLAN-CompanyX
!
interface Ethernet1
   description provider-backbone-to-pe2
   ! Regular trunk between provider switches; carries the s-VLAN
!
interface Ethernet2
   description customer-edge-port to ce1 (CompanyX site A)
   ! Customer-facing port — needs dot1q-tunnel mode
!
! ─────────────────────────────────────────────────────────────
! Starter: pe1 has the S-VLAN created but the customer-facing port (Et2)
! and the provider trunk (Et1) need configuring. See README.
!
! Your tasks:
!   1. Make Et2 a dot1q-tunnel port in s-VLAN 500
!   2. Make Et1 a regular trunk allowing s-VLAN 500
!   3. Optionally: configure TPID 0x88a8 on Et1 for IEEE-standard QinQ
!      (default 0x8100 also works but isn't strictly compliant)
! ─────────────────────────────────────────────────────────────
!
end
