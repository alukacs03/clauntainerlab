hostname sw1
!
vlan 50
   name STORAGE
!
interface Ethernet1
   description initiator
   switchport mode access
   switchport access vlan 50
   mtu 9214
!
interface Ethernet2
   description target
   switchport mode access
   switchport access vlan 50
   mtu 9214
!
! ─────────────────────────────────────────────────────────────
! Starter: storage VLAN with jumbo frames. Your tasks (note:
! cEOS support for these features is partial; on production
! hardware these commands fully take effect):
!   1. Classify storage traffic into traffic-class 3 by DSCP
!      (e.g., DSCP 26 = AF31 used for iSCSI)
!   2. Enable PFC (Priority Flow Control) on traffic-class 3
!      on the storage-facing interfaces — when buffers fill,
!      send a PAUSE frame for class 3 only (other traffic
!      keeps flowing).
!   3. Apply ETS (Enhanced Transmission Selection) bandwidth
!      guarantees: 50% to traffic-class 3 (storage).
!   4. Verify with `show qos interface` and `show dcbx`.
! ─────────────────────────────────────────────────────────────
!
end
