hostname sw1
!
vlan 50
   name STORAGE
!
! ─── DCB / PFC / ETS configuration pattern ───
! Note: This is the production-EOS pattern. cEOS accepts the syntax but
! does NOT enforce PFC/ETS in the container datapath (no ASIC). On real
! hardware (DCS-7060X / 7280R / 7500R) these provide hardware lossless
! ethernet; in cEOS the running-config shows the intent only.
!
! Map DSCP → traffic class so storage traffic lands in the lossless class.
! DSCP 26 (AF31) is the value the host marks iSCSI/storage with; DSCP 24
! (CS3) is also mapped to tc 3 because some storage stacks mark control
! traffic CS3 and we want it in the same lossless/ETS class.
qos map dscp 26 to traffic-class 3
qos map dscp 24 to traffic-class 3
!
! Storage-facing interfaces. Each block carries the full per-interface
! config: access-VLAN + jumbo MTU, DSCP trust, PFC, DCBX, and the ETS
! tx-queue bandwidth guarantees (tc 3 = 50% minimum, tc 0 = 30%).
interface Ethernet1
   description initiator
   switchport mode access
   switchport access vlan 50
   mtu 9214
   ! Trust incoming DSCP (the host marks iSCSI as AF31)
   qos trust dscp
   ! PFC on TC3 — pause storage class only when its buffers fill
   priority-flow-control on
   priority-flow-control priority 3 no-drop
   ! DCBX (IEEE) advertises PFC/ETS capability to the attached host NIC.
   ! Requires LLDP, which is enabled by default in EOS.
   dcbx mode ieee
   ! ETS: guarantee 50% of the link to the storage class, 30% to default.
   tx-queue 3
      bandwidth percent 50
   tx-queue 0
      bandwidth percent 30
!
interface Ethernet2
   description target
   switchport mode access
   switchport access vlan 50
   mtu 9214
   qos trust dscp
   priority-flow-control on
   priority-flow-control priority 3 no-drop
   dcbx mode ieee
   tx-queue 3
      bandwidth percent 50
   tx-queue 0
      bandwidth percent 30
!
end
