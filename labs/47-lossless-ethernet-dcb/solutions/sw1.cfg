hostname sw1
!
vlan 50
   name STORAGE
!
! ─── DCB / PFC / ETS configuration pattern ───
! Note: This is the production-EOS pattern. cEOS may not enforce
! these in software; on real hardware (DCS-7060X / 7280R / 7500R)
! these provide hardware lossless ethernet.
!
! Map DSCP → traffic class. DSCP 26 (AF31) → tc 3 (storage class).
qos map dscp 26 to traffic-class 3
qos map dscp 24 to traffic-class 3
!
! Define a CoS/ETS policy: TC 3 gets 50% guaranteed bandwidth,
! TC 0 (default best-effort) gets the rest. TC 3 is lossless.
policy-map type qos STORAGE-LOSSLESS
   class class-default
!
! Enable PFC on the storage class
qos tx-queue 3 no-drop
!
interface Ethernet1
   description initiator
   switchport mode access
   switchport access vlan 50
   mtu 9214
   ! Trust incoming DSCP (the host marks iSCSI as AF31)
   qos trust dscp
   ! PFC on TC3 — pause storage class when buffers fill
   priority-flow-control on
   priority-flow-control priority 3 no-drop
!
interface Ethernet2
   description target
   switchport mode access
   switchport access vlan 50
   mtu 9214
   qos trust dscp
   priority-flow-control on
   priority-flow-control priority 3 no-drop
!
! ETS bandwidth allocations per traffic class (production-EOS syntax)
! On the egress queues:
interface Ethernet1
   tx-queue 3
      bandwidth percent 50
   tx-queue 0
      bandwidth percent 30
!
interface Ethernet2
   tx-queue 3
      bandwidth percent 50
   tx-queue 0
      bandwidth percent 30
!
! DCBX (advertise capabilities to attached hosts so their NIC firmware
! aligns automatically)
dcbx mode ieee
!
end
