hostname sw1
!
ip routing
!
interface Loopback0
   description router-id source
   ip address 1.1.1.1/32
!
interface Ethernet1
   description h1
   no switchport
   ip address 10.10.10.1/24
!
interface Ethernet2
   description to-sw2
   no switchport
   ip address 192.168.12.1/30
!
interface Ethernet3
   description to-sw3
   no switchport
   ip address 192.168.13.1/30
!
! ─────────────────────────────────────────────────────────────
! Starter: L3 connectivity is set up but there are NO routes
! advertised between the switches. h1 can ping its own gateway
! but cannot reach h2 or h3.
!
! Your tasks (see README):
!   1. Enable OSPF process 1, router-id 1.1.1.1
!   2. Advertise these networks in area 0:
!      - Loopback0
!      - h1 LAN (10.10.10.0/24)
!      - Both transit links (192.168.12.0/30, 192.168.13.0/30)
!   3. Verify neighbor adjacency formation with sw2 and sw3
!   4. Verify h1 ↔ h2 and h1 ↔ h3 connectivity via OSPF-learned routes
! ─────────────────────────────────────────────────────────────
!
end
