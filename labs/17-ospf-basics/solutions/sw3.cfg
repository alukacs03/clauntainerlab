hostname sw3
!
ip routing
!
interface Loopback0
   ip address 3.3.3.3/32
   ip ospf area 0.0.0.0
!
interface Ethernet1
   description h3
   no switchport
   ip address 10.30.30.1/24
   ip ospf area 0.0.0.0
!
interface Ethernet2
   description to-sw2
   no switchport
   ip address 192.168.23.3/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
interface Ethernet3
   description to-sw1
   no switchport
   ip address 192.168.13.3/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
router ospf 1
   router-id 3.3.3.3
   passive-interface default
   no passive-interface Ethernet2
   no passive-interface Ethernet3
!
end
