hostname sw2
!
vlan 4094
   name mlag-peer
   trunk group mlagpeer
!
no spanning-tree vlan-id 4094
!
vlan 10
   name USERS
!
interface Port-Channel10
   description MLAG-peer-link
   switchport mode trunk
   switchport trunk group mlagpeer
!
interface Ethernet5
   description peer-link-A
   channel-group 10 mode active
!
interface Ethernet6
   description peer-link-B
   channel-group 10 mode active
!
interface Vlan4094
   description MLAG keepalive
   no autostate
   ip address 192.168.255.2/30
!
mlag configuration
   domain-id mlag-pair
   local-interface Vlan4094
   peer-address 192.168.255.1
   peer-link Port-Channel10
!
! ─── L3 target in the data VLAN (peer of sw1's .251; no VARP — lab 15) ───
interface Vlan10
   description USERS-gateway-sw2
   ip address 10.10.10.252/24
!
interface Port-Channel20
   description to-sw-leaf (MLAG 20)
   switchport mode trunk
   switchport trunk allowed vlan 10
   mlag 20
!
interface Ethernet1
   description to-sw-leaf-Et3 (Po20 member)
   channel-group 20 mode active
!
end
