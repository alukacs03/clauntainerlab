hostname sw1
!
! ─── MLAG control VLAN ───
vlan 4094
   name mlag-peer
   trunk group mlagpeer
!
no spanning-tree vlan-id 4094
!
vlan 10
   name USERS
!
! ─── Peer-link (sw1↔sw2 backbone) ───
interface Port-Channel10
   description MLAG-peer-link
   switchport mode trunk
   switchport trunk group mlagpeer
!
interface Ethernet5
   description peer-link-A
   channel-group 10 mode active
!
interface Ethernet6
   description peer-link-B
   channel-group 10 mode active
!
! ─── Peer keepalive over Vlan4094 ───
interface Vlan4094
   description MLAG keepalive
   no autostate
   ip address 192.168.255.1/30
!
! ─── MLAG domain configuration ───
mlag configuration
   domain-id mlag-pair
   local-interface Vlan4094
   peer-address 192.168.255.2
   peer-link Port-Channel10
!
! ─── L3 target in the data VLAN so h1 has something real to ping ───
! Plain per-peer SVI with DIFFERENT IPs (no VARP yet — that's lab 15).
! sw1 owns .251, sw2 owns .252. The failover tests below kill sw1, so
! h1 pings sw2's .252, which survives and stays reachable via MLAG.
interface Vlan10
   description USERS-gateway-sw1
   ip address 10.10.10.251/24
!
! ─── Downstream-facing MLAG-paired bundle ───
interface Port-Channel20
   description to-sw-leaf (MLAG 20)
   switchport mode trunk
   switchport trunk allowed vlan 10
   mlag 20
!
interface Ethernet1
   description to-sw-leaf-Et2 (Po20 member)
   channel-group 20 mode active
!
end
