hostname sw1
!
vlan 10
   name USERS
!
interface Ethernet1
   description to-sw-leaf-Et2 (will become MLAG-paired Po20)
   switchport mode trunk
   switchport trunk allowed vlan 10
!
interface Ethernet5
   description peer-link-A
   switchport mode trunk
!
interface Ethernet6
   description peer-link-B
   switchport mode trunk
!
! ─────────────────────────────────────────────────────────────
! Starter: sw1 and sw2 are two separate switches. The downstream
! sw-leaf is single-homed to sw1 (Et1) and sw2 (Et1) as independent
! links — STP will block one of them.
!
! Your tasks (see README):
!   1. Build the MLAG peer-link: Et5+Et6 → Port-Channel10 as a trunk
!      carrying the MLAG control VLAN
!   2. Create MLAG control VLAN (4094) + SVI for peer keepalive
!   3. Configure MLAG domain
!   4. Wrap Et1 into Port-Channel20 with mlag 20
!   5. Mirror on sw2 (identical config except peer-address)
!   6. Configure sw-leaf to bundle Et2+Et3 into a normal LACP Po1
! ─────────────────────────────────────────────────────────────
!
end
