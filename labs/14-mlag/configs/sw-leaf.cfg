hostname sw-leaf
!
vlan 10
   name USERS
!
interface Ethernet1
   description h1
   switchport mode access
   switchport access vlan 10
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet2
   description uplink-to-sw1
   switchport mode trunk
   switchport trunk allowed vlan 10
!
interface Ethernet3
   description uplink-to-sw2
   switchport mode trunk
   switchport trunk allowed vlan 10
!
! Starter: independent trunks. STP will block one.
! Your task here: bundle Et2+Et3 into Port-Channel1 (regular LACP).
! sw-leaf doesn't know or care that the other end is MLAG.
!
end
