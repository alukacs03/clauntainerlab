hostname sw1
!
ip routing
!
interface Loopback0
   ip address 1.1.1.1/32
!
interface Ethernet1
   description h1
   no switchport
   ip address 10.1.0.1/24
!
interface Ethernet2
   description eBGP-to-sw2
   no switchport
   ip address 192.168.12.1/30
!
router bgp 65001
   router-id 1.1.1.1
   no bgp default ipv4-unicast
   neighbor 192.168.12.2 remote-as 65002
   !
   address-family ipv4
      neighbor 192.168.12.2 activate
      network 10.1.0.0/24
!
! ─────────────────────────────────────────────────────────────
! Starter: basic eBGP between two ASes. Your tasks (see README):
!   1. Enable BFD on the eBGP session (sub-second failure detection)
!   2. Add maximum-routes limit (50 routes max from this neighbor)
!   3. Configure password authentication (MD5)
!   4. Configure TTL security (single-hop only)
!   5. Enable graceful restart capability
!   6. Run the operational reflex playbook (see README "Verification")
! ─────────────────────────────────────────────────────────────
!
end
