hostname sw2
!
ip routing
!
interface Loopback0
   ip address 2.2.2.2/32
!
interface Ethernet1
   description h2
   no switchport
   ip address 10.2.0.1/24
!
interface Ethernet2
   description eBGP-to-sw1
   no switchport
   ip address 192.168.12.2/30
!
router bgp 65002
   router-id 2.2.2.2
   no bgp default ipv4-unicast
   neighbor 192.168.12.1 remote-as 65001
   !
   address-family ipv4
      neighbor 192.168.12.1 activate
      network 10.2.0.0/24
!
end
