hostname sw1
!
ip routing
!
interface Loopback0
   ip address 1.1.1.1/32
!
interface Ethernet1
   description h1
   no switchport
   ip address 10.1.0.1/24
!
interface Ethernet2
   description eBGP-to-sw2
   no switchport
   ip address 192.168.12.1/30
   ! BFD timers for the eBGP fall-over session (interface-level in EOS, not global)
   bfd interval 100 min-rx 100 multiplier 3
!
router bgp 65001
   router-id 1.1.1.1
   no bgp default ipv4-unicast
   ! ─── Graceful restart (helper stale-route hold time) ───
   graceful-restart stalepath-time 360
   !
   ! ─── Neighbor with hardening ───
   neighbor 192.168.12.2 remote-as 65002
   neighbor 192.168.12.2 description sw2
   neighbor 192.168.12.2 password 0 LabSharedSecret123
   neighbor 192.168.12.2 ttl maximum-hops 1
   neighbor 192.168.12.2 bfd
   neighbor 192.168.12.2 maximum-routes 50
   neighbor 192.168.12.2 graceful-restart
   !
   address-family ipv4
      neighbor 192.168.12.2 activate
      network 10.1.0.0/24
!
end
