hostname spine1
!
ip routing
ipv6 unicast-routing
!
interface Loopback0
   ip address 100.100.100.1/32
!
interface Ethernet1
   no switchport
   ipv6 enable
!
interface Ethernet2
   no switchport
   ipv6 enable
!
router bgp 65100
   router-id 100.100.100.1
   no bgp default ipv4-unicast
   maximum-paths 64 ecmp 64
   neighbor LEAVES peer group
   neighbor LEAVES remote-as external
   neighbor LEAVES send-community
   neighbor interface Ethernet1 peer-group LEAVES
   neighbor interface Ethernet2 peer-group LEAVES
   !
   address-family ipv4
      neighbor LEAVES activate
      network 100.100.100.1/32
!
end
