hostname spine2
!
ip routing
ipv6 unicast-routing
!
interface Loopback0
   ip address 100.100.100.2/32
!
interface Ethernet1
   no switchport
   ipv6 enable
!
interface Ethernet2
   no switchport
   ipv6 enable
!
router bgp 65200
   router-id 100.100.100.2
   no bgp default ipv4-unicast
   maximum-paths 64 ecmp 64
   ! One peer-group per leaf with explicit numeric remote-as — EOS/cEOS does
   ! not accept `remote-as external`, and the leaves have different ASNs.
   neighbor LEAF1 peer group
   neighbor LEAF1 remote-as 65001
   neighbor LEAF1 send-community
   neighbor LEAF2 peer group
   neighbor LEAF2 remote-as 65002
   neighbor LEAF2 send-community
   neighbor interface Ethernet1 peer-group LEAF1
   neighbor interface Ethernet2 peer-group LEAF2
   !
   address-family ipv4
      neighbor LEAF1 activate
      neighbor LEAF2 activate
      network 100.100.100.2/32
!
end
