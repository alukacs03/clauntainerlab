hostname leaf1
!
ip routing
ipv6 unicast-routing
!
interface Loopback0
   ip address 1.1.1.1/32
!
interface Ethernet1
   no switchport
   ipv6 enable
!
interface Ethernet2
   no switchport
   ipv6 enable
!
interface Ethernet3
   no switchport
   ip address 10.1.0.1/24
!
router bgp 65001
   router-id 1.1.1.1
   no bgp default ipv4-unicast
   maximum-paths 64 ecmp 64
   ! Per-spine peer-groups with explicit numeric remote-as. EOS/cEOS does NOT
   ! accept `remote-as external`, and the two spines have different ASNs, so we
   ! can't share one peer-group remote-as — one peer-group per spine.
   neighbor SPINE1 peer group
   neighbor SPINE1 remote-as 65100
   neighbor SPINE1 send-community
   neighbor SPINE2 peer group
   neighbor SPINE2 remote-as 65200
   neighbor SPINE2 send-community
   neighbor interface Ethernet1 peer-group SPINE1
   neighbor interface Ethernet2 peer-group SPINE2
   !
   address-family ipv4
      neighbor SPINE1 activate
      neighbor SPINE2 activate
      network 1.1.1.1/32
      network 10.1.0.0/24
!
end
