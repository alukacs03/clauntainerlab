hostname leaf2
!
ip routing
ipv6 unicast-routing
!
interface Loopback0
   ip address 2.2.2.2/32
!
interface Ethernet1
   no switchport
   ipv6 enable
!
interface Ethernet2
   no switchport
   ipv6 enable
!
interface Ethernet3
   no switchport
   ip address 10.2.0.1/24
!
router bgp 65002
   router-id 2.2.2.2
   no bgp default ipv4-unicast
   maximum-paths 64 ecmp 64
   ! One peer-group per spine with explicit numeric remote-as — EOS/cEOS does
   ! not accept `remote-as external`, and the spines have different ASNs.
   neighbor SPINE1 peer group
   neighbor SPINE1 remote-as 65100
   neighbor SPINE1 send-community
   neighbor SPINE2 peer group
   neighbor SPINE2 remote-as 65200
   neighbor SPINE2 send-community
   neighbor interface Ethernet1 peer-group SPINE1
   neighbor interface Ethernet2 peer-group SPINE2
   !
   address-family ipv4
      neighbor SPINE1 activate
      neighbor SPINE2 activate
      network 2.2.2.2/32
      network 10.2.0.0/24
!
end
