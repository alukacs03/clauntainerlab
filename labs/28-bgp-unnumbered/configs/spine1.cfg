hostname spine1
!
ip routing
ipv6 unicast-routing
!
interface Loopback0
   ip address 100.100.100.1/32
!
interface Ethernet1
   description to-leaf1 (unnumbered)
   no switchport
   ipv6 enable
!
interface Ethernet2
   description to-leaf2 (unnumbered)
   no switchport
   ipv6 enable
!
! ─────────────────────────────────────────────────────────────
! Starter: same spine-leaf as lab 27, but transit interfaces have
! NO /31 IPs — just IPv6 link-local. Your task: configure BGP using
! interface-based unnumbered peering instead of numbered IPs.
!
! Arista approach: peer-group with `neighbor interface ETHx peer-group SPINES`.
! BGP discovers peers via IPv6 link-local on the link.
! IPv4 routes still carried via RFC 5549 (next-hop = link-local IPv6).
! ─────────────────────────────────────────────────────────────
!
end
