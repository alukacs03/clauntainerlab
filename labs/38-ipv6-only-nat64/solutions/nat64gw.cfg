hostname nat64gw
!
ip routing
ipv6 unicast-routing
!
interface Ethernet1
   description ipv6-only-side
   no switchport
   ipv6 address 2001:db8:100::1/64
   ipv6 nd ra interval 4
!
interface Ethernet2
   description ipv4-side-to-legacy
   no switchport
   ip address 192.0.2.1/24
!
! Note: actual NAT64 translation is not configured here as cEOS
! doesn't have native NAT64. See README for the deployment patterns
! (Jool on Linux, ASR1000, MX, etc.) and the principles.
!
end
