hostname nat64gw
!
ip routing
ipv6 unicast-routing
!
interface Ethernet1
   description ipv6-only-side
   no switchport
   ipv6 address 2001:db8:100::1/64
   ipv6 nd ra interval 4
!
interface Ethernet2
   description ipv4-side-to-legacy
   no switchport
   ip address 192.0.2.1/24
!
! ─────────────────────────────────────────────────────────────
! Starter: This NAT64 lab is **architecturally informational**.
! Arista cEOS doesn't have a full NAT64 implementation. In production,
! NAT64 runs on:
!   - Dedicated devices (Cisco ASR, Juniper MX, A10 Thunder)
!   - Software: Jool (Linux), Tayga, Octavia (cloud-native)
!
! The lab structure shows the conceptual topology:
!   - h-v6 is IPv6-only (no IPv4 stack)
!   - legacy-v4 is IPv4-only (a real legacy service)
!   - The NAT64 gateway translates between them, using DNS64 to
!     synthesize AAAA records for IPv4-only destinations
!
! Your tasks: this is more of a discussion lab than a hands-on one.
! Read the README; understand the mechanism; verify the
! IPv6-only / IPv4-only environment is set up correctly even if
! the actual NAT64 translation isn't running. See the README's
! "## Verification" section for the exact checks (SLAAC address on
! h-v6, RA + neighbor on nat64gw, ping to the legacy IPv4 host).
!
! For real hands-on NAT64: deploy Jool (https://www.jool.mx/) on a
! Linux host inside this topology — that gives you a working NAT64
! to experiment with. The lab's nat64gw cEOS provides the IPv6
! Router Advertisement and connectivity scaffolding.
! ─────────────────────────────────────────────────────────────
!
end
