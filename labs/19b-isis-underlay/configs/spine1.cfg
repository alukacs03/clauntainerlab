hostname spine1
!
ip routing
!
interface Loopback0
   ip address 100.100.100.1/32
!
interface Ethernet1
   description to-leaf1
   no switchport
   ip address 10.0.1.0/31
!
interface Ethernet2
   description to-leaf2
   no switchport
   ip address 10.0.2.0/31
!
! ─────────────────────────────────────────────────────────────
! Starter: same topology as lab 27 (spine-leaf), but the task is
! to bring up an IS-IS underlay instead of BGP. Your tasks:
!   1. Configure router isis with NET 49.0001.0010.0100.0001.00
!      (encodes "area 49.0001, system-ID 0010.0100.0001")
!   2. Use is-type level-2-only (typical modern DC underlay choice)
!   3. Enable IS-IS on Loopback0 and the two transit interfaces;
!      set transit interfaces as point-to-point network type
!   4. Verify neighbor formation, LSDB sync, and route propagation
! ─────────────────────────────────────────────────────────────
!
end
