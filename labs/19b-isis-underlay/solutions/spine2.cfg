hostname spine2
!
ip routing
!
interface Loopback0
   ip address 100.100.100.2/32
   isis enable CORE
!
interface Ethernet1
   no switchport
   ip address 10.0.3.0/31
   isis enable CORE
   isis network point-to-point
!
interface Ethernet2
   no switchport
   ip address 10.0.4.0/31
   isis enable CORE
   isis network point-to-point
!
router isis CORE
   net 49.0001.0010.0100.0002.00
   is-type level-2-only
   maximum-paths 64
   !
   address-family ipv4 unicast
!
end
