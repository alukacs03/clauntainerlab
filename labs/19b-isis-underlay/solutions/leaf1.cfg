hostname leaf1
!
ip routing
!
interface Loopback0
   ip address 1.1.1.1/32
   isis enable CORE
!
interface Ethernet1
   no switchport
   ip address 10.0.1.1/31
   isis enable CORE
   isis network point-to-point
!
interface Ethernet2
   no switchport
   ip address 10.0.3.1/31
   isis enable CORE
   isis network point-to-point
!
interface Ethernet3
   no switchport
   ip address 10.1.0.1/24
   isis enable CORE
   isis passive
!
router isis CORE
   net 49.0001.0010.0100.1001.00
   is-type level-2-only
   maximum-paths 64
   !
   address-family ipv4 unicast
!
end
