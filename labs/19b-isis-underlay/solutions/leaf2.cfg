hostname leaf2
!
ip routing
!
interface Loopback0
   ip address 2.2.2.2/32
   isis enable CORE
!
interface Ethernet1
   no switchport
   ip address 10.0.2.1/31
   isis enable CORE
   isis network point-to-point
!
interface Ethernet2
   no switchport
   ip address 10.0.4.1/31
   isis enable CORE
   isis network point-to-point
!
interface Ethernet3
   no switchport
   ip address 10.2.0.1/24
   isis enable CORE
   isis passive
!
router isis CORE
   net 49.0001.0010.0100.1002.00
   is-type level-2
   !
   address-family ipv4 unicast
      maximum-paths 64
!
end
