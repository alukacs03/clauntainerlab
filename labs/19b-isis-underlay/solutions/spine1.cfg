hostname spine1
!
ip routing
!
interface Loopback0
   ip address 100.100.100.1/32
   isis enable CORE
!
interface Ethernet1
   description to-leaf1
   no switchport
   ip address 10.0.1.0/31
   isis enable CORE
   isis network point-to-point
!
interface Ethernet2
   description to-leaf2
   no switchport
   ip address 10.0.2.0/31
   isis enable CORE
   isis network point-to-point
!
router isis CORE
   net 49.0001.0010.0100.0001.00
   is-type level-2-only
   maximum-paths 64
   !
   address-family ipv4 unicast
!
end
