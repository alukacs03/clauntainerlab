hostname sw2
!
vlan 10
   name USERS
!
vlan 20
   name SERVERS
!
interface Ethernet1
   description h3 (VLAN 10)
   switchport mode access
   switchport access vlan 10
!
interface Ethernet2
   description h4 (VLAN 20)
   switchport mode access
   switchport access vlan 20
!
interface Ethernet3
   description trunk-to-sw1
   switchport mode trunk
   switchport trunk allowed vlan 10,20
!
! sw2 stays as a pure L2 switch in this lab — no changes needed.
!
end
