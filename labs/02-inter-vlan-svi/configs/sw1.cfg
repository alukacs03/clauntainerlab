hostname sw1
!
vlan 10
   name USERS
!
vlan 20
   name SERVERS
!
interface Ethernet1
   description h1 (VLAN 10)
   switchport mode access
   switchport access vlan 10
!
interface Ethernet2
   description h2 (VLAN 20)
   switchport mode access
   switchport access vlan 20
!
interface Ethernet3
   description trunk-to-sw2
   switchport mode trunk
   switchport trunk allowed vlan 10,20
!
! ─────────────────────────────────────────────────────────────
! Starter = lab 01 final state. Your job in this lab:
!   - enable IP routing on this switch
!   - create an SVI for VLAN 10 with IP 10.10.10.254/24
!   - create an SVI for VLAN 20 with IP 10.20.20.254/24
!   - on each host, add a route to the *other* VLAN's subnet
!     via the appropriate SVI IP
! See README.md for theory + verification.
! sw2 does NOT change in this lab — only sw1 acts as router.
! ─────────────────────────────────────────────────────────────
!
end
