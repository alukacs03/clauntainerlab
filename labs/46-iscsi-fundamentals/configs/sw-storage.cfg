hostname sw-storage
!
! Starter: storage switch with 4 access ports across two storage VLANs.
! Path A = VLAN 50 (target Et1 + initiator Et3), Path B = VLAN 51 (target Et2 + initiator Et4).
! Two VLANs = two broadcast domains = two physically/logically independent paths (real MPIO).
! Your tasks:
!   1. Keep each path's ports in its own storage VLAN — separate from any data network
!      (VLAN 50 = path A, VLAN 51 = path B; already set below)
!   2. Apply STP edge protections on storage ports (spanning-tree portfast + bpduguard)
!      so convergence delays and rogue BPDUs can't blackhole storage
!   3. Disable LLDP on storage ports to keep the latency floor flat
!   Note: Arista L2 access ports already carry 9214-byte payloads by default — there is
!   no switch MTU command to set. Jumbo is enabled on the hosts (see topology exec).
!
vlan 50
   name STORAGE-A
!
vlan 51
   name STORAGE-B
!
interface Ethernet1
   description target-path-A
   switchport mode access
   switchport access vlan 50
!
interface Ethernet2
   description target-path-B
   switchport mode access
   switchport access vlan 51
!
interface Ethernet3
   description initiator-path-A
   switchport mode access
   switchport access vlan 50
!
interface Ethernet4
   description initiator-path-B
   switchport mode access
   switchport access vlan 51
!
end
