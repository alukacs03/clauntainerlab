hostname sw-storage
!
! Starter: storage switch with 4 access ports, all in VLAN 50 (storage VLAN).
! Your tasks:
!   1. Put target+initiator on VLAN 50 — separate from any data network
!   2. Set MTU 9214 on all storage ports (jumbo frames for iSCSI throughput)
!   3. Disable spanning-tree on storage ports (storm-prevention via portfast+bpduguard
!      so a misbehaving NIC can't take down the storage VLAN)
!   4. Disable LLDP on storage ports to keep latency floor flat
!
vlan 50
   name STORAGE
!
interface Ethernet1
   description target-path-A
   switchport mode access
   switchport access vlan 50
!
interface Ethernet2
   description target-path-B
   switchport mode access
   switchport access vlan 50
!
interface Ethernet3
   description initiator-path-A
   switchport mode access
   switchport access vlan 50
!
interface Ethernet4
   description initiator-path-B
   switchport mode access
   switchport access vlan 50
!
end
