hostname sw-storage
!
vlan 50
   name STORAGE
!
! Global: jumbo frames + STP edge defaults for storage
spanning-tree mode rapid-pvst
!
interface Ethernet1
   description target-path-A
   switchport mode access
   switchport access vlan 50
   mtu 9214
   spanning-tree portfast
   spanning-tree bpduguard enable
   no lldp transmit
   no lldp receive
!
interface Ethernet2
   description target-path-B
   switchport mode access
   switchport access vlan 50
   mtu 9214
   spanning-tree portfast
   spanning-tree bpduguard enable
   no lldp transmit
   no lldp receive
!
interface Ethernet3
   description initiator-path-A
   switchport mode access
   switchport access vlan 50
   mtu 9214
   spanning-tree portfast
   spanning-tree bpduguard enable
   no lldp transmit
   no lldp receive
!
interface Ethernet4
   description initiator-path-B
   switchport mode access
   switchport access vlan 50
   mtu 9214
   spanning-tree portfast
   spanning-tree bpduguard enable
   no lldp transmit
   no lldp receive
!
end
