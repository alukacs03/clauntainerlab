hostname sw-storage
!
vlan 50
   name STORAGE-A
!
vlan 51
   name STORAGE-B
!
! STP edge defaults for storage. Note: there is no L2 jumbo command — Arista L2
! access ports already carry a 9214-byte payload (9236-byte frame) by default and
! that value is not configurable. Jumbo is enabled host-side (topology exec, mtu 9000).
spanning-tree mode rapid-pvst
!
interface Ethernet1
   description target-path-A
   switchport mode access
   switchport access vlan 50
   spanning-tree portfast
   spanning-tree bpduguard enable
   no lldp transmit
   no lldp receive
!
interface Ethernet2
   description target-path-B
   switchport mode access
   switchport access vlan 51
   spanning-tree portfast
   spanning-tree bpduguard enable
   no lldp transmit
   no lldp receive
!
interface Ethernet3
   description initiator-path-A
   switchport mode access
   switchport access vlan 50
   spanning-tree portfast
   spanning-tree bpduguard enable
   no lldp transmit
   no lldp receive
!
interface Ethernet4
   description initiator-path-B
   switchport mode access
   switchport access vlan 51
   spanning-tree portfast
   spanning-tree bpduguard enable
   no lldp transmit
   no lldp receive
!
end
