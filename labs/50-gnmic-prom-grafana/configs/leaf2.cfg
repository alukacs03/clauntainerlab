hostname leaf2
!
username admin privilege 15 secret 0 admin
!
ip routing
!
interface Ethernet1
   description gnmic-collector
   no switchport
   ip address 10.0.2.1/30
!
interface Ethernet2
   description ibgp-to-leaf1
   no switchport
   ip address 10.0.12.2/30
!
! gNMI server (insecure for the lab — no ssl profile). OpenConfig models are
! exposed by default; `provider eos-native` additionally exposes the Arista
! native (eos://) origin. Mirrors lab 49's collector-facing config.
management api gnmi
   transport grpc default
      port 6030
      ssl profile NONE
   provider eos-native
!
router bgp 65000
   router-id 2.2.2.2
   neighbor 10.0.12.1 remote-as 65000
   neighbor 10.0.12.1 description leaf1
!
end
