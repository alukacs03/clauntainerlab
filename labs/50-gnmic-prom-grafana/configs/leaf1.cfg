hostname leaf1
!
username admin privilege 15 secret 0 admin
!
ip routing
!
interface Ethernet1
   description gnmic-collector
   no switchport
   ip address 10.0.1.1/30
!
interface Ethernet2
   description ibgp-to-leaf2
   no switchport
   ip address 10.0.12.1/30
!
! gNMI server (insecure for the lab — no ssl profile). OpenConfig models are
! exposed by default; `provider eos-native` additionally exposes the Arista
! native (eos://) origin. Mirrors lab 49's collector-facing config.
management api gnmi
   transport grpc default
      port 6030
      ssl profile NONE
   provider eos-native
!
router bgp 65000
   router-id 1.1.1.1
   neighbor 10.0.12.2 remote-as 65000
   neighbor 10.0.12.2 description leaf2
!
end
