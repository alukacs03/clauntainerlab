name: gnmic-prom-grafana

topology:
  kinds:
    arista_ceos:
      image: ceos:4.35.4M
    linux:
      image: ghcr.io/srl-labs/network-multitool

  nodes:
    leaf1:
      kind: arista_ceos
      startup-config: configs/leaf1.cfg
      ports:
        - 6030:6030

    leaf2:
      kind: arista_ceos
      startup-config: configs/leaf2.cfg
      ports:
        - 6031:6030

    gnmic:
      kind: linux
      image: ghcr.io/openconfig/gnmic:latest
      binds:
        - solutions/gnmic.yaml:/app/gnmic.yaml:ro
      cmd: "--config /app/gnmic.yaml subscribe"
      exec:
        # eth1 faces leaf1 (10.0.1.0/30), eth2 faces leaf2 (10.0.2.0/30).
        # Each point-to-point link is its own subnet, so the collector has a
        # directly-connected route to BOTH leaves.
        - ip addr add 10.0.1.2/30 dev eth1
        - ip addr add 10.0.2.2/30 dev eth2

    prometheus:
      kind: linux
      image: prom/prometheus:latest
      binds:
        - solutions/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      ports:
        - 9090:9090

    grafana:
      kind: linux
      image: grafana/grafana:latest
      binds:
        - solutions/grafana-datasource.yaml:/etc/grafana/provisioning/datasources/prom.yaml:ro
      ports:
        - 3000:3000
      env:
        GF_SECURITY_ADMIN_PASSWORD: admin

  links:
    # Collector reaches each leaf over its own /30 point-to-point link.
    - endpoints: ["leaf1:eth1", "gnmic:eth1"]
    - endpoints: ["leaf2:eth1", "gnmic:eth2"]
    # iBGP peering link between the leaves, so the BGP telemetry path has data.
    - endpoints: ["leaf1:eth2", "leaf2:eth2"]
    # Prometheus -> gnmic (scrape) and Grafana -> Prometheus (query) both ride
    # the containerlab management network via Docker DNS (gnmic:9804,
    # http://prometheus:9090), so no data links are needed between them.
