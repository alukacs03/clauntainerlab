hostname peer2.example
!
ip routing
!
interface Ethernet1
   no switchport
   ip address 198.51.100.3/24
!
ip route 185.2.0.0/16 Null0
ip route 8.8.8.0/24 Null0
ip route 192.168.0.0/16 Null0
!
router bgp 64513
   router-id 198.51.100.3
   no bgp default ipv4-unicast
   neighbor 198.51.100.250 remote-as 65535
   neighbor 198.51.100.250 description route-server
   !
   address-family ipv4
      neighbor 198.51.100.250 activate
      network 185.2.0.0/16
      network 8.8.8.0/24
      ! Misconfigured announcement: a private (RFC 1918) bogon that the
      ! customer's inbound BOGONS filter must drop — used in Verification 3
      network 192.168.0.0/16
!
end
