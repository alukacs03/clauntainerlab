hostname ixp-fabric.example
!
! Pure L2 — simulates the IXP's shared switching fabric
vlan 100
   name IXP-PEERING
!
interface Ethernet1
   description customer (AS 65001)
   switchport mode access
   switchport access vlan 100
!
interface Ethernet2
   description route-server (AS 65535)
   switchport mode access
   switchport access vlan 100
!
interface Ethernet3
   description peer1 (AS 64512)
   switchport mode access
   switchport access vlan 100
!
interface Ethernet4
   description peer2 (AS 64513)
   switchport mode access
   switchport access vlan 100
!
end
