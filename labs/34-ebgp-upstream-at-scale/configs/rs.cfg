hostname rs.ixp.example
!
ip routing
!
interface Ethernet1
   description ixp-lan
   no switchport
   ip address 198.51.100.250/24
!
! ─── Route server pre-configured: peers with every participant ───
! Real route servers run BIRD or OpenBGPD with proper RS semantics
! (next-hop preservation, AS-path passthrough, route-server-client).
! cEOS approximates this here — close enough for a learning lab.
!
ip prefix-list ANY seq 10 permit 0.0.0.0/0 le 32
!
route-map TRANSPARENT permit 10
   ! In a real RS this is more sophisticated (IRR validation, RPKI etc)
!
router bgp 65535
   router-id 198.51.100.250
   no bgp default ipv4-unicast
   !
   neighbor IXP-PEERS peer group
   neighbor IXP-PEERS send-community
   !
   neighbor 198.51.100.1 peer-group IXP-PEERS
   neighbor 198.51.100.1 remote-as 65001
   neighbor 198.51.100.1 description customer
   !
   neighbor 198.51.100.2 peer-group IXP-PEERS
   neighbor 198.51.100.2 remote-as 64512
   neighbor 198.51.100.2 description peer1
   !
   neighbor 198.51.100.3 peer-group IXP-PEERS
   neighbor 198.51.100.3 remote-as 64513
   neighbor 198.51.100.3 description peer2
   !
   address-family ipv4
      neighbor IXP-PEERS activate
      neighbor IXP-PEERS route-map TRANSPARENT in
      neighbor IXP-PEERS route-map TRANSPARENT out
!
end
