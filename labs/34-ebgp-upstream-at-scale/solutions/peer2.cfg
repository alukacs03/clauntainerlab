hostname peer2.example
!
ip routing
!
interface Ethernet1
   no switchport
   ip address 198.51.100.3/24
!
ip route 198.18.0.0/16 Null0
ip route 8.8.8.0/24 Null0
!
router bgp 64513
   router-id 198.51.100.3
   no bgp default ipv4-unicast
   neighbor 198.51.100.250 remote-as 65535
   !
   address-family ipv4
      neighbor 198.51.100.250 activate
      network 198.18.0.0/16
      network 8.8.8.0/24
!
end
