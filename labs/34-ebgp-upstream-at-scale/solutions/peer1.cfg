hostname peer1.example
!
ip routing
!
interface Ethernet1
   no switchport
   ip address 198.51.100.2/24
!
ip route 185.1.1.0/24 Null0
!
router bgp 64512
   router-id 198.51.100.2
   no bgp default ipv4-unicast
   neighbor 198.51.100.250 remote-as 65535
   !
   address-family ipv4
      neighbor 198.51.100.250 activate
      network 185.1.1.0/24
!
end
