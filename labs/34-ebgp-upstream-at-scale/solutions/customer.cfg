hostname customer
!
ip routing
!
interface Loopback0
   ip address 10.0.0.1/32
!
interface Ethernet1
   description ixp-lan
   no switchport
   ip address 198.51.100.1/24
!
ip route 203.0.113.0/24 Null0
!
! ─── Bogon prefix-list (RFC 6890 + common reserved) ───
ip prefix-list BOGONS seq 10 permit 0.0.0.0/8 le 32
ip prefix-list BOGONS seq 20 permit 10.0.0.0/8 le 32
ip prefix-list BOGONS seq 30 permit 100.64.0.0/10 le 32
ip prefix-list BOGONS seq 40 permit 127.0.0.0/8 le 32
ip prefix-list BOGONS seq 50 permit 169.254.0.0/16 le 32
ip prefix-list BOGONS seq 60 permit 172.16.0.0/12 le 32
ip prefix-list BOGONS seq 70 permit 192.0.2.0/24 le 32
ip prefix-list BOGONS seq 80 permit 192.168.0.0/16 le 32
ip prefix-list BOGONS seq 90 permit 198.18.0.0/15 le 32
ip prefix-list BOGONS seq 100 permit 224.0.0.0/4 le 32
ip prefix-list BOGONS seq 110 permit 240.0.0.0/4 le 32
!
ip prefix-list OWN-PREFIX seq 10 permit 203.0.113.0/24
!
! Only accept routes between /8 and /24 (no smaller, no larger)
ip prefix-list ACCEPTABLE-LENGTH seq 10 permit 0.0.0.0/0 ge 8 le 24
!
! ─── Inbound route-map from IXP route server ───
route-map IXP-IN deny 10
   match ip address prefix-list BOGONS
route-map IXP-IN deny 20
   match ip address prefix-list OWN-PREFIX
route-map IXP-IN deny 30
   ! Drop prefixes outside acceptable length range
   match ip address prefix-list ACCEPTABLE-LENGTH
   ! Actually we want OPPOSITE: deny anything NOT in the acceptable length
   ! Better: invert. Reorder:
route-map IXP-IN permit 100
   match ip address prefix-list ACCEPTABLE-LENGTH
   set community 65001:200
!
! ─── Outbound route-map: only advertise OWN prefix ───
route-map IXP-OUT permit 10
   match ip address prefix-list OWN-PREFIX
! Implicit deny — never leak transit routes
!
router bgp 65001
   router-id 10.0.0.1
   no bgp default ipv4-unicast
   !
   neighbor 198.51.100.250 remote-as 65535
   neighbor 198.51.100.250 description IXP-route-server
   neighbor 198.51.100.250 send-community
   neighbor 198.51.100.250 maximum-routes 10000
   !
   address-family ipv4
      neighbor 198.51.100.250 activate
      neighbor 198.51.100.250 route-map IXP-IN in
      neighbor 198.51.100.250 route-map IXP-OUT out
      network 203.0.113.0/24
!
end
