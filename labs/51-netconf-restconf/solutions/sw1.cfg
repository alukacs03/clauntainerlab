hostname sw1
!
username admin privilege 15 secret 0 admin
!
ip routing
!
interface Ethernet1
   description client
   no switchport
   ip address 10.0.0.1/24
!
! ─── NETCONF over SSH ───
management api netconf
   transport ssh default
!
! ─── eAPI (Arista's HTTPS-JSONRPC; RESTCONF-equivalent) ───
management api http-commands
   protocol https
   no shutdown
!
! ─── gNMI (reference only; covered in labs 49-50) ───
! Enabled for completeness but NOT exercised here: the topology publishes only
! 830 (NETCONF) and 443 (eAPI), so gNMI on 6030 is unreachable from the host.
! 'ssl profile NONE' = cleartext gRPC (lab-only convenience; never do this in prod).
management api gnmi
   transport grpc default
      ssl profile NONE
!
end
