hostname isp1
!
ip routing
!
interface Ethernet1
   no switchport
   ip address 198.51.100.2/30
!
! Simulate "the internet" with a default route + a handful of public-ish prefixes
ip route 0.0.0.0/0 Null0
ip route 1.1.1.0/24 Null0
ip route 8.8.8.0/24 Null0
ip route 142.250.0.0/16 Null0
ip route 17.0.0.0/8 Null0
!
router bgp 64512
   router-id 100.64.0.1
   no bgp default ipv4-unicast
   neighbor 198.51.100.1 remote-as 65001
   !
   address-family ipv4
      neighbor 198.51.100.1 activate
      network 0.0.0.0/0
      network 1.1.1.0/24
      network 8.8.8.0/24
      network 142.250.0.0/16
      network 17.0.0.0/8
!
end
