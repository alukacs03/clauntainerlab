hostname isp2
!
ip routing
!
interface Ethernet1
   no switchport
   ip address 198.51.100.6/30
!
! Same reachable test target (1.1.1.1) so the failover ping still succeeds once
! traffic exits via ISP2. The connected /32 wins over the 1.1.1.0/24 Null0 below.
interface Loopback1
   ip address 1.1.1.1/32
!
ip route 0.0.0.0/0 Null0
ip route 1.1.1.0/24 Null0
ip route 9.9.9.0/24 Null0
ip route 142.250.0.0/16 Null0
ip route 17.0.0.0/8 Null0
!
router bgp 64513
   router-id 100.64.0.2
   no bgp default ipv4-unicast
   neighbor 198.51.100.5 remote-as 65001
   !
   address-family ipv4
      neighbor 198.51.100.5 activate
      network 0.0.0.0/0
      network 1.1.1.0/24
      network 9.9.9.0/24
      network 142.250.0.0/16
      network 17.0.0.0/8
!
end
