hostname edge2
!
ip routing
!
interface Loopback0
   ip address 10.0.0.2/32
   ip ospf area 0.0.0.0
!
interface Ethernet1
   description LAN cross-link to edge1
   no switchport
   ip address 10.99.1.2/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
interface Ethernet2
   description iBGP backbone to edge1
   no switchport
   ip address 10.99.0.2/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
interface Ethernet3
   description eBGP to ISP2
   no switchport
   ip address 198.51.100.5/30
!
router ospf 1
   router-id 10.0.0.2
   passive-interface default
   no passive-interface Ethernet1
   no passive-interface Ethernet2
!
router bgp 65001
   router-id 10.0.0.2
   no bgp default ipv4-unicast
   neighbor 198.51.100.6 remote-as 64513
   neighbor 198.51.100.6 description ISP2
   neighbor 10.0.0.1 remote-as 65001
   neighbor 10.0.0.1 update-source Loopback0
   neighbor 10.0.0.1 description edge1-iBGP
   !
   address-family ipv4
      neighbor 198.51.100.6 activate
      neighbor 10.0.0.1 activate
      neighbor 10.0.0.1 next-hop-self
      network 203.0.113.0/24
!
end
