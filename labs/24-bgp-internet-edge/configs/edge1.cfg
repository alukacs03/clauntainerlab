hostname edge1
!
ip routing
!
interface Loopback0
   ip address 10.0.0.1/32
   ip ospf area 0.0.0.0
!
interface Ethernet1
   description h1 (customer LAN)
   no switchport
   ip address 203.0.113.1/24
   ip ospf area 0.0.0.0
   ip ospf passive
!
interface Ethernet2
   description iBGP backbone to edge2
   no switchport
   ip address 10.99.0.1/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
interface Ethernet3
   description eBGP to ISP1
   no switchport
   ip address 198.51.100.1/30
!
interface Ethernet4
   description LAN cross-link to edge2 (for edge2 to reach 203.0.113.0/24)
   no switchport
   ip address 10.99.1.1/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
router ospf 1
   router-id 10.0.0.1
   passive-interface default
   no passive-interface Ethernet2
   no passive-interface Ethernet4
!
router bgp 65001
   router-id 10.0.0.1
   no bgp default ipv4-unicast
   neighbor 198.51.100.2 remote-as 64512
   neighbor 198.51.100.2 description ISP1
   neighbor 10.0.0.2 remote-as 65001
   neighbor 10.0.0.2 update-source Loopback0
   neighbor 10.0.0.2 description edge2-iBGP
   !
   address-family ipv4
      neighbor 198.51.100.2 activate
      neighbor 10.0.0.2 activate
      neighbor 10.0.0.2 next-hop-self
      network 203.0.113.0/24
!
! ─────────────────────────────────────────────────────────────
! Starter: BGP is up but ISP1 is sending the full table (~5 fake
! prefixes representing "the internet"). You don't need that — a
! DEFAULT ROUTE from each ISP is sufficient for most customers.
!
! Your tasks (see README):
!   1. Filter inbound from ISP1 to accept only 0.0.0.0/0 (default)
!   2. Tag the default with community 65001:101 (came from ISP1) and
!      set local-preference 200 so the whole AS prefers ISP1 outbound
!   3. Filter outbound to ISP1 to advertise only your 203.0.113.0/24
!      (the AS-path prepend toward ISP2 is configured on edge2 — see edge2.cfg)
!   4. Add a floating static default-route via ISP1's next-hop (AD 250)
!      as last-resort if both ISPs disappear
!   5. Verify failover: kill ISP1, traffic continues via ISP2
! ─────────────────────────────────────────────────────────────
!
end
