hostname edge2
!
ip routing
!
interface Loopback0
   ip address 10.0.0.2/32
   ip ospf area 0.0.0.0
!
interface Ethernet1
   no switchport
   ip address 10.99.1.2/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
interface Ethernet2
   no switchport
   ip address 10.99.0.2/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
interface Ethernet3
   description eBGP to ISP2
   no switchport
   ip address 198.51.100.5/30
!
router ospf 1
   router-id 10.0.0.2
   passive-interface default
   no passive-interface Ethernet1
   no passive-interface Ethernet2
!
ip prefix-list DEFAULT-ONLY seq 10 permit 0.0.0.0/0
ip prefix-list OWN-PREFIXES seq 10 permit 203.0.113.0/24
!
route-map FROM-ISP2 permit 10
   match ip address prefix-list DEFAULT-ONLY
   set local-preference 100
   set community 65001:102
route-map FROM-ISP2 deny 99
!
! Outbound to ISP2: announce our /24 with AS-prepend so ISP2's path looks longer
! → other ASes prefer the ISP1 path inbound to us
route-map TO-ISP2 permit 10
   match ip address prefix-list OWN-PREFIXES
   set as-path prepend 65001 65001
!
router bgp 65001
   router-id 10.0.0.2
   no bgp default ipv4-unicast
   neighbor 198.51.100.6 remote-as 64513
   neighbor 198.51.100.6 description ISP2
   neighbor 10.0.0.1 remote-as 65001
   neighbor 10.0.0.1 update-source Loopback0
   !
   address-family ipv4
      ! Activate ALL neighbors first, THEN per-neighbor policy. EOS rejects an
      ! `activate` that comes after another neighbor's address-family sub-commands.
      neighbor 198.51.100.6 activate
      neighbor 10.0.0.1 activate
      neighbor 198.51.100.6 route-map FROM-ISP2 in
      neighbor 198.51.100.6 route-map TO-ISP2 out
      neighbor 198.51.100.6 send-community
      neighbor 10.0.0.1 next-hop-self
      neighbor 10.0.0.1 send-community
      network 203.0.113.0/24
!
ip route 0.0.0.0/0 198.51.100.6 250
!
end
