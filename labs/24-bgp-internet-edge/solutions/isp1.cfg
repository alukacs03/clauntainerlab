hostname isp1
!
ip routing
!
interface Ethernet1
   no switchport
   ip address 198.51.100.2/30
!
! Loopback1 hosts a *reachable* test target (1.1.1.1). The connected /32 is
! more specific than the 1.1.1.0/24 Null0 below, so traffic to 1.1.1.1 lands
! here instead of being black-holed — making the end-to-end ping succeed.
! The ISP can return that traffic because it learns 203.0.113.0/24 via BGP
! from edge1.
interface Loopback1
   ip address 1.1.1.1/32
!
! The remaining prefixes are control-plane fill ("the internet") — Null0
! discards anything sent to them, so they are advertised but not pingable.
ip route 0.0.0.0/0 Null0
ip route 1.1.1.0/24 Null0
ip route 8.8.8.0/24 Null0
ip route 142.250.0.0/16 Null0
ip route 17.0.0.0/8 Null0
!
router bgp 64512
   router-id 100.64.0.1
   no bgp default ipv4-unicast
   neighbor 198.51.100.1 remote-as 65001
   !
   address-family ipv4
      neighbor 198.51.100.1 activate
      network 0.0.0.0/0
      network 1.1.1.0/24
      network 8.8.8.0/24
      network 142.250.0.0/16
      network 17.0.0.0/8
!
end
