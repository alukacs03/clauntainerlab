hostname edge1
!
ip routing
!
interface Loopback0
   ip address 10.0.0.1/32
   ip ospf area 0.0.0.0
!
interface Ethernet1
   description h1
   no switchport
   ip address 203.0.113.1/24
   ip ospf area 0.0.0.0
   ip ospf passive
!
interface Ethernet2
   description iBGP backbone to edge2
   no switchport
   ip address 10.99.0.1/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
interface Ethernet3
   description eBGP to ISP1
   no switchport
   ip address 198.51.100.1/30
!
interface Ethernet4
   no switchport
   ip address 10.99.1.1/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
router ospf 1
   router-id 10.0.0.1
   passive-interface default
   no passive-interface Ethernet2
   no passive-interface Ethernet4
!
ip prefix-list DEFAULT-ONLY seq 10 permit 0.0.0.0/0
ip prefix-list OWN-PREFIXES seq 10 permit 203.0.113.0/24
!
route-map FROM-ISP1 permit 10
   match ip address prefix-list DEFAULT-ONLY
   set community 65001:101
route-map FROM-ISP1 deny 99
!
route-map TO-ISP1 permit 10
   match ip address prefix-list OWN-PREFIXES
!
router bgp 65001
   router-id 10.0.0.1
   no bgp default ipv4-unicast
   neighbor 198.51.100.2 remote-as 64512
   neighbor 198.51.100.2 description ISP1
   neighbor 10.0.0.2 remote-as 65001
   neighbor 10.0.0.2 update-source Loopback0
   !
   address-family ipv4
      neighbor 198.51.100.2 activate
      neighbor 198.51.100.2 route-map FROM-ISP1 in
      neighbor 198.51.100.2 route-map TO-ISP1 out
      neighbor 198.51.100.2 send-community
      neighbor 10.0.0.2 activate
      neighbor 10.0.0.2 next-hop-self
      neighbor 10.0.0.2 send-community
      network 203.0.113.0/24
!
! ─── Floating static default — last-resort if both ISPs disappear ───
! AD 250 = higher than iBGP (200), much higher than eBGP (20).
! Only installed if no other default exists.
! Points at ISP1 directly — replace with whatever last-resort path you have.
ip route 0.0.0.0/0 198.51.100.2 250
!
end
