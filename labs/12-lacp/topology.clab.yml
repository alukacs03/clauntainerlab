name: lacp

topology:
  kinds:
    arista_ceos:
      image: ceos:4.35.4M
    linux:
      image: ghcr.io/srl-labs/network-multitool

  nodes:
    sw1:
      kind: arista_ceos
      startup-config: configs/sw1.cfg
    sw2:
      kind: arista_ceos
      startup-config: configs/sw2.cfg

    h1:
      kind: linux
      exec:
        - ip addr add 10.10.10.1/24 dev eth1
    h2:
      kind: linux
      exec:
        - ip addr add 10.10.10.2/24 dev eth1

  links:
    - endpoints: ["h1:eth1", "sw1:eth1"]
    - endpoints: ["h2:eth1", "sw2:eth1"]
    # Two parallel uplinks to be bundled into a Port-Channel via LACP
    - endpoints: ["sw1:eth2", "sw2:eth2"]
    - endpoints: ["sw1:eth3", "sw2:eth3"]
