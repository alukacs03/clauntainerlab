hostname sw2
!
vlan 10
   name USERS
!
interface Ethernet1
   description h2
   switchport mode access
   switchport access vlan 10
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet2
   description uplink-to-sw1-A
   switchport mode trunk
   switchport trunk allowed vlan 10
!
interface Ethernet3
   description uplink-to-sw1-B
   switchport mode trunk
   switchport trunk allowed vlan 10
!
end
