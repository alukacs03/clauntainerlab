hostname sw1
!
vlan 10
   name USERS
!
interface Ethernet1
   description h1
   switchport mode access
   switchport access vlan 10
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet2
   description uplink-to-sw2-A (will become PortChannel1 member)
   switchport mode trunk
   switchport trunk allowed vlan 10
!
interface Ethernet3
   description uplink-to-sw2-B (will become PortChannel1 member)
   switchport mode trunk
   switchport trunk allowed vlan 10
!
! ─────────────────────────────────────────────────────────────
! Starter: two parallel trunks between sw1 and sw2.
! Without bundling, RSTP blocks one — you're paying for the second
! link without using it. Your job: bundle them via LACP into
! Port-Channel1 so both links forward simultaneously.
! ─────────────────────────────────────────────────────────────
!
end
