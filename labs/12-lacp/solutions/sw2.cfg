hostname sw2
!
vlan 10
   name USERS
!
interface Port-Channel1
   description bundled-uplink-to-sw1
   switchport mode trunk
   switchport trunk allowed vlan 10
!
interface Ethernet1
   description h2
   switchport mode access
   switchport access vlan 10
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet2
   description uplink-to-sw1-A (Po1 member)
   channel-group 1 mode active
!
interface Ethernet3
   description uplink-to-sw1-B (Po1 member)
   channel-group 1 mode active
!
end
