hostname sw1
!
vlan 10
   name TENANT-A
!
vlan 20
   name TENANT-B
!
vlan 30
   name TENANT-C
!
interface Ethernet1
   description h1 (TENANT-A)
   switchport mode access
   switchport access vlan 10
!
interface Ethernet2
   description h2 (TENANT-B)
   switchport mode access
   switchport access vlan 20
!
interface Ethernet3
   description h5 (TENANT-C)
   switchport mode access
   switchport access vlan 30
!
interface Ethernet4
   description trunk-to-sw2 (DELIBERATELY LAZY — allows ALL VLANs, native VLAN 1)
   switchport mode trunk
!
! ─────────────────────────────────────────────────────────────
! Starter is intentionally "lazy admin" state:
!   - trunk allows ALL VLANs (the EOS default)
!   - native VLAN is 1 (the EOS default)
!   - frames in native VLAN ride UNTAGGED across the trunk
!
! Your tasks (see README):
!   1. Restrict trunk allowed-list to only the VLANs we actually use
!   2. Move native VLAN off VLAN 1 to an unused VLAN (e.g. 999)
!   3. Enable "vlan dot1q tag native" so even native traffic is tagged
! ─────────────────────────────────────────────────────────────
!
end
