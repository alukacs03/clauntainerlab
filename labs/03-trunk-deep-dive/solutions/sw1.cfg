hostname sw1
!
vlan 10
   name TENANT-A
!
vlan 20
   name TENANT-B
!
vlan 30
   name TENANT-C
!
vlan 999
   name NATIVE-PARKING
!
! Force ALL frames on every trunk to be tagged — even the native VLAN.
! Closes the double-tag VLAN-hopping window and makes captures unambiguous.
vlan dot1q tag native
!
interface Ethernet1
   description h1 (TENANT-A)
   switchport mode access
   switchport access vlan 10
!
interface Ethernet2
   description h2 (TENANT-B)
   switchport mode access
   switchport access vlan 20
!
interface Ethernet3
   description h5 (TENANT-C)
   switchport mode access
   switchport access vlan 30
!
interface Ethernet4
   description trunk-to-sw2 (hardened)
   switchport mode trunk
   switchport trunk native vlan 999
   switchport trunk allowed vlan 10,20,30,999
!
end
