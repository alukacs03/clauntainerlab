hostname sw1
!
vlan 10
   name TENANT-A
!
vlan 20
   name TENANT-B
!
vlan 30
   name TENANT-C
!
interface Ethernet1
   description h1 (TENANT-A)
   switchport mode access
   switchport access vlan 10
!
interface Ethernet2
   description h2 (TENANT-B)
   switchport mode access
   switchport access vlan 20
!
interface Ethernet3
   description h5 (TENANT-C)
   switchport mode access
   switchport access vlan 30
!
interface Ethernet4
   description trunk-to-sw2 (hardened)
   switchport mode trunk
   ! Drop ALL untagged frames on this trunk — there is no native VLAN.
   ! Closes the double-tag VLAN-hopping window and makes captures
   ! unambiguous. On Arista, `switchport trunk native vlan tag` and
   ! `switchport trunk native vlan <id>` are mutually exclusive — pick
   ! the more secure option: drop untagged frames entirely.
   switchport trunk native vlan tag
   switchport trunk allowed vlan 10,20,30
!
end
