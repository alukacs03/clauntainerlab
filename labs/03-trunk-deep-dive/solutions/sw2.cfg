hostname sw2
!
vlan 10
   name TENANT-A
!
vlan 20
   name TENANT-B
!
vlan 30
   name TENANT-C
!
interface Ethernet1
   description h3 (TENANT-A)
   switchport mode access
   switchport access vlan 10
!
interface Ethernet2
   description h4 (TENANT-B)
   switchport mode access
   switchport access vlan 20
!
interface Ethernet3
   description h6 (TENANT-C)
   switchport mode access
   switchport access vlan 30
!
interface Ethernet4
   description trunk-to-sw1 (hardened)
   switchport mode trunk
   ! Drop untagged frames — both sides of the trunk must agree.
   switchport trunk native vlan tag
   switchport trunk allowed vlan 10,20,30
!
end
