name: vrrp

topology:
  kinds:
    arista_ceos:
      image: ceos:4.35.4M
    linux:
      image: ghcr.io/srl-labs/network-multitool

  nodes:
    sw1:
      kind: arista_ceos
      startup-config: configs/sw1.cfg
    sw2:
      kind: arista_ceos
      startup-config: configs/sw2.cfg

    h1:
      kind: linux
      exec:
        - ip addr add 10.10.10.1/24 dev eth1
        - ip route add default via 10.10.10.254
    h2:
      kind: linux
      exec:
        - ip addr add 10.10.10.2/24 dev eth1
        - ip route add default via 10.10.10.254

    # Server on the "other side" — reachable only via the gateway
    h-server:
      kind: linux
      exec:
        - ip addr add 10.20.20.50/24 dev eth1
        - ip route add 10.10.10.0/24 via 10.20.20.254

  links:
    - endpoints: ["h1:eth1", "sw1:eth1"]
    - endpoints: ["h2:eth1", "sw2:eth1"]
    - endpoints: ["sw1:eth2", "sw2:eth2"]     # trunk between switches
    # Server reachable from both L3 switches via VLAN 20 (each switch
    # has Et3 in VLAN 20 — but h-server only physically attaches to one).
    # For simplicity we attach to sw1 here; in a real design the server
    # would have its own redundancy.
    - endpoints: ["h-server:eth1", "sw1:eth3"]
    - endpoints: ["sw1:eth4", "sw2:eth3"]     # cross-link in VLAN 20 so sw2 can reach the server
