hostname sw1
!
ip routing
!
vlan 10
   name USERS
!
vlan 20
   name SERVERS
!
interface Ethernet1
   description h1
   switchport mode access
   switchport access vlan 10
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet2
   description trunk-to-sw2
   switchport mode trunk
   switchport trunk allowed vlan 10,20
!
interface Ethernet3
   description h-server
   switchport mode access
   switchport access vlan 20
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Vlan10
   description USERS gateway (LOCAL ONLY — no VRRP yet)
   ip address 10.10.10.251/24
!
interface Vlan20
   description SERVERS gateway (LOCAL ONLY — no VRRP yet)
   ip address 10.20.20.251/24
!
! ─────────────────────────────────────────────────────────────
! Starter: sw1 IS the gateway for VLAN 10 (10.10.10.251) and the
! ONLY gateway. If sw1 fails, every host in VLAN 10 loses its
! default route. There is no failover.
!
! Your tasks (see README):
!   1. Configure VRRP on sw1's Vlan10 SVI:
!      - Group 10, virtual IP 10.10.10.254
!      - Priority 110 (primary)
!      - Preempt enabled
!   2. Also configure VRRP on sw1's Vlan20 SVI so the SERVER's return
!      path fails over too:
!      - Group 20, virtual IP 10.20.20.254
!      - Priority 110 (primary)
!      - Preempt enabled
!   3. Do the same on sw2 (both groups, priority 100, secondary)
!   4. Hosts (done in topology) use 10.10.10.254; h-server uses
!      10.20.20.254 as its next hop back to the users subnet
!   5. Test failover: shut sw1's Vlan10 AND Vlan20, verify h1 keeps
!      reaching h-server through sw2
! ─────────────────────────────────────────────────────────────
!
end
