hostname sw1
!
ip routing
!
vlan 10
   name USERS
!
vlan 20
   name SERVERS
!
interface Ethernet1
   description h1
   switchport mode access
   switchport access vlan 10
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet2
   description trunk-to-sw2
   switchport mode trunk
   switchport trunk allowed vlan 10,20
!
interface Ethernet3
   description h-server
   switchport mode access
   switchport access vlan 20
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Vlan10
   description USERS gateway — VRRP primary
   ip address 10.10.10.251/24
   vrrp 10 ip 10.10.10.254
   vrrp 10 priority-level 110
   vrrp 10 preempt
   vrrp 10 description USERS-gateway
!
interface Vlan20
   description SERVERS gateway — VRRP primary
   ip address 10.20.20.251/24
   vrrp 20 ip 10.20.20.254
   vrrp 20 priority-level 110
   vrrp 20 preempt
   vrrp 20 description SERVERS-gateway
!
end
