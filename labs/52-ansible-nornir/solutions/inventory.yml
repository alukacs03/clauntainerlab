# Ansible inventory for all 3 switches.
#
# Each switch is on its own point-to-point link to the automation host, so
# each one lives in a distinct /24 (see topology.clab.yml). ansible_host is
# the switch's interface address; mgmt_server is the automation host's address
# on that same link (used as the syslog/NTP target in the baseline playbook).
all:
  vars:
    ansible_user: admin
    ansible_password: admin
    ansible_network_os: arista.eos.eos
    ansible_connection: ansible.netcommon.httpapi
    ansible_httpapi_use_ssl: yes
    ansible_httpapi_validate_certs: no

  children:
    leaf:
      hosts:
        sw1:
          ansible_host: 10.0.0.1
          mgmt_server: 10.0.0.100
        sw2:
          ansible_host: 10.0.1.2
          mgmt_server: 10.0.1.100
        sw3:
          ansible_host: 10.0.2.3
          mgmt_server: 10.0.2.100
