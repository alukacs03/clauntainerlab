---
# Apply baseline hardening to every switch:
# - login banner
# - remote syslog
# - NTP
# - idle exec timeout on the VTY lines
#
# Note on modules: the legacy arista.eos.eos_ntp / eos_logging modules have
# been removed from current arista.eos releases. Use the resource modules
# eos_ntp_global / eos_logging_global instead — these are state-aware and
# therefore idempotent (rerun => changed=0).
- name: Baseline hardening
  hosts: leaf
  gather_facts: no
  tasks:
    - name: Set login banner
      arista.eos.eos_banner:
        banner: login
        text: |
          Authorized access only. All activity logged.
        state: present

    - name: Configure remote syslog
      arista.eos.eos_logging_global:
        config:
          hosts:
            - name: "{{ mgmt_server }}"
        state: merged

    - name: Configure NTP
      arista.eos.eos_ntp_global:
        config:
          servers:
            - server: "{{ mgmt_server }}"
        state: merged

    - name: Configure idle exec timeout
      arista.eos.eos_config:
        lines:
          - exec-timeout 10
        parents: line vty
