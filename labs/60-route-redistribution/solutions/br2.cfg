hostname br2
!
ip routing
!
interface Loopback0
   ip address 4.4.4.4/32
   ip ospf area 0.0.0.0
!
interface Ethernet1
   description to ospf-a (OSPF domain)
   no switchport
   ip address 10.0.14.2/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
interface Ethernet2
   description to bgp-b (BGP domain, eBGP AS 65002)
   no switchport
   ip address 10.0.24.1/30
!
! ─── Same loop-prevention marks as br1 ───
! OSPF-origin -> BGP community 65000:1; BGP-origin -> OSPF tag 2. Drop the other
! domain's mark on the way back in, so a route redistributed by br1 isn't
! re-injected by br2 (and vice-versa).
!
ip community-list OSPF-ORIGIN permit 65000:1
!
route-map OSPF-TO-BGP deny 10
   description drop BGP-origin routes (tag 2) — don't push them back into BGP
   match tag 2
route-map OSPF-TO-BGP permit 20
   set community 65000:1
!
route-map BGP-TO-OSPF deny 10
   description drop OSPF-origin routes (community) — don't push them back into OSPF
   match community OSPF-ORIGIN
route-map BGP-TO-OSPF permit 20
   set tag 2
!
router ospf 1
   router-id 4.4.4.4
   redistribute bgp route-map BGP-TO-OSPF
!
router bgp 65003
   router-id 4.4.4.4
   no bgp default ipv4-unicast
   neighbor 10.0.24.2 remote-as 65002
   neighbor 10.0.24.2 send-community
   redistribute ospf route-map OSPF-TO-BGP
   !
   address-family ipv4
      neighbor 10.0.24.2 activate
!
end
