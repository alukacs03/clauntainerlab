hostname br1
!
ip routing
!
interface Loopback0
   ip address 3.3.3.3/32
   ip ospf area 0.0.0.0
!
interface Ethernet1
   description to ospf-a (OSPF domain)
   no switchport
   ip address 10.0.13.2/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
interface Ethernet2
   description to bgp-b (BGP domain, eBGP AS 65002)
   no switchport
   ip address 10.0.23.1/30
!
! ─── Loop-prevention marks (the whole point of this lab) ───
! Two domains, two marks:
!   - OSPF-origin routes get BGP community 65000:1 when pushed into BGP.
!   - BGP-origin routes get OSPF route-tag 2 when pushed into OSPF.
! On the way back IN, drop anything already carrying the OTHER domain's mark —
! that's exactly the route the OTHER border already redistributed, and
! re-injecting it is the feedback loop. (BGP's AS-path can't save us here: the
! two borders are in different ASes 65001/65003.)
!
ip community-list OSPF-ORIGIN permit 65000:1
!
route-map OSPF-TO-BGP deny 10
   description drop BGP-origin routes (tag 2) — don't push them back into BGP
   match tag 2
route-map OSPF-TO-BGP permit 20
   set community 65000:1
!
route-map BGP-TO-OSPF deny 10
   description drop OSPF-origin routes (community) — don't push them back into OSPF
   match community OSPF-ORIGIN
route-map BGP-TO-OSPF permit 20
   set tag 2
!
router ospf 1
   router-id 3.3.3.3
   redistribute bgp route-map BGP-TO-OSPF
!
router bgp 65001
   router-id 3.3.3.3
   no bgp default ipv4-unicast
   neighbor 10.0.23.2 remote-as 65002
   neighbor 10.0.23.2 send-community
   redistribute ospf route-map OSPF-TO-BGP
   !
   address-family ipv4
      neighbor 10.0.23.2 activate
!
end
