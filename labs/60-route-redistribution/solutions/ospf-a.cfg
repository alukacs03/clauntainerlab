hostname ospf-a
!
ip routing
!
interface Loopback0
   ip address 1.1.1.1/32
   ip ospf area 0.0.0.0
!
interface Loopback1
   ip address 10.1.1.1/24
   ip ospf area 0.0.0.0
!
interface Ethernet1
   description to br1
   no switchport
   ip address 10.0.13.1/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
interface Ethernet2
   description to br2
   no switchport
   ip address 10.0.14.1/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
router ospf 1
   router-id 1.1.1.1
!
end
