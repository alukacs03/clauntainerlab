hostname br2
!
ip routing
!
interface Loopback0
   ip address 4.4.4.4/32
   ip ospf area 0.0.0.0
!
interface Ethernet1
   description to ospf-a (OSPF domain)
   no switchport
   ip address 10.0.14.2/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
interface Ethernet2
   description to bgp-b (BGP domain, eBGP AS 65002)
   no switchport
   ip address 10.0.24.1/30
!
router ospf 1
   router-id 4.4.4.4
!
router bgp 65003
   router-id 4.4.4.4
   no bgp default ipv4-unicast
   neighbor 10.0.24.2 remote-as 65002
   neighbor 10.0.24.2 send-community
   !
   address-family ipv4
      neighbor 10.0.24.2 activate
!
! TODO (your task): mutually redistribute OSPF <-> BGP here, WITHOUT
! creating a routing loop / route feedback through br1. See the README.
!
end
