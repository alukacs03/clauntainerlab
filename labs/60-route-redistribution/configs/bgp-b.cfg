hostname bgp-b
!
ip routing
!
interface Loopback0
   ip address 2.2.2.2/32
!
! The "customer" prefix this domain owns and advertises into BGP.
interface Loopback1
   ip address 10.2.2.2/24
!
interface Ethernet1
   description to br1
   no switchport
   ip address 10.0.23.2/30
!
interface Ethernet2
   description to br2
   no switchport
   ip address 10.0.24.2/30
!
router bgp 65002
   router-id 2.2.2.2
   no bgp default ipv4-unicast
   neighbor 10.0.23.1 remote-as 65001
   neighbor 10.0.23.1 send-community
   neighbor 10.0.24.1 remote-as 65003
   neighbor 10.0.24.1 send-community
   !
   address-family ipv4
      neighbor 10.0.23.1 activate
      neighbor 10.0.24.1 activate
      network 10.2.2.0/24
!
end
