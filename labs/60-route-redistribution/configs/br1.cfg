hostname br1
!
ip routing
!
interface Loopback0
   ip address 3.3.3.3/32
   ip ospf area 0.0.0.0
!
interface Ethernet1
   description to ospf-a (OSPF domain)
   no switchport
   ip address 10.0.13.2/30
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
!
interface Ethernet2
   description to bgp-b (BGP domain, eBGP AS 65002)
   no switchport
   ip address 10.0.23.1/30
!
router ospf 1
   router-id 3.3.3.3
!
router bgp 65001
   router-id 3.3.3.3
   no bgp default ipv4-unicast
   neighbor 10.0.23.2 remote-as 65002
   neighbor 10.0.23.2 send-community
   !
   address-family ipv4
      neighbor 10.0.23.2 activate
!
! TODO (your task): mutually redistribute OSPF <-> BGP here, WITHOUT
! creating a routing loop / route feedback through br2. See the README.
!
end
