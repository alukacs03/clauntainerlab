hostname provider
!
ip routing
!
interface Loopback0
   ip address 10.0.0.1/32
!
interface Ethernet1
   description eBGP to CUSTOMER (they pay us)
   no switchport
   ip address 192.0.2.1/30
!
interface Ethernet2
   description eBGP to PEER (no money flows)
   no switchport
   ip address 192.0.2.5/30
!
interface Ethernet3
   description eBGP to TRANSIT (we pay them)
   no switchport
   ip address 192.0.2.9/30
!
! ─── Community lists matching the neighbor-type tags ───
ip community-list FROM-CUSTOMER permit 65000:100
ip community-list FROM-PEER     permit 65000:200
ip community-list FROM-TRANSIT  permit 65000:300
!
! ─── Inbound tagging: classify each route by where it came from ───
route-map IN-FROM-CUSTOMER permit 10
   set community 65000:100
   set local-preference 300
!
route-map IN-FROM-PEER permit 10
   set community 65000:200
   set local-preference 200
!
route-map IN-FROM-TRANSIT permit 10
   set community 65000:300
   set local-preference 100
!
! ─── Outbound policy: who sees what ───
! TO CUSTOMER: send customer + peer + transit routes (we want them to reach the internet)
route-map OUT-TO-CUSTOMER permit 10
   match community FROM-CUSTOMER
route-map OUT-TO-CUSTOMER permit 20
   match community FROM-PEER
route-map OUT-TO-CUSTOMER permit 30
   match community FROM-TRANSIT
!
! TO PEER: send ONLY customer routes (we transit our customers' traffic, not peer↔transit)
route-map OUT-TO-PEER permit 10
   match community FROM-CUSTOMER
!
! TO TRANSIT: send ONLY customer routes (same reason — they pay us to carry their traffic to the world)
route-map OUT-TO-TRANSIT permit 10
   match community FROM-CUSTOMER
!
router bgp 65000
   router-id 10.0.0.1
   no bgp default ipv4-unicast
   neighbor 192.0.2.2 remote-as 65001
   neighbor 192.0.2.2 description CUSTOMER-A
   neighbor 192.0.2.6 remote-as 64512
   neighbor 192.0.2.6 description PEER-X
   neighbor 192.0.2.10 remote-as 64513
   neighbor 192.0.2.10 description TRANSIT-PROVIDER-Y
   !
   address-family ipv4
      neighbor 192.0.2.2 activate
      neighbor 192.0.2.2 route-map IN-FROM-CUSTOMER in
      neighbor 192.0.2.2 route-map OUT-TO-CUSTOMER out
      neighbor 192.0.2.2 send-community
      neighbor 192.0.2.6 activate
      neighbor 192.0.2.6 route-map IN-FROM-PEER in
      neighbor 192.0.2.6 route-map OUT-TO-PEER out
      neighbor 192.0.2.6 send-community
      neighbor 192.0.2.10 activate
      neighbor 192.0.2.10 route-map IN-FROM-TRANSIT in
      neighbor 192.0.2.10 route-map OUT-TO-TRANSIT out
      neighbor 192.0.2.10 send-community
!
end
