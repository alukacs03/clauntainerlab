hostname peer
!
ip routing
!
interface Loopback0
   ip address 100.64.0.2/32
!
interface Ethernet1
   no switchport
   ip address 192.0.2.6/30
!
ip route 203.0.113.0/24 Null0
ip route 10.50.0.0/16 Null0
!
router bgp 64512
   router-id 100.64.0.2
   no bgp default ipv4-unicast
   neighbor 192.0.2.5 remote-as 65000
   neighbor 192.0.2.5 description provider
   !
   address-family ipv4
      neighbor 192.0.2.5 activate
      network 203.0.113.0/24
      network 10.50.0.0/16
!
end
