hostname transit
!
ip routing
!
interface Loopback0
   ip address 100.64.0.3/32
!
interface Ethernet1
   no switchport
   ip address 192.0.2.10/30
!
ip route 0.0.0.0/0 Null0
ip route 1.1.1.0/24 Null0
ip route 8.8.8.0/24 Null0
ip route 142.250.0.0/16 Null0
!
router bgp 64513
   router-id 100.64.0.3
   no bgp default ipv4-unicast
   neighbor 192.0.2.9 remote-as 65000
   !
   address-family ipv4
      neighbor 192.0.2.9 activate
      network 0.0.0.0/0
      network 1.1.1.0/24
      network 8.8.8.0/24
      network 142.250.0.0/16
!
end
