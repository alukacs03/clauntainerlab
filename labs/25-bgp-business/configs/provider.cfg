hostname provider
!
ip routing
!
interface Loopback0
   ip address 10.0.0.1/32
!
interface Ethernet1
   description eBGP to CUSTOMER (they pay us)
   no switchport
   ip address 192.0.2.1/30
!
interface Ethernet2
   description eBGP to PEER (no money flows)
   no switchport
   ip address 192.0.2.5/30
!
interface Ethernet3
   description eBGP to TRANSIT (we pay them)
   no switchport
   ip address 192.0.2.9/30
!
router bgp 65000
   router-id 10.0.0.1
   no bgp default ipv4-unicast
   neighbor 192.0.2.2 remote-as 65001
   neighbor 192.0.2.2 description CUSTOMER-A
   neighbor 192.0.2.6 remote-as 64512
   neighbor 192.0.2.6 description PEER-X
   neighbor 192.0.2.10 remote-as 64513
   neighbor 192.0.2.10 description TRANSIT-PROVIDER-Y
   !
   address-family ipv4
      neighbor 192.0.2.2 activate
      neighbor 192.0.2.6 activate
      neighbor 192.0.2.10 activate
!
! ─────────────────────────────────────────────────────────────
! Starter: provider has BGP sessions with all three neighbors, no
! policy. Without policy, BGP's default is to advertise everything
! to everyone — which would make YOU a free transit between peer
! and transit (you'd carry their traffic for nothing, possibly at
! great cost). This is the policy mistake that caused many real
! outages and leaks.
!
! Your tasks (see README):
!   1. Tag inbound by neighbor type:
!      - customer routes → community 65000:100
!      - peer routes     → community 65000:200
!      - transit routes  → community 65000:300
!   2. Apply outbound policy (Gao-Rexford routing):
!      - To CUSTOMER:  send customer + peer + transit routes
!      - To PEER:      send ONLY customer routes
!      - To TRANSIT:   send ONLY customer routes
!   3. Verify each neighbor sees only what they should
! ─────────────────────────────────────────────────────────────
!
end
