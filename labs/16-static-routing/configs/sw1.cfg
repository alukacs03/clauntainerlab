hostname sw1
!
ip routing
!
interface Ethernet1
   description h1
   no switchport
   ip address 10.10.10.1/24
!
interface Ethernet2
   description primary-to-sw2
   no switchport
   ip address 192.168.12.1/30
!
interface Ethernet3
   description backup-to-sw2
   no switchport
   ip address 192.168.13.1/30
!
! ─────────────────────────────────────────────────────────────
! Starter: no static routes yet. sw1 can reach its own subnets,
! but not 10.20.20.0/24 (h2's subnet).
!
! Your tasks (see README):
!   1. Add static route to 10.20.20.0/24 via the primary next-hop
!      (192.168.12.2), default AD
!   2. Add a FLOATING static route to the same destination via the
!      backup next-hop (192.168.13.2), AD 200
!   3. Verify primary is used while up
!   4. Kill the primary, verify failover to backup
! ─────────────────────────────────────────────────────────────
!
end
