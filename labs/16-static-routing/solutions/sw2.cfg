hostname sw2
!
ip routing
!
interface Ethernet1
   description h2
   no switchport
   ip address 10.20.20.1/24
!
interface Ethernet2
   description primary-to-sw1
   no switchport
   ip address 192.168.12.2/30
!
interface Ethernet3
   description backup-to-sw1
   no switchport
   ip address 192.168.13.2/30
!
ip route 10.10.10.0/24 192.168.12.1
ip route 10.10.10.0/24 192.168.13.1 200
!
end
