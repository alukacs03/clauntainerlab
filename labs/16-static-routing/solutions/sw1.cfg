hostname sw1
!
ip routing
!
interface Ethernet1
   description h1
   no switchport
   ip address 10.10.10.1/24
!
interface Ethernet2
   description primary-to-sw2
   no switchport
   ip address 192.168.12.1/30
!
interface Ethernet3
   description backup-to-sw2
   no switchport
   ip address 192.168.13.1/30
!
! Primary route — default AD 1 (static)
ip route 10.20.20.0/24 192.168.12.2
!
! Floating static — AD 200, only installed when primary is down
ip route 10.20.20.0/24 192.168.13.2 200
!
end
