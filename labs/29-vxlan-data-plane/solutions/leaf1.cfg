hostname leaf1
!
ip routing
!
interface Loopback0
   ip address 1.1.1.1/32
!
interface Loopback1
   ip address 11.11.11.11/32
!
vlan 100
   name TENANT-A
!
interface Ethernet1
   description to-spine1
   mtu 9214
   no switchport
   ip address 10.0.1.1/31
!
interface Ethernet3
   switchport mode access
   switchport access vlan 100
!
! ─── VXLAN interface (static, no EVPN yet) ───
interface Vxlan1
   description tenant-A VTEP
   vxlan source-interface Loopback1
   vxlan udp-port 4789
   vxlan vlan 100 vni 10100
   vxlan vlan 100 flood vtep 22.22.22.22
!
router bgp 65001
   router-id 1.1.1.1
   no bgp default ipv4-unicast
   maximum-paths 64 ecmp 64
   neighbor 10.0.1.0 remote-as 65100
   !
   address-family ipv4
      neighbor 10.0.1.0 activate
      network 1.1.1.1/32
      network 11.11.11.11/32
!
end
