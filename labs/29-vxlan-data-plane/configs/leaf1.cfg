hostname leaf1
!
ip routing
!
interface Loopback0
   description router-id
   ip address 1.1.1.1/32
!
interface Loopback1
   description VTEP source IP — VXLAN encapsulation uses this as outer src
   ip address 11.11.11.11/32
!
vlan 100
   name TENANT-A
!
interface Ethernet1
   description to-spine1
   no switchport
   ip address 10.0.1.1/31
!
interface Ethernet3
   description h1 (access port VLAN 100)
   switchport mode access
   switchport access vlan 100
!
router bgp 65001
   router-id 1.1.1.1
   no bgp default ipv4-unicast
   maximum-paths 64 ecmp 64
   neighbor 10.0.1.0 remote-as 65100
   !
   address-family ipv4
      neighbor 10.0.1.0 activate
      network 1.1.1.1/32
      network 11.11.11.11/32
!
! ─────────────────────────────────────────────────────────────
! Starter: underlay is up (BGP between leaves and spine), but no
! VXLAN yet. h1 and h2 are in the same subnet but on different
! leaves — without VXLAN they can't reach each other (no L2 path
! between leaf1 and leaf2 over the L3 underlay).
!
! Your tasks (see README):
!   1. Configure VXLAN interface (Vxlan1) on each leaf
!      - source-interface Loopback1
!      - VLAN 100 ↔ VNI 10100
!   2. Configure flood-list (head-end replication of BUM traffic to
!      the other leaf's VTEP IP)
!   3. Verify h1 can ping h2 over the VXLAN overlay
! ─────────────────────────────────────────────────────────────
!
end
