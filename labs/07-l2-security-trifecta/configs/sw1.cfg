hostname sw1
!
vlan 10
   name USERS
!
interface Ethernet1
   description h-dhcp (legitimate DHCP server)
   switchport mode access
   switchport access vlan 10
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet2
   description h-rogue-dhcp
   switchport mode access
   switchport access vlan 10
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet3
   description h1 client
   switchport mode access
   switchport access vlan 10
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet4
   description h2 client
   switchport mode access
   switchport access vlan 10
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet5
   description h-attacker
   switchport mode access
   switchport access vlan 10
   spanning-tree portfast
   spanning-tree bpduguard enable
!
! ─────────────────────────────────────────────────────────────
! Starter: no L2 anti-spoofing. The rogue DHCP server may race
! the real one, and any host can ARP-spoof or use any IP.
!
! Your tasks (see README):
!   1. Enable DHCP snooping on VLAN 10
!   2. Mark Et1 (real DHCP server) as TRUSTED; all others untrusted
!   3. Enable Dynamic ARP Inspection (DAI) on VLAN 10
!   4. Enable IP Source Guard on client ports (Et3, Et4, Et5)
! ─────────────────────────────────────────────────────────────
!
end
