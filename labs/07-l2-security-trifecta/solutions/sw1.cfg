hostname sw1
!
! ─── L2 anti-spoofing trifecta ───
ip dhcp snooping
ip dhcp snooping vlan 10
ip arp inspection vlan 10
!
vlan 10
   name USERS
!
interface Ethernet1
   description h-dhcp (TRUSTED — real DHCP server)
   switchport mode access
   switchport access vlan 10
   ip dhcp snooping trust
   ip arp inspection trust
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet2
   description h-rogue-dhcp (untrusted — DHCP server offers will be dropped)
   switchport mode access
   switchport access vlan 10
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet3
   description h1 client
   switchport mode access
   switchport access vlan 10
   ip verify source
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet4
   description h2 client
   switchport mode access
   switchport access vlan 10
   ip verify source
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet5
   description h-attacker
   switchport mode access
   switchport access vlan 10
   ip verify source
   spanning-tree portfast
   spanning-tree bpduguard enable
!
end
