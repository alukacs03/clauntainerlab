hostname sw1
!
! ─── L2 anti-spoofing trifecta ───
! NOTE: DHCP snooping, DAI, and IPSG are HARDWARE-enforced in EOS. cEOS has no
! forwarding ASIC, so the syntax below is accepted but enforcement is partial /
! absent. The point of this lab is the config + operational-state model.
! See the README's "cEOS limitation" callout.
!
! EOS DHCP snooping needs Option-82 insertion to be functional on a VLAN
! (per EOS 4.36.0F manual). It is NOT the Cisco trusted/untrusted rogue-blocking
! model — there is no `ip dhcp snooping trust` interface command in EOS.
ip dhcp snooping
ip dhcp snooping information option
ip dhcp snooping vlan 10
!
ip arp inspection vlan 10
!
vlan 10
   name USERS
!
! Static IP-MAC bindings feed DAI/IPSG for hosts whose (IP,MAC) we know.
! In cEOS these populate the binding table since dynamic snooping bindings
! are not reliably created without a forwarding ASIC.
! Order is: ip source binding <IP> <MAC-dotted> vlan <id> interface <intf>
! (Replace the example MACs with the real container MACs — see README.)
ip source binding 10.10.10.250 aabb.cc00.0250 vlan 10 interface Ethernet1
!
interface Ethernet1
   description h-dhcp (TRUSTED for ARP — real DHCP server)
   switchport mode access
   switchport access vlan 10
   ip arp inspection trust
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet2
   description h-rogue-dhcp (untrusted)
   switchport mode access
   switchport access vlan 10
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet3
   description h1 client
   switchport mode access
   switchport access vlan 10
   ip verify source
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet4
   description h2 client
   switchport mode access
   switchport access vlan 10
   ip verify source
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Ethernet5
   description h-attacker
   switchport mode access
   switchport access vlan 10
   ip verify source
   spanning-tree portfast
   spanning-tree bpduguard enable
!
end
