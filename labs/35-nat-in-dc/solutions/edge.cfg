hostname edge
!
ip routing
!
! ─── PAT / Source NAT for all inside traffic ───
! The pool is a single public IP (the edge's own outside address);
! "overload" makes it PAT (many inside IPs share it, keyed by port).
ip nat pool OUTSIDE-POOL 203.0.113.2 203.0.113.2 prefix-length 29
!
ip access-list ALL-INSIDE
   10 permit ip 10.10.10.0/24 any
   20 permit ip 10.10.20.0/24 any
!
interface Ethernet1
   description outside-toward-internet
   no switchport
   ip address 203.0.113.2/29
   ! ─── Add the 1:1 NAT external IP as a secondary address ───
   ! Same /29 as the primary so the internet peer can route to it.
   ip address 203.0.113.5/29 secondary
   !
   ! NAT rules are applied on the OUTSIDE (egress) interface in EOS.
   ! There is no per-interface "ip nat enable" command — an interface
   ! participates in NAT simply by carrying an "ip nat source ..." rule.
   !
   ! PAT: all inside subnets SNAT to the pool, overloaded by port.
   ip nat source dynamic access-list ALL-INSIDE pool OUTSIDE-POOL overload
   ! 1:1 NAT: h-inside1 statically maps to its dedicated public IP.
   ! This static creates a bidirectional entry (outbound SNAT and
   ! inbound DNAT), so 203.0.113.5 also reaches h-inside1 from outside.
   ip nat source static 10.10.10.10 203.0.113.5
!
interface Ethernet2
   description inside-h-inside1
   no switchport
   ip address 10.10.10.1/24
!
interface Ethernet3
   description inside-h-inside2
   no switchport
   ip address 10.10.20.1/24
!
ip route 0.0.0.0/0 203.0.113.1
!
end
