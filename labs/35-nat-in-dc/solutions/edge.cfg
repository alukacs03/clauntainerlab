hostname edge
!
ip routing
!
interface Ethernet1
   description outside-toward-internet
   no switchport
   ip address 203.0.113.2/30
   ! ─── Add the 1:1 NAT external IP as a secondary address ───
   ip address 203.0.113.5/30 secondary
   !
   ip nat enable
!
interface Ethernet2
   description inside-h-inside1
   no switchport
   ip address 10.10.10.1/24
   ip nat enable
!
interface Ethernet3
   description inside-h-inside2
   no switchport
   ip address 10.10.20.1/24
   ip nat enable
!
ip route 0.0.0.0/0 203.0.113.1
!
! ─── PAT / Source NAT for all inside traffic ───
ip nat pool OUTSIDE-POOL 203.0.113.2 203.0.113.2 prefix-length 30
!
ip access-list ALL-INSIDE
   10 permit ip 10.10.10.0/24 any
   20 permit ip 10.10.20.0/24 any
!
ip nat source list ALL-INSIDE pool OUTSIDE-POOL overload
!
! ─── 1:1 NAT for h-inside1 ───
ip nat source static 10.10.10.10 203.0.113.5
!
end
