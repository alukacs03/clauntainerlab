name: nat-in-dc

topology:
  kinds:
    arista_ceos:
      image: ceos:4.35.4M
    linux:
      image: ghcr.io/srl-labs/network-multitool

  nodes:
    # NAT-performing edge router
    edge:
      kind: arista_ceos
      startup-config: configs/edge.cfg

    # The internet: a Linux box that the edge default-routes toward
    # (no dynamic routing — just a static default back to the edge).
    # The /29 on the outside link is wide enough to also contain the
    # 1:1 NAT public IP (203.0.113.5), so replies to it can return.
    internet:
      kind: linux
      exec:
        - ip addr add 203.0.113.1/29 dev eth1
        - ip route add default via 203.0.113.2

    # Inside hosts (RFC 1918) — two separate inside subnets
    h-inside1:
      kind: linux
      exec:
        - ip addr add 10.10.10.10/24 dev eth1
        - ip route add default via 10.10.10.1
    h-inside2:
      kind: linux
      exec:
        - ip addr add 10.10.20.20/24 dev eth1
        - ip route add default via 10.10.20.1

  links:
    - endpoints: ["edge:eth1", "internet:eth1"]
    - endpoints: ["edge:eth2", "h-inside1:eth1"]
    - endpoints: ["edge:eth3", "h-inside2:eth1"]
