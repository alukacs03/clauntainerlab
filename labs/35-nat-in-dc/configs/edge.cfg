hostname edge
!
ip routing
!
interface Ethernet1
   description outside-toward-internet
   no switchport
   ip address 203.0.113.2/29
!
interface Ethernet2
   description inside-h-inside1
   no switchport
   ip address 10.10.10.1/24
!
interface Ethernet3
   description inside-h-inside2
   ! Will be configured as another inside interface (10.10.20.1/24)
!
ip route 0.0.0.0/0 203.0.113.1
!
! ─────────────────────────────────────────────────────────────
! Starter: edge router with one outside-facing interface (with
! the public IP 203.0.113.2 on a /29) and two inside-facing
! interfaces. No NAT yet. h-inside1 (10.10.10.0/24) and h-inside2
! (10.10.20.0/24) have private IPs and can't reach the internet
! directly because the upstream wouldn't accept return traffic to
! RFC 1918 addresses.
!
! Your tasks (see README):
!   1. Configure source NAT (PAT) — all inside traffic SNATs to
!      203.0.113.2 (the edge's public IP)
!   2. Configure a 1:1 NAT — h-inside1 specifically gets a dedicated
!      external IP (use 203.0.113.5 as a secondary address on the
!      outside /29) for an inbound service
!   3. Verify both NATs work
!
! Reminder: in EOS the NAT apply commands (ip nat source dynamic ...,
! ip nat source static ...) live UNDER the outside interface — there
! is no separate "ip nat enable" command. See EOS User Manual
! v4.36.0F section 9.3.1 (IP NAT).
!
! Note: NAT in EOS is a hardware/TCAM data-plane feature. cEOS has
! no ASIC, so it may accept this config without actually translating
! traffic — see the cEOS caveat in the README.
! ─────────────────────────────────────────────────────────────
!
end
