hostname edge
!
ip routing
!
interface Ethernet1
   description outside-toward-internet
   no switchport
   ip address 203.0.113.2/30
!
interface Ethernet2
   description inside-h-inside1
   no switchport
   ip address 10.10.10.1/24
!
interface Ethernet3
   description inside-h-inside2
   ! Will be configured as another inside interface
!
ip route 0.0.0.0/0 203.0.113.1
!
! ─────────────────────────────────────────────────────────────
! Starter: edge router with one outside-facing interface (with
! the public IP 203.0.113.2) and two inside-facing interfaces.
! No NAT yet. h-inside1 and h-inside2 have private IPs and can't
! reach the internet directly because the upstream wouldn't accept
! return traffic to 10.10.10.0/24.
!
! Your tasks (see README):
!   1. Configure source NAT (PAT) — all inside traffic SNATs to
!      203.0.113.2 (the edge's public IP)
!   2. Configure a 1:1 NAT — h-inside1 specifically gets a dedicated
!      external IP (use 203.0.113.5 as additional address on the
!      outside) for an inbound service
!   3. Verify both NATs work; verify h-inside2 only has outbound
!      (no inbound) capability
!
! Note: NAT support on cEOS is platform-dependent. Some commands
! may not be supported. Verify against EOS User Manual v4.36.0F
! section 9.3.1 (IP NAT).
! ─────────────────────────────────────────────────────────────
!
end
