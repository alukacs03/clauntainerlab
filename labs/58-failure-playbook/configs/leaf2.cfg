hostname leaf2
ip routing
vlan 20
   name TEN-B
interface Vlan20
   ip address 10.10.20.1/24
interface Ethernet1
   no switchport
   ip address 10.99.3.2/30
interface Ethernet2
   no switchport
   ip address 10.99.4.2/30
interface Ethernet3
   switchport mode access
   switchport access vlan 20
router bgp 65002
   router-id 22.22.22.22
   maximum-paths 4
   neighbor 10.99.3.1 remote-as 65000
   neighbor 10.99.4.1 remote-as 65000
   network 10.10.20.0/24
end
