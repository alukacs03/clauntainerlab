hostname leaf1
ip routing
vlan 10
   name TEN-A
interface Vlan10
   ip address 10.10.10.1/24
interface Ethernet1
   no switchport
   ip address 10.99.1.2/30
interface Ethernet2
   no switchport
   ip address 10.99.2.2/30
interface Ethernet3
   switchport mode access
   switchport access vlan 10
router bgp 65001
   router-id 11.11.11.11
   maximum-paths 4
   neighbor 10.99.1.1 remote-as 65000
   neighbor 10.99.2.1 remote-as 65000
   network 10.10.10.0/24
end
