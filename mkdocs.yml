# Files MkDocs should ignore. Keeps starter configs and topology YAMLs out
# of the site (they'll still be browsable in the GitHub source view).
exclude_docs: |
  EOS-User-Manual.pdf
  scripts/
  images/
  labs/*/configs/
  labs/*/solutions/
  labs/*/topology.clab.yml
  node_modules/
  .git/
  .github/
  site/
