site_name: Containerlab Networking Curriculum
site_description: >
  A hands-on networking curriculum built on containerlab + Arista cEOS.
  Junior to DC architect, across 59 labs and a full reference design.
site_url: https://alukacs03.github.io/clauntainerlab/
repo_url: https://github.com/alukacs03/clauntainerlab
repo_name: alukacs03/clauntainerlab
edit_uri: edit/main/

# docs/ is the source. Symlinks inside docs/ point to labs/, README.md,
# STORY.md, etc. so the existing repo layout doesn't need restructuring.
# Run scripts/setup-docs-symlinks.sh once after cloning.
docs_dir: docs

# Pretty URLs: /labs/01-vlan-basics/ instead of /labs/01-vlan-basics/README/
use_directory_urls: true

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    # content.action.edit is intentionally OFF: the docs/ tree is built from
    # committed symlinks (docs/index.md -> ../README.md, docs/labs -> ../labs,
    # etc.), so MkDocs derives each page's edit URL from the symlink path
    # (e.g. edit/main/docs/index.md). GitHub's web editor cannot edit through a
    # committed symlink — it opens the symlink blob (the target-path text), not
    # the real file — so the pencil button would be non-functional for the
    # symlinked majority of pages. Re-enable once docs/ is a build-time copy of
    # the real sources rather than symlinks (see scripts/setup-docs-symlinks.sh).
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
  font:
    text: Inter
    code: JetBrains Mono

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: "¶"
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.mark

plugins:
  - search
  - awesome-pages       # Auto-discovers pages where nav isn't explicit
  # git-revision-date-localized disabled — clashes with the symlinked docs/
  # layout (it reads the commit history of each page's source path, which is a
  # symlink, not the real file). CI no longer forces fetch-depth: 0 for it
  # (that fetch was only needed by this plugin). Re-enable both together — and
  # restore fetch-depth: 0 in .github/workflows/docs.yml — once docs/ is the
  # real source (or once we switch to a build-time copy).

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/alukacs03/clauntainerlab
  generator: false

